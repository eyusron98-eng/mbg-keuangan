<!DOCTYPE html>

<head>

<title>Keuangan MBG — Koperasi ISS</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F4F2EC; margin: 0; }
  * { -webkit-tap-highlight-color: transparent; }
  .num { font-variant-numeric: tabular-nums; }
  #loading-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #F4F2EC; z-index: 9999; flex-direction: column; gap: 16px; }
  #loading-screen .sp { width: 36px; height: 36px; border: 3px solid #E3E0D6; border-top-color: #15663E; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-banner { position: fixed; top: 0; left: 0; right: 0; padding: 14px 18px; background: #B7472E; color: white; font-size: 13px; z-index: 10000; display: none; white-space: pre-wrap; line-height: 1.5; font-family: ui-monospace, monospace; }

  /* PRINT STYLES for Laporan */
  @media print {
    body { background: white; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    .print-container { padding: 0 !important; box-shadow: none !important; border: none !important; }
    @page { size: A4; margin: 1.5cm 1.2cm; }
    table { page-break-inside: avoid; }
    .page-break { page-break-after: always; }
    .lampiran-img { max-width: 100%; max-height: 18cm; page-break-inside: avoid; }
  }
  .print-only { display: none; }
</style>
</head>
<body>

<div id="error-banner"></div>
<div id="loading-screen"><div class="sp"></div><div style="color:#6E7B70;font-size:14px;">Memuat Keuangan MBG…</div></div>
<div id="root"></div>

<script>
  function showError(msg, src) {
    var b = document.getElementById('error-banner');
    if (!b) return;
    b.style.display = 'block';
    b.innerHTML = '<b>⚠️ Error</b><br>' + (src ? '<i>' + src + '</i><br>' : '') + String(msg) + '<br><br>Coba <b>Ctrl+Shift+R</b>.';
    var ls = document.getElementById('loading-screen'); if (ls) ls.style.display = 'none';
  }
  window.addEventListener('error', function(e) { showError((e.message || 'Unknown') + '\n' + (e.filename || ''), 'window.onerror'); });
  setTimeout(function() {
    var root = document.getElementById('root');
    if (root && root.children.length === 0) showError('React tidak ter-render dalam 15 detik.', 'timeout');
  }, 15000);
</script>

<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>

const fmt = n => 'Rp ' + new Intl.NumberFormat('id-ID').format(Math.round(n||0));
const fmtShort = n => {
  if (!n && n !== 0) return 'Rp 0';
  if (Math.abs(n) >= 1e9) return 'Rp ' + (n/1e9).toFixed(1) + ' M';
  if (Math.abs(n) >= 1e6) return 'Rp ' + (n/1e6).toFixed(1) + ' jt';
  if (Math.abs(n) >= 1e3) return 'Rp ' + (n/1e3).toFixed(0) + ' rb';
  return 'Rp ' + n;
};
const fmtDate = s => { if (!s) return ''; const d = new Date(s); if (isNaN(d)) return s; return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }); };
const fmtDateLong = s => { if (!s) return ''; const d = new Date(s); if (isNaN(d)) return s; return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }); };
const fmtDateRange = (a, b) => {
  if (!a || !b) return '';
  const dA = new Date(a), dB = new Date(b);
  const sameMonth = dA.getMonth() === dB.getMonth() && dA.getFullYear() === dB.getFullYear();
  if (sameMonth) return dA.getDate() + '–' + dB.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
  return fmtDate(a) + ' s/d ' + fmtDate(b);
};
const driveThumb = url => {
  if (!url) return '';
  const m = url.match(/\/d\/([^\/]+)/) || url.match(/id=([^&]+)/);
  return m ? 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w1000' : url;
};
const driveOpen = url => url;

async function api(action, params) {
  params = params || {};
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(function(k) {
    if (params[k] !== undefined && params[k] !== null) {
      url.searchParams.set(k, typeof params[k] === 'object' ? JSON.stringify(params[k]) : String(params[k]));
    }
  });
  try { const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' }); return await res.json(); }
  catch (e) { return { ok: false, error: 'Koneksi gagal: ' + e.message }; }
}
async function apiUpload(action, params) {
  try {
    const res = await fetch(API_URL, { method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action }, params)) });
    return await res.json();
  } catch (e) { return { ok: false, error: 'Upload gagal: ' + e.message }; }
}

function clearSession() { sessionStorage.removeItem(SESS_KEY); }

  edit:     <Svg><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></Svg>,

};

function Eyebrow(p) { return <div className="text-[11px] font-semibold uppercase mb-1" style={{ color: COLORS.muted, letterSpacing: '0.14em' }}>{p.children}</div>; }
function Btn(p) {
  const kind = p.kind || 'solid';
  const sty = kind === 'solid' ? { background: p.disabled ? COLORS.muted : COLORS.green, color: '#fff' }
    : kind === 'danger' ? { background: COLORS.danger, color: '#fff' }
    : kind === 'amber' ? { background: COLORS.amber, color: '#fff' }
    : kind === 'blue' ? { background: COLORS.blue, color: '#fff' }
    : { background: 'transparent', color: COLORS.green, border: '1px solid ' + COLORS.line };
  return <button type={p.type||'button'} onClick={p.onClick} disabled={p.disabled}
    style={Object.assign({}, sty, { opacity: p.disabled ? 0.6 : 1, width: p.full ? '100%' : 'auto' })}
    className="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-semibold transition">{p.children}</button>;
}
function Card(p) {
  const pad = p.pad !== false;
  return <div className={'rounded-xl ' + (p.className||'')}
    style={{ background: COLORS.surface, border: '1px solid ' + COLORS.line, padding: pad ? 20 : 0 }}>{p.children}</div>;
}
function Field(p) {
  return <label className="block mb-4">
    <div className="text-sm font-medium mb-1.5" style={{ color: COLORS.ink }}>{p.label}</div>
    {p.children}
    {p.hint && <div className="text-xs mt-1" style={{ color: p.hintColor || COLORS.muted }}>{p.hint}</div>}
  </label>;
}
const inputStyle = { width: '100%', border: '1px solid ' + COLORS.line, borderRadius: 8, padding: '10px 12px', fontSize: 14, background: '#fff', color: COLORS.ink, outline: 'none' };

function Toast(p) {
  useEffect(function() { const t = setTimeout(p.onClose, 3500); return function() { clearTimeout(t); }; }, []);
  return <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[60] rounded-lg px-4 py-2.5 text-sm font-medium shadow-lg"
    style={{ background: p.type === 'error' ? COLORS.danger : COLORS.deep, color: '#fff', maxWidth: '90vw' }}>{p.msg}</div>;
}
function Modal(p) {
  return <div className="fixed inset-0 z-40 flex items-center justify-center p-4 no-print" style={{ background: 'rgba(0,0,0,0.5)' }} onClick={p.onClose}>
    <Card className="w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div onClick={function(e){e.stopPropagation();}}>
        <div className="flex items-center justify-between mb-3">
          <div className="font-bold" style={{ color: COLORS.ink }}>{p.title}</div>
          <button onClick={p.onClose} style={{ color: COLORS.muted }}>{I.x}</button>
        </div>
        {p.children}
      </div>
    </Card>
  </div>;
}

// ============================================================
//  LOGIN
// ============================================================
function Login(props) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  async function submit() {
    if (!username || !password) { props.toast('Isi username dan password', 'error'); return; }
    setLoading(true);
    const res = await api('login', { username: username, password: password });
    setLoading(false);
    if (res.ok) props.onLogin(res.data); else props.toast(res.error || 'Login gagal', 'error');
  }
  return (
    <div className="min-h-screen flex items-center justify-center p-5" style={{ background: COLORS.paper }}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="inline-flex items-center gap-2.5 mb-2">
            <div className="rounded-xl flex items-center justify-center" style={{ width: 46, height: 46, background: COLORS.green, color: '#fff' }}>{I.wallet}</div>
            <div className="text-left">
              <div className="text-xl font-bold" style={{ color: COLORS.ink }}>Keuangan MBG</div>
              <div className="text-xs" style={{ color: COLORS.muted }}>Makan Bergizi Gratis · Koperasi ISS</div>
            </div>
          </div>
        </div>
        <Card>
          <Eyebrow>Masuk ke akun</Eyebrow>
          <Field label="Username"><input value={username} onChange={function(e){setUsername(e.target.value);}} style={inputStyle} placeholder="cth. akuntan1" autoCapitalize="off"/></Field>
          <Field label="Password"><input type="password" value={password} onChange={function(e){setPassword(e.target.value);}}
            onKeyDown={function(e){ if(e.key==='Enter') submit(); }} style={inputStyle} placeholder="••••••••"/></Field>
          <Btn full onClick={submit} disabled={loading}>{loading ? I.spinner : I.arrowR} {loading ? 'Memeriksa…' : 'Masuk'}</Btn>
        </Card>
        <p className="text-center text-xs mt-4" style={{ color: COLORS.muted }}>Lupa password? Hubungi Super Admin.</p>
      </div>
    </div>
  );
}

// ============================================================
//  SETUP PERIODE — dengan saldo VA & Petty Cash + top-up
// ============================================================
function PeriodeBadge(p) {
  const aktif = p.status === 'AKTIF';
  return <span className="text-xs rounded px-2 py-0.5 font-medium"
    style={{ background: aktif ? '#E8F1EC' : '#F3EFE5', color: aktif ? COLORS.green : COLORS.muted }}>{p.status}</span>;
}

function PeriodeForm({ initial, onClose, onSaved, session, toast }) {
  const [f, setF] = useState(initial || { tanggal_mulai: '', tanggal_akhir: '', penerima: '', saldoVA: '', saldoPettyAwal: '' });
  const [saving, setSaving] = useState(false);
  const isEdit = !!initial && !!initial.id;
  function set(k, v) { setF(function(p){ const n = Object.assign({}, p); n[k] = v; return n; }); }
  async function submit() {
    if (!f.tanggal_mulai || !f.tanggal_akhir) { toast('Isi tanggal mulai & akhir', 'error'); return; }
    if (f.tanggal_mulai >= f.tanggal_akhir) { toast('Tanggal mulai harus sebelum tanggal akhir', 'error'); return; }
    setSaving(true);
    const action = isEdit ? 'updatePeriode' : 'addPeriode';
    const payload = Object.assign({ role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      tanggal_mulai: f.tanggal_mulai, tanggal_akhir: f.tanggal_akhir,
      penerima: f.penerima, saldoVA: f.saldoVA, saldoPettyAwal: f.saldoPettyAwal },
      isEdit ? { id: initial.id } : {});
    const res = await api(action, payload);
    setSaving(false);
    if (res.ok) { toast(isEdit ? 'Periode diupdate' : 'Periode dibuat'); onSaved(); onClose(); }
    else toast(res.error || 'Gagal menyimpan', 'error');
  }
  return (
    <Modal title={isEdit ? ('Edit Periode ' + initial.periode_no) : 'Buat Periode Baru'} onClose={onClose}>
      <Field label="Tanggal mulai"><input type="date" value={f.tanggal_mulai} onChange={function(e){set('tanggal_mulai', e.target.value);}} style={inputStyle}/></Field>
      <Field label="Tanggal akhir"><input type="date" value={f.tanggal_akhir} onChange={function(e){set('tanggal_akhir', e.target.value);}} style={inputStyle}/></Field>
      <Field label="Jumlah penerima manfaat" hint="porsi/hari"><input type="number" value={f.penerima} onChange={function(e){set('penerima', e.target.value);}} style={inputStyle} placeholder="0"/></Field>
      <Field label="Saldo VA awal"><input type="number" value={f.saldoVA} onChange={function(e){set('saldoVA', e.target.value);}} style={inputStyle} placeholder="0"/></Field>
      <Field label="Saldo Petty Cash awal" hint="Boleh 0 — tambahan saldo nanti dicatat sebagai top-up"><input type="number" value={f.saldoPettyAwal} onChange={function(e){set('saldoPettyAwal', e.target.value);}} style={inputStyle} placeholder="0"/></Field>
      <div className="flex gap-2"><Btn kind="ghost" onClick={onClose}>Batal</Btn><Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan</Btn></div>
    </Modal>
  );
}

function TopupForm({ tipe, periode, onClose, onSaved, session, toast }) {
  // tipe: 'VA' atau 'Petty'
  const [f, setF] = useState({ tanggal: new Date().toISOString().substring(0,10), jumlah: '', keterangan: '' });
  const [saving, setSaving] = useState(false);
  function set(k, v) { setF(function(p){ const n = Object.assign({}, p); n[k] = v; return n; }); }
  async function submit() {
    if (!f.tanggal || !f.jumlah) { toast('Isi tanggal & jumlah', 'error'); return; }
    setSaving(true);
    const action = tipe === 'VA' ? 'addVATopup' : 'addPettyTopup';
    const res = await api(action, { role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      tanggal: f.tanggal, jumlah: f.jumlah, keterangan: f.keterangan });
    setSaving(false);
    if (res.ok) { toast('Top-up tersimpan'); onSaved(); onClose(); }
    else toast(res.error || 'Gagal menyimpan', 'error');
  }
  const label = tipe === 'VA' ? 'Saldo VA' : 'Saldo Petty Cash';
  const current = tipe === 'VA' ? periode.saldoVATotal : periode.saldoPettyTotal;
  return (
    <Modal title={'Top-up ' + label} onClose={onClose}>
      <div className="mb-3 p-3 rounded-lg text-xs" style={{ background: COLORS.paper, color: COLORS.muted }}>
        Periode {periode.periode_no} · {fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}<br/>
        {label} sekarang: <b style={{ color: COLORS.ink }}>{fmt(current)}</b>
      </div>
      <Field label="Tanggal terima"><input type="date" value={f.tanggal} min={periode.tanggal_mulai} max={periode.tanggal_akhir} onChange={function(e){set('tanggal', e.target.value);}} style={inputStyle}/></Field>
      <Field label="Jumlah"><input type="number" value={f.jumlah} onChange={function(e){set('jumlah', e.target.value);}} style={inputStyle} placeholder="0"/></Field>
      <Field label="Keterangan" hint={tipe==='VA' ? 'cth. Transfer dari yayasan' : 'cth. Penambahan kas dari bendahara'}>
        <input value={f.keterangan} onChange={function(e){set('keterangan', e.target.value);}} style={inputStyle}/>
      </Field>
      <div className="flex gap-2"><Btn kind="ghost" onClick={onClose}>Batal</Btn><Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan</Btn></div>
    </Modal>
  );
}

function SaldoCard({ tipe, periode, topups, onTopup, color }) {
  const isVA = tipe === 'VA';
  const awal = isVA ? periode.saldoVA : periode.saldoPettyAwal;
  const topupTotal = isVA ? periode.totalVATopup : periode.totalPettyTopup;
  const pengeluaran = isVA ? periode.pengeluaranVA : periode.pengeluaranPetty;
  const sisa = isVA ? periode.sisaVA : periode.sisaPetty;
  const total = awal + topupTotal;
  const usedPct = total > 0 ? Math.min(100, (pengeluaran / total) * 100) : 0;
  return (
    <Card className="">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <div className="rounded-lg flex items-center justify-center" style={{ width: 32, height: 32, background: COLORS.paper, color: color }}>
            {isVA ? I.wallet : I.cash}
          </div>
          <div className="font-bold text-sm" style={{ color: COLORS.ink }}>Saldo {isVA ? 'VA' : 'Petty Cash'}</div>
        </div>
        <Btn kind={isVA ? 'blue' : 'amber'} onClick={onTopup}>{I.plusSm} Top-up</Btn>
      </div>

      <div className="grid grid-cols-2 gap-2 mb-3 text-xs">
        <div className="rounded p-2" style={{ background: COLORS.paper }}>
          <div style={{ color: COLORS.muted }}>Saldo Awal</div>
          <div className="font-semibold num" style={{ color: COLORS.ink }}>{fmt(awal)}</div>
        </div>
        <div className="rounded p-2" style={{ background: COLORS.paper }}>
          <div style={{ color: COLORS.muted }}>Top-up ({topups.length})</div>
          <div className="font-semibold num" style={{ color: COLORS.ink }}>+ {fmt(topupTotal)}</div>
        </div>
        <div className="rounded p-2" style={{ background: COLORS.paper }}>
          <div style={{ color: COLORS.muted }}>Pengeluaran</div>
          <div className="font-semibold num" style={{ color: COLORS.danger }}>− {fmt(pengeluaran)}</div>
        </div>
        <div className="rounded p-2 col-span-1" style={{ background: '#E8F1EC' }}>
          <div style={{ color: COLORS.muted }}>Saldo Sekarang</div>
          <div className="font-bold num" style={{ color: color }}>{fmt(sisa)}</div>
        </div>
      </div>

      <div className="h-1.5 rounded-full overflow-hidden mb-1" style={{ background: COLORS.paper }}>
        <div style={{ width: usedPct + '%', height: '100%', background: color }}/>
      </div>
      <div className="text-[11px]" style={{ color: COLORS.muted }}>Terpakai {usedPct.toFixed(1)}% dari {fmt(total)}</div>

      {topups.length > 0 && (
        <div className="mt-3 pt-3 border-t" style={{ borderColor: COLORS.line }}>
          <div className="text-xs font-semibold mb-2" style={{ color: COLORS.muted }}>Riwayat Top-up</div>
          <div className="space-y-1">
            {topups.slice(0, 5).map(function(t){
              return <div key={t.id} className="flex items-center justify-between text-xs">
                <div>
                  <span style={{ color: COLORS.ink }}>{fmtDate(t.tanggal)}</span>
                  {t.keterangan && <span style={{ color: COLORS.muted }}> · {t.keterangan}</span>}
                </div>
                <span className="font-medium num" style={{ color: color }}>+ {fmt(t.jumlah)}</span>
              </div>;
            })}
            {topups.length > 5 && <div className="text-xs" style={{ color: COLORS.muted }}>+ {topups.length - 5} lainnya</div>}
          </div>
        </div>
      )}
    </Card>
  );
}

function SetupPeriode(props) {
  const session = props.session, toast = props.toast;
  const [periode, setPeriode] = useState(null);
  const [list, setList] = useState([]);
  const [vaTopups, setVaTopups] = useState([]);
  const [pettyTopups, setPettyTopups] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openForm, setOpenForm] = useState(false);
  const [editPeriode, setEditPeriode] = useState(null);
  const [openTopup, setOpenTopup] = useState(null); // 'VA' atau 'Petty'
  const [confirmClose, setConfirmClose] = useState(null);

  const load = useCallback(async function() {
    setLoading(true);
    const [act, pl, va, pc] = await Promise.all([
      api('getActivePeriode', { dapur: session.user.dapur }),
      api('getPeriodeList', { role: session.user.role, dapur: session.user.dapur, scope: session.user.dapur }),
      api('getVATopups', { dapur: session.user.dapur }),
      api('getPettyTopups', { dapur: session.user.dapur }),
    ]);
    setLoading(false);
    if (act.ok) setPeriode(act.data);
    if (pl.ok) setList(pl.data);
    if (va.ok) setVaTopups(va.data);
    if (pc.ok) setPettyTopups(pc.data);
  }, []);
  useEffect(function() { load(); }, [load]);

  if (loading) return <Card>{I.spinner}</Card>;

  const closed = list.filter(p => p.status !== 'AKTIF').sort((a,b)=>b.periode_no-a.periode_no);
  const aktifVATopups = periode ? vaTopups.filter(t => t.periode_id === periode.id) : [];
  const aktifPettyTopups = periode ? pettyTopups.filter(t => t.periode_id === periode.id) : [];

  async function doClose() {
    const res = await api('closePeriode', { role: session.user.role, user_id: session.user.id, id: confirmClose.id });
    if (res.ok) { toast('Periode ditutup'); setConfirmClose(null); load(); }
    else toast(res.error, 'error');
  }

  return (
    <div>
      <Card className="mb-3">
        <Eyebrow>Periode Aktif</Eyebrow>
        {!periode ? (
          <div className="text-center py-6">
            <div className="mb-3 flex justify-center" style={{ color: COLORS.muted }}>{I.warn}</div>
            <div className="text-sm font-medium" style={{ color: COLORS.ink }}>Belum ada periode aktif</div>
            <div className="text-xs mb-4" style={{ color: COLORS.muted }}>Transaksi tidak bisa diinput sampai periode dibuat.</div>
            {session.user.role === 'akuntan' && (
              <Btn onClick={function(){setEditPeriode(null); setOpenForm(true);}}>{I.plusSm} Buat Periode Baru</Btn>
            )}
          </div>
        ) : (
          <div>
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3">
              <div>
                <div className="text-lg font-bold" style={{ color: COLORS.ink }}>Periode {periode.periode_no}</div>
                <div className="text-sm" style={{ color: COLORS.muted }}>{fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}</div>
              </div>
              <PeriodeBadge status="AKTIF"/>
            </div>
            <div className="rounded-lg p-3 mb-3" style={{ background: COLORS.paper }}>
              <div className="text-xs" style={{ color: COLORS.muted }}>Penerima Manfaat</div>
              <div className="font-bold num" style={{ color: COLORS.ink }}>{new Intl.NumberFormat('id-ID').format(periode.penerima)} porsi/hari</div>
            </div>

            {session.user.role === 'akuntan' && (
              <div className="flex flex-wrap gap-2 mt-3">
                <Btn kind="ghost" onClick={function(){
                  setEditPeriode({ id: periode.id, periode_no: periode.periode_no,
                    tanggal_mulai: periode.tanggal_mulai, tanggal_akhir: periode.tanggal_akhir,
                    penerima: periode.penerima, saldoVA: periode.saldoVA, saldoPettyAwal: periode.saldoPettyAwal });
                  setOpenForm(true);
                }}>{I.edit} Edit Periode</Btn>
                <Btn kind="danger" onClick={function(){setConfirmClose(periode);}}>{I.lock} Tutup Periode</Btn>
              </div>
            )}
          </div>
        )}
      </Card>

      {periode && (
        <div className="grid lg:grid-cols-2 gap-3 mb-3">
          <SaldoCard tipe="VA" periode={periode} topups={aktifVATopups}
            onTopup={function(){setOpenTopup('VA');}} color={COLORS.blue}/>
          <SaldoCard tipe="Petty" periode={periode} topups={aktifPettyTopups}
            onTopup={function(){setOpenTopup('Petty');}} color={COLORS.amber}/>
        </div>
      )}

      {closed.length > 0 && (
        <Card className="mb-3">
          <Eyebrow>Riwayat Periode ({closed.length} ditutup)</Eyebrow>
          <div className="space-y-2 mt-2">
            {closed.map(function(p){
              return <div key={p.id} className="flex items-center justify-between rounded-lg p-3" style={{ background: COLORS.paper }}>
                <div>
                  <div className="text-sm font-medium" style={{ color: COLORS.ink }}>Periode {p.periode_no}</div>
                  <div className="text-xs" style={{ color: COLORS.muted }}>{fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)}</div>
                </div>
                <PeriodeBadge status={p.status}/>
              </div>;
            })}
          </div>
        </Card>
      )}

      {openForm && (
        <PeriodeForm initial={editPeriode} onClose={function(){setOpenForm(false); setEditPeriode(null);}}
          onSaved={load} session={session} toast={toast}/>
      )}
      {openTopup && periode && (
        <TopupForm tipe={openTopup} periode={periode}
          onClose={function(){setOpenTopup(null);}} onSaved={load} session={session} toast={toast}/>
      )}
      {confirmClose && (
        <Modal title="Tutup Periode" onClose={function(){setConfirmClose(null);}}>
          <p className="text-sm mb-4" style={{ color: COLORS.ink }}>
            Akan menutup <b>Periode {confirmClose.periode_no}</b> ({fmtDateRange(confirmClose.tanggal_mulai, confirmClose.tanggal_akhir)}).
          </p>
          <p className="text-sm mb-4" style={{ color: COLORS.muted }}>
            Setelah ditutup, tidak bisa lagi input transaksi atau top-up untuk periode ini, dan tidak bisa diubah. Baru bisa buat periode berikutnya.
          </p>
          <div className="flex gap-2">
            <Btn kind="ghost" onClick={function(){setConfirmClose(null);}}>Batal</Btn>
            <Btn kind="danger" onClick={doClose}>{I.lock} Ya, Tutup</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

                </div>

        <KPICard icon={I.cash} label="Sisa Petty Cash" value={fmtShort(k.sisaPetty)} sub={'dari ' + fmtShort(k.saldoPettyTotal)} accent={COLORS.amber} />
        <KPICard icon={I.trend} label="Total Pengeluaran" value={fmtShort(k.totalRiil)} sub={k.serap + '% terserap'} accent={COLORS.green} />

            </div>
          </div>
        </Card>
      )}

      {/* Breakdown PER JENIS dengan kategori */}
      {!noActive && Object.keys(data.kategoriByJenis).map(function(jenis){
        const cats = data.kategoriByJenis[jenis];
        const subtotalRiil = cats.reduce(function(s,c){return s+c.riil;}, 0);
        const subtotalUnriil = cats.reduce(function(s,c){return s+c.unriil;}, 0);

            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
                    <th className="px-3 py-2 font-semibold">Kategori</th>
                    <th className="px-3 py-2 font-semibold text-right">Riil</th>
                    {jenis === 'Operasional' && <th className="px-3 py-2 font-semibold text-right">Unriil</th>}
                    <th className="px-3 py-2 font-semibold w-1/3">% dari total riil</th>
                  </tr>
                </thead>
                <tbody>
                  {cats.map(function(c, i){
                    const pct = subtotalRiil > 0 ? (c.riil / subtotalRiil * 100) : 0;
                    return <tr key={c.name} style={{ borderTop: '1px solid ' + COLORS.line }}>
                      <td className="px-3 py-2" style={{ color: COLORS.ink }}>{c.name}</td>
                      <td className="px-3 py-2 text-right font-medium num" style={{ color: COLORS.green }}>{fmt(c.riil)}</td>
                      {jenis === 'Operasional' && <td className="px-3 py-2 text-right font-medium num" style={{ color: COLORS.amber }}>{fmt(c.unriil)}</td>}
                      <td className="px-3 py-2">
                        <div className="flex items-center gap-2">
                          <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: COLORS.paper }}>
                            <div style={{ width: pct + '%', height: '100%', background: CAT_COLORS[i % CAT_COLORS.length] }}/>
                          </div>
                          <span className="text-xs num" style={{ color: COLORS.muted, minWidth: 36 }}>{pct.toFixed(0)}%</span>
                        </div>
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          )}
        </Card>;
      })}

      {RECHARTS_OK && !noActive && data.byDay.length > 0 && (
        <Card>
          <Eyebrow>Pengeluaran Harian (riil)</Eyebrow>
          <div style={{ height: 220 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={data.byDay} margin={{ left: 4, right: 8 }}>
                <CartesianGrid vertical={false} stroke={COLORS.line} />
                <XAxis dataKey="tanggal" tick={{ fontSize: 10, fill: COLORS.muted }}/>
                <YAxis tickFormatter={fmtShort} tick={{ fontSize: 11, fill: COLORS.muted }} width={62}/>
                <Tooltip formatter={function(v){return fmt(v);}} />
                <Bar dataKey="value" fill={COLORS.lime} radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </Card>
      )}
    </div>
  );
}

function InputTransaksi(props) {
  const session = props.session, toast = props.toast, onSaved = props.onSaved, goToSetup = props.goToSetup;
  const [periode, setPeriode] = useState(null);
  const [loadingPeriode, setLoadingPeriode] = useState(true);
  const [kategoriMap, setKategoriMap] = useState({});
  const [step, setStep] = useState(1);
  const [jenis, setJenis] = useState(null);
  const [form, setForm] = useState({
    tanggal: new Date().toISOString().substring(0,10), no_bukti: '',
    sumber: 'VA', uraian: '', kategori: '', riil: '', unriil: '',
  });
  const [bukti, setBukti] = useState(null);
  const [uploading, setUploading] = useState(false);

  useEffect(function() {
    Promise.all([api('getActivePeriode', { dapur: session.user.dapur }), api('getKategori')]).then(function(arr){
      setLoadingPeriode(false);
      if (arr[0].ok) {
        setPeriode(arr[0].data);
        if (arr[0].data) {
          const today = new Date().toISOString().substring(0,10);
          const inRange = today >= arr[0].data.tanggal_mulai && today <= arr[0].data.tanggal_akhir;
          setForm(function(f){ return Object.assign({}, f, { tanggal: inRange ? today : arr[0].data.tanggal_mulai }); });
        }
      }
      if (arr[1].ok) setKategoriMap(arr[1].data);
    });
  }, []);

  function set(k, v) { setForm(function(f){ const n = Object.assign({}, f); n[k] = v; return n; }); }
  const isBahanBaku = jenis === 'Bahan Baku';
  const valid = form.uraian && form.kategori && form.riil &&
    periode && form.tanggal >= periode.tanggal_mulai && form.tanggal <= periode.tanggal_akhir;

  function fileToBase64(file) {
    return new Promise(function(res, rej) {
      const r = new FileReader();
      r.onload = function(){ res(r.result.split(',')[1]); };
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  async function submit() {
    setUploading(true);
    let bukti_url = '';
    if (bukti) {
      const b64 = await fileToBase64(bukti);
      const up = await apiUpload('uploadBukti', { fileData: b64, fileName: bukti.name, mimeType: bukti.type });
      if (up.ok) bukti_url = up.data.url;
      else { toast('Gagal upload bukti: ' + up.error, 'error'); setUploading(false); return; }
    }
    // Bahan Baku: unriil = riil (tidak ada markup)
    const unrillVal = isBahanBaku ? form.riil : (form.unriil || form.riil);
    const res = await api('addTransaksi', {
      role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      tanggal: form.tanggal, no_bukti: form.no_bukti, jenis: jenis, kategori: form.kategori, uraian: form.uraian,
      sumber: form.sumber, riil: form.riil, unriil: unrillVal, bukti_url: bukti_url,
    });
    setUploading(false);
    if (res.ok) {
      toast('Transaksi tersimpan');
      setStep(1); setJenis(null); setBukti(null);
      setForm({ tanggal: form.tanggal, no_bukti: '', sumber: 'VA', uraian: '', kategori: '', riil: '', unriil: '' });
      onSaved && onSaved();
    } else toast(res.error || 'Gagal menyimpan', 'error');
  }

  if (loadingPeriode) return <Card>{I.spinner}</Card>;
  if (!periode) {
    return (
      <Card>
        <div className="text-center py-6">
          <div className="mb-3 flex justify-center" style={{ color: COLORS.danger }}>{I.warn}</div>
          <div className="text-base font-bold mb-1" style={{ color: COLORS.ink }}>Belum ada periode aktif</div>
          <div className="text-sm mb-4" style={{ color: COLORS.muted }}>Setup periode dulu sebelum input transaksi.</div>
          <Btn onClick={goToSetup}>{I.settings} Ke Setup Periode</Btn>
        </div>
      </Card>
    );
  }

  if (step === 1) {
    return (
      <div>
        <Card className="mb-3">
          <Eyebrow>Periode aktif</Eyebrow>
          <div className="text-base font-bold" style={{ color: COLORS.ink }}>Periode {periode.periode_no}</div>
          <div className="text-sm" style={{ color: COLORS.muted }}>{fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}</div>
        </Card>
        <Card>
          <Eyebrow>Langkah 1 dari 2</Eyebrow>
          <h2 className="text-lg font-bold mb-1" style={{ color: COLORS.ink }}>Pilih jenis transaksi</h2>
          <p className="text-sm mb-4" style={{ color: COLORS.muted }}>Menentukan daftar kategori di langkah berikutnya.</p>
          <div className="grid grid-cols-2 gap-2.5">
            {Object.keys(kategoriMap).map(function(j){
              return <button key={j} onClick={function(){ setJenis(j); setStep(2); }}
                className="rounded-lg p-4 text-left transition hover:bg-gray-50"
                style={{ border: '1px solid ' + COLORS.line, background: '#fff' }}>
                <div className="font-semibold text-sm" style={{ color: COLORS.ink }}>{j}</div>
                <div className="text-xs mt-0.5" style={{ color: COLORS.muted }}>{kategoriMap[j].length} kategori</div>
              </button>;
            })}
          </div>
        </Card>
      </div>
    );
  }

  const dateOutOfRange = form.tanggal && (form.tanggal < periode.tanggal_mulai || form.tanggal > periode.tanggal_akhir);

  return (
    <div>
      <Card className="mb-3">
        <Eyebrow>Periode aktif</Eyebrow>
        <div className="text-sm font-bold" style={{ color: COLORS.ink }}>Periode {periode.periode_no} · {fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}</div>
      </Card>
      <Card>
        <button onClick={function(){setStep(1);}} className="inline-flex items-center gap-1.5 text-sm mb-3" style={{ color: COLORS.green }}>{I.arrowL} {jenis}</button>
        <Eyebrow>Langkah 2 dari 2 · Detail transaksi</Eyebrow>
        <div className="grid sm:grid-cols-2 gap-x-4 mt-2">
          <Field label="Tanggal transaksi" hint={dateOutOfRange ? '⚠️ Di luar periode aktif' : null} hintColor={dateOutOfRange ? COLORS.danger : null}>
            <input type="date" value={form.tanggal} min={periode.tanggal_mulai} max={periode.tanggal_akhir}
              onChange={function(e){set('tanggal', e.target.value);}}
              style={Object.assign({}, inputStyle, dateOutOfRange ? { borderColor: COLORS.danger } : {})}/>
          </Field>
          <Field label="No bukti" hint="cth. NB-001 atau no kuitansi">
            <input value={form.no_bukti} onChange={function(e){set('no_bukti', e.target.value);}} style={inputStyle} placeholder="optional"/>
          </Field>
          <Field label="Sumber dana">
            <div className="flex gap-2">
              {['VA','Petty Cash'].map(function(s){
                return <button key={s} onClick={function(){set('sumber', s);}} className="flex-1 rounded-lg py-2.5 text-sm font-medium"
                  style={{ border: '1px solid ' + (form.sumber===s?COLORS.green:COLORS.line),
                           background: form.sumber===s?COLORS.paper:'#fff',
                           color: form.sumber===s?COLORS.green:COLORS.muted }}>{s}</button>;
              })}
            </div>
          </Field>
          <Field label="Kategori">
            <select value={form.kategori} onChange={function(e){set('kategori', e.target.value);}} style={inputStyle}>
              <option value="">Pilih kategori…</option>
              {(kategoriMap[jenis]||[]).map(function(k){ return <option key={k} value={k}>{k}</option>; })}
            </select>
          </Field>
          <Field label="Uraian transaksi"><input value={form.uraian} onChange={function(e){set('uraian', e.target.value);}} placeholder="cth. Ayam potong 60kg" style={inputStyle}/></Field>
          {isBahanBaku ? (
            <Field label="Nominal" hint="Realisasi aktual"><input type="number" value={form.riil} onChange={function(e){set('riil', e.target.value);}} placeholder="0" style={inputStyle}/></Field>
          ) : (
            <>
              <Field label="Nominal riil" hint="Realisasi aktual yang dibayar"><input type="number" value={form.riil} onChange={function(e){set('riil', e.target.value);}} placeholder="0" style={inputStyle}/></Field>
              <Field label="Nominal unriil" hint="Nilai pengajuan / markup (kosongkan kalau sama dengan riil)"><input type="number" value={form.unriil} onChange={function(e){set('unriil', e.target.value);}} placeholder="0" style={inputStyle}/></Field>
            </>
          )}
        </div>
        <Field label="Bukti transaksi" hint="Foto nota, gambar, atau PDF — tersimpan ke Google Drive">
          <label className="flex flex-col items-center justify-center gap-1 rounded-lg py-6 cursor-pointer"
            style={{ border: '1.5px dashed ' + COLORS.line, color: COLORS.muted }}>
            <div className="flex items-center gap-2">{I.image} {I.file}</div>
            <span className="text-sm">{bukti ? bukti.name : 'Ketuk untuk pilih / ambil foto'}</span>
            <input type="file" className="hidden" accept="image/*,application/pdf" capture="environment"
              onChange={function(e){setBukti(e.target.files[0]);}}/>
          </label>
        </Field>
        <Btn full disabled={!valid || uploading} onClick={submit}>{uploading ? I.spinner : I.check} {uploading ? 'Menyimpan…' : 'Simpan transaksi'}</Btn>
      </Card>
    </div>
  );
}

function Laporan(props) {
  const session = props.session, scope = props.scope, toast = props.toast;
  const [periodeList, setPeriodeList] = useState([]);
  const [selPeriode, setSelPeriode] = useState('');
  const [filterJenis, setFilterJenis] = useState('ALL');
  const [transaksi, setTransaksi] = useState([]);
  const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(function() {
    Promise.all([
      api('getPeriodeList', { role: session.user.role, dapur: scope, scope: scope }),
      api('getDapur'),
    ]).then(function(arr){
      if (arr[0].ok) {
        setPeriodeList(arr[0].data);
        // default: pilih periode aktif kalau ada
        const aktif = arr[0].data.find(function(p){return p.status === 'AKTIF';});
        if (aktif) setSelPeriode(aktif.id);
        else if (arr[0].data[0]) setSelPeriode(arr[0].data[0].id);
        else setLoading(false);
      } else setLoading(false);
      if (arr[1].ok) setDapur(arr[1].data);
    });
  }, [scope]);

  useEffect(function() {
    if (!selPeriode) return;
    setLoading(true);
    api('getTransaksi', { role: session.user.role, dapur: session.user.dapur || '', scope: scope || 'ALL', periode_id: selPeriode })
      .then(function(r){
        setLoading(false);
        if (r.ok) setTransaksi(r.data); else toast(r.error, 'error');
      });
  }, [selPeriode]);

  const periode = periodeList.find(function(p){return p.id === selPeriode;});
  const dapurMap = useMemo(function(){ const m = {}; dapur.forEach(function(d){ m[d.id] = d.nama; }); return m; }, [dapur]);

  // filter & group
  const filtered = filterJenis === 'ALL' ? transaksi : transaksi.filter(function(t){return t.jenis === filterJenis;});
  filtered.sort(function(a,b){ return a.tanggal < b.tanggal ? -1 : 1; });

  // Group by jenis
  const grouped = {};
  filtered.forEach(function(t){
    if (!grouped[t.jenis]) grouped[t.jenis] = [];
    grouped[t.jenis].push(t);
  });

  // Lampiran (bukti yang ada URL-nya)
  let lampiranNo = 0;
  const lampiranList = filtered.map(function(t){
    if (t.bukti_url) { lampiranNo++; return { tx: t, no: lampiranNo }; }
    return null;
  }).filter(Boolean);
  const txToLampiranNo = {};
  lampiranList.forEach(function(l){ txToLampiranNo[l.tx.id] = l.no; });

  const grandTotal = filtered.reduce(function(s, t){ return s + (t.unriil > 0 ? t.unriil : t.riil); }, 0);
  const dapurNama = scope && scope !== 'ALL' ? dapurMap[scope] : (session.user.dapur ? dapurMap[session.user.dapur] : 'Semua Dapur');

  function doPrint() { window.print(); }

  if (loading) return <Card>{I.spinner}</Card>;

  return (
    <div>
      {/* Filter bar — hidden saat print */}
      <Card className="mb-3 no-print">
        <div className="flex flex-col sm:flex-row sm:items-end gap-3">
          <div className="flex-1">
            <div className="text-xs font-medium mb-1" style={{ color: COLORS.muted }}>Periode</div>
            <select value={selPeriode} onChange={function(e){setSelPeriode(e.target.value);}} style={inputStyle}>
              {periodeList.length === 0 && <option value="">Belum ada periode</option>}
              {periodeList.map(function(p){
                return <option key={p.id} value={p.id}>Periode {p.periode_no} · {fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)} · {p.status}</option>;
              })}
            </select>
          </div>
          <div className="flex-1">
            <div className="text-xs font-medium mb-1" style={{ color: COLORS.muted }}>Jenis</div>
            <select value={filterJenis} onChange={function(e){setFilterJenis(e.target.value);}} style={inputStyle}>
              <option value="ALL">Semua jenis</option>
              <option value="Bahan Baku">Bahan Baku</option>
              <option value="Operasional">Operasional</option>
            </select>
          </div>
          <Btn onClick={doPrint} disabled={filtered.length === 0}>{I.print} Print / Simpan PDF</Btn>
        </div>
        <p className="text-xs mt-2" style={{ color: COLORS.muted }}>
          Tip: di dialog print, pilih "Save as PDF" sebagai destination untuk simpan jadi file PDF.
        </p>
      </Card>

      {/* Preview / Print area */}
      <div className="print-container" style={{ background: '#fff', padding: 24, border: '1px solid ' + COLORS.line, borderRadius: 12 }}>
        {/* HEADER */}
        <div style={{ borderBottom: '2px solid ' + COLORS.ink, paddingBottom: 12, marginBottom: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 'bold', color: COLORS.ink, letterSpacing: '-0.01em' }}>LAPORAN KEUANGAN MBG</div>
              <div style={{ fontSize: 13, color: COLORS.muted, marginTop: 2 }}>Makan Bergizi Gratis · Koperasi ISS</div>
              <div style={{ fontSize: 14, color: COLORS.ink, marginTop: 8, fontWeight: 600 }}>{dapurNama}</div>
              {periode && <div style={{ fontSize: 13, color: COLORS.muted }}>
                Periode {periode.periode_no}: {fmtDateLong(periode.tanggal_mulai)} – {fmtDateLong(periode.tanggal_akhir)}
              </div>}
            </div>
            <div style={{ fontSize: 11, color: COLORS.muted, textAlign: 'right' }}>
              Dibuat: {fmtDateLong(new Date().toISOString())}<br/>
              Oleh: {session.user.nama}
            </div>
          </div>
        </div>

        {/* TABEL PER JENIS */}
        {Object.keys(grouped).length === 0 ? (
          <p style={{ textAlign: 'center', color: COLORS.muted, padding: 32 }}>Tidak ada transaksi untuk filter ini.</p>
        ) : Object.keys(grouped).sort().map(function(jenis){
          const rows = grouped[jenis];
          const subtotal = rows.reduce(function(s, t){ return s + (t.unriil > 0 ? t.unriil : t.riil); }, 0);
          return <div key={jenis} style={{ marginBottom: 20 }}>
            <div style={{ fontWeight: 'bold', fontSize: 14, color: COLORS.ink, marginBottom: 6, padding: '6px 0', borderBottom: '1px solid ' + COLORS.line }}>
              {jenis}
            </div>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
              <thead>
                <tr style={{ background: COLORS.paper, color: COLORS.muted }}>
                  <th style={{ padding: '6px 8px', textAlign: 'left', fontWeight: 600, width: '4%' }}>No</th>
                  <th style={{ padding: '6px 8px', textAlign: 'left', fontWeight: 600, width: '10%' }}>Tanggal</th>
                  <th style={{ padding: '6px 8px', textAlign: 'left', fontWeight: 600, width: '12%' }}>No Bukti</th>
                  <th style={{ padding: '6px 8px', textAlign: 'left', fontWeight: 600, width: '14%' }}>Kategori</th>
                  <th style={{ padding: '6px 8px', textAlign: 'left', fontWeight: 600 }}>Uraian</th>
                  <th style={{ padding: '6px 8px', textAlign: 'right', fontWeight: 600, width: '14%' }}>Nominal</th>
                  <th style={{ padding: '6px 8px', textAlign: 'center', fontWeight: 600, width: '8%' }}>Bukti</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(function(r, idx){
                  const nominal = r.unriil > 0 ? r.unriil : r.riil;
                  return <tr key={r.id} style={{ borderTop: '1px solid ' + COLORS.line }}>
                    <td style={{ padding: '5px 8px', color: COLORS.muted }}>{idx+1}</td>
                    <td style={{ padding: '5px 8px', color: COLORS.ink }}>{fmtDate(r.tanggal)}</td>
                    <td style={{ padding: '5px 8px', color: COLORS.ink }}>{r.no_bukti || '—'}</td>
                    <td style={{ padding: '5px 8px', color: COLORS.ink }}>{r.kategori}</td>
                    <td style={{ padding: '5px 8px', color: COLORS.ink }}>{r.uraian}</td>
                    <td style={{ padding: '5px 8px', textAlign: 'right', color: COLORS.ink, fontVariantNumeric: 'tabular-nums', fontWeight: 500 }}>{fmt(nominal)}</td>
                    <td style={{ padding: '5px 8px', textAlign: 'center', color: COLORS.muted }}>{txToLampiranNo[r.id] ? 'L-' + txToLampiranNo[r.id] : '—'}</td>
                  </tr>;
                })}
                <tr style={{ background: COLORS.paper, fontWeight: 'bold' }}>
                  <td colSpan="5" style={{ padding: '6px 8px', textAlign: 'right', color: COLORS.ink }}>Subtotal {jenis}</td>
                  <td style={{ padding: '6px 8px', textAlign: 'right', color: COLORS.ink, fontVariantNumeric: 'tabular-nums' }}>{fmt(subtotal)}</td>
                  <td/>
                </tr>
              </tbody>
            </table>
          </div>;
        })}

        {/* GRAND TOTAL */}
        {Object.keys(grouped).length > 0 && (
          <div style={{ marginTop: 16, padding: '12px 8px', borderTop: '2px solid ' + COLORS.ink, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontWeight: 'bold', fontSize: 14, color: COLORS.ink }}>TOTAL KESELURUHAN</div>
            <div style={{ fontWeight: 'bold', fontSize: 16, color: COLORS.ink, fontVariantNumeric: 'tabular-nums' }}>{fmt(grandTotal)}</div>
          </div>
        )}

        {/* TANDA TANGAN */}
        {Object.keys(grouped).length > 0 && (
          <div style={{ marginTop: 40, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40, fontSize: 12 }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ color: COLORS.muted }}>Dibuat oleh,</div>
              <div style={{ marginTop: 48, borderTop: '1px solid ' + COLORS.ink, paddingTop: 4, color: COLORS.ink, fontWeight: 600 }}>
                ({session.user.nama})<br/>
                <span style={{ fontWeight: 'normal', color: COLORS.muted }}>Akuntan</span>
              </div>
            </div>
            <div style={{ textAlign: 'center' }}>
              <div style={{ color: COLORS.muted }}>Mengetahui,</div>
              <div style={{ marginTop: 48, borderTop: '1px solid ' + COLORS.ink, paddingTop: 4, color: COLORS.ink, fontWeight: 600 }}>
                (............................)<br/>
                <span style={{ fontWeight: 'normal', color: COLORS.muted }}>PIC Dapur</span>
              </div>
            </div>
          </div>
        )}

        {/* LAMPIRAN BUKTI */}
        {lampiranList.length > 0 && (
          <div style={{ marginTop: 40, pageBreakBefore: 'always' }} className="page-break">
            <div style={{ fontWeight: 'bold', fontSize: 16, color: COLORS.ink, marginBottom: 12, borderBottom: '2px solid ' + COLORS.ink, paddingBottom: 6 }}>
              LAMPIRAN BUKTI TRANSAKSI
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 16 }}>
              {lampiranList.map(function(l){
                return <div key={l.no} style={{ border: '1px solid ' + COLORS.line, borderRadius: 8, padding: 12, pageBreakInside: 'avoid' }}>
                  <div style={{ fontSize: 11, marginBottom: 6, color: COLORS.muted }}>
                    <b style={{ color: COLORS.ink }}>L-{l.no}</b> · {fmtDate(l.tx.tanggal)} · {l.tx.no_bukti || '(tanpa no bukti)'} · {l.tx.uraian}
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <img src={driveThumb(l.tx.bukti_url)} alt={'Bukti ' + l.no}
                      className="lampiran-img"
                      style={{ maxWidth: '100%', maxHeight: 400, objectFit: 'contain', border: '1px solid ' + COLORS.line, borderRadius: 4 }}
                      onError={function(e){ e.target.style.display = 'none'; e.target.nextSibling && (e.target.nextSibling.style.display = 'block'); }}/>
                    <div style={{ display: 'none', padding: 20, color: COLORS.muted, fontSize: 12 }}>
                      [Bukti tidak dapat ditampilkan — buka di Drive: <a href={l.tx.bukti_url} target="_blank" rel="noopener">{l.tx.bukti_url}</a>]
                    </div>
                  </div>
                </div>;
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function exportExcel(rows, dapurMap, namaFile) {
  const data = rows.map(function(r){
    return {
      'Tanggal': r.tanggal,
      'Jenis Transaksi': r.jenis,
      'Kategori': r.kategori,
      'No Bukti': r.no_bukti || '',
      'Uraian': r.uraian,
      'Sumber': r.sumber,
      'Nominal Riil': r.riil,
      'Nominal Unriil': r.unriil,
      'Dapur': dapurMap[r.dapur] || r.dapur,
      'Periode ID': r.periode_id || '',
      'Bukti URL': r.bukti_url || '',
    };
  });
  const ws = XLSX.utils.json_to_sheet(data);
  // Set column widths
  ws['!cols'] = [
    { wch: 12 }, { wch: 16 }, { wch: 30 }, { wch: 12 },
    { wch: 40 }, { wch: 12 }, { wch: 16 }, { wch: 16 },
    { wch: 24 }, { wch: 24 }, { wch: 50 },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Transaksi');
  XLSX.writeFile(wb, namaFile);
}

function Riwayat(props) {
  const session = props.session, scope = props.scope;
  const [rows, setRows] = useState([]);
  const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState('');

  useEffect(function() {
    Promise.all([
      api('getTransaksi', { role: session.user.role, dapur: session.user.dapur || '', scope: scope || 'ALL' }),
      api('getDapur'),
    ]).then(function(arr){
      setLoading(false);
      if (arr[0].ok) setRows(arr[0].data);
      if (arr[1].ok) setDapur(arr[1].data);
    });
  }, [scope]);

  const dapurMap = useMemo(function(){ const m = {}; dapur.forEach(function(d){ m[d.id] = d.nama; }); return m; }, [dapur]);
  const filtered = useMemo(function() {
    if (!q.trim()) return rows;
    const t = q.toLowerCase();
    return rows.filter(function(r){
      return (r.uraian||'').toLowerCase().indexOf(t) >= 0 ||
             (r.kategori||'').toLowerCase().indexOf(t) >= 0 ||
             (r.no_bukti||'').toLowerCase().indexOf(t) >= 0 ||
             (r.jenis||'').toLowerCase().indexOf(t) >= 0;
    });
  }, [rows, q]);

  if (loading) return <Card>{I.spinner}</Card>;

  return (
    <Card pad={false}>
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-4" style={{ borderBottom: '1px solid ' + COLORS.line }}>
        <div>
          <div className="font-bold" style={{ color: COLORS.ink }}>Riwayat Transaksi</div>
          <div className="text-xs" style={{ color: COLORS.muted }}>{filtered.length} transaksi</div>
        </div>
        <div className="flex items-center gap-2">
          <input value={q} onChange={function(e){setQ(e.target.value);}} placeholder="Cari…"
            style={Object.assign({}, inputStyle, { width: 200, padding: '8px 10px', fontSize: 13 })} />
          <Btn kind="ghost" onClick={function(){
            exportExcel(filtered, dapurMap, 'riwayat-mbg-' + new Date().toISOString().substring(0,10) + '.xlsx');
          }}>{I.download} Excel</Btn>
        </div>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm" style={{ minWidth: 900 }}>
          <thead>
            <tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
              <th className="px-4 py-2.5 font-semibold">Tanggal</th>
              <th className="px-4 py-2.5 font-semibold">Jenis</th>
              <th className="px-4 py-2.5 font-semibold">Kategori</th>
              <th className="px-4 py-2.5 font-semibold">No Bukti</th>
              <th className="px-4 py-2.5 font-semibold">Uraian</th>
              {scope === 'ALL' && <th className="px-4 py-2.5 font-semibold">Dapur</th>}
              <th className="px-4 py-2.5 font-semibold">Sumber</th>
              <th className="px-4 py-2.5 font-semibold text-right">Riil</th>
              <th className="px-4 py-2.5 font-semibold text-right">Unriil</th>
              <th className="px-4 py-2.5 font-semibold">Bukti</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="10" className="px-4 py-8 text-center" style={{ color: COLORS.muted }}>Belum ada transaksi.</td></tr>
            ) : filtered.map(function(r){
              return <tr key={r.id} style={{ borderTop: '1px solid ' + COLORS.line }}>
                <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{r.tanggal}</td>
                <td className="px-4 py-2.5" style={{ color: COLORS.ink }}>
                  <span className="text-xs rounded px-1.5 py-0.5"
                    style={{ background: r.jenis==='Bahan Baku'?'#E8F1EC':'#F3EFE5', color: COLORS.ink }}>{r.jenis}</span>
                </td>
                <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{r.kategori}</td>
                <td className="px-4 py-2.5 text-xs" style={{ color: COLORS.muted }}>{r.no_bukti || '—'}</td>
                <td className="px-4 py-2.5" style={{ color: COLORS.ink }}>{r.uraian}</td>
                {scope === 'ALL' && <td className="px-4 py-2.5 text-xs" style={{ color: COLORS.muted }}>{dapurMap[r.dapur]||r.dapur}</td>}
                <td className="px-4 py-2.5">
                  <span className="text-xs rounded px-2 py-0.5"
                    style={{ background: r.sumber==='VA'?'#E8F1EC':'#F6EEDD', color: r.sumber==='VA'?COLORS.green:COLORS.amber }}>{r.sumber}</span>
                </td>
                <td className="px-4 py-2.5 text-right font-medium num" style={{ color: COLORS.ink }}>{fmt(r.riil)}</td>
                <td className="px-4 py-2.5 text-right num" style={{ color: COLORS.muted }}>{fmt(r.unriil)}</td>
                <td className="px-4 py-2.5">
                  {r.bukti_url ? <a href={r.bukti_url} target="_blank" rel="noopener" className="inline-flex items-center gap-1 text-xs" style={{ color: COLORS.green }}>{I.file} lihat</a> : <span className="text-xs" style={{ color: COLORS.muted }}>—</span>}
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

// ============================================================
//  USERS (admin) — sama
// ============================================================
function Pengguna(props) {
  const session = props.session, toast = props.toast;
  const [rows, setRows] = useState([]); const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true); const [open, setOpen] = useState(false);
  const [f, setF] = useState({ username:'', password:'', nama:'', target_role:'akuntan', dapur:'' });
  function load() {
    setLoading(true);
    Promise.all([api('getUsers', { role: session.user.role }), api('getDapur')]).then(function(arr){
      setLoading(false);
      if (arr[0].ok) setRows(arr[0].data); if (arr[1].ok) setDapur(arr[1].data);
    });
  }
  useEffect(load, []);
  async function submit() {
    if (!f.username || !f.password || !f.nama) { toast('Lengkapi data', 'error'); return; }
    const res = await api('addUser', Object.assign({ role: session.user.role }, f));
    if (res.ok) { toast('User ditambahkan'); setOpen(false); setF({ username:'', password:'', nama:'', target_role:'akuntan', dapur:'' }); load(); }
    else toast(res.error, 'error');
  }
  if (loading) return <Card>{I.spinner}</Card>;
  const dapurMap = {}; dapur.forEach(function(d){ dapurMap[d.id] = d.nama; });
  return (<>
    <Card pad={false}>
      <div className="flex items-center justify-between p-4" style={{ borderBottom: '1px solid ' + COLORS.line }}>
        <div><div className="font-bold" style={{ color: COLORS.ink }}>Manajemen Pengguna</div><div className="text-xs" style={{ color: COLORS.muted }}>{rows.length} akun</div></div>
        <Btn onClick={function(){setOpen(true);}}>{I.plus} Tambah User</Btn>
      </div>
      <div className="overflow-x-auto"><table className="w-full text-sm" style={{ minWidth: 600 }}>
        <thead><tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
          <th className="px-4 py-2.5 font-semibold">Nama</th><th className="px-4 py-2.5 font-semibold">Username</th>
          <th className="px-4 py-2.5 font-semibold">Peran</th><th className="px-4 py-2.5 font-semibold">Dapur</th>
          <th className="px-4 py-2.5 font-semibold">Status</th>
        </tr></thead>
        <tbody>{rows.map(function(u){
          return <tr key={u.id} style={{ borderTop: '1px solid ' + COLORS.line }}>
            <td className="px-4 py-2.5 font-medium" style={{ color: COLORS.ink }}>{u.nama}</td>
            <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{u.username}</td>
            <td className="px-4 py-2.5"><span className="text-xs rounded px-2 py-0.5" style={{ background: COLORS.paper, color: COLORS.green }}>{u.role}</span></td>
            <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{u.dapur ? dapurMap[u.dapur] : '—'}</td>
            <td className="px-4 py-2.5"><span className="text-xs rounded px-2 py-0.5" style={{ background: u.aktif==='YA'?'#E8F1EC':'#FAE5DF', color: u.aktif==='YA'?COLORS.green:COLORS.danger }}>{u.aktif}</span></td>
          </tr>;
        })}</tbody>
      </table></div>
    </Card>
    {open && (
      <Modal title="Tambah pengguna" onClose={function(){setOpen(false);}}>
        <Field label="Nama lengkap"><input value={f.nama} onChange={function(e){setF(Object.assign({}, f, {nama:e.target.value}));}} style={inputStyle}/></Field>
        <Field label="Username"><input value={f.username} onChange={function(e){setF(Object.assign({}, f, {username:e.target.value}));}} style={inputStyle} autoCapitalize="off"/></Field>
        <Field label="Password awal"><input value={f.password} onChange={function(e){setF(Object.assign({}, f, {password:e.target.value}));}} style={inputStyle}/></Field>
        <Field label="Peran">
          <select value={f.target_role} onChange={function(e){setF(Object.assign({}, f, {target_role:e.target.value}));}} style={inputStyle}>
            <option value="akuntan">Akuntan</option><option value="pic">PIC Dapur</option>
            <option value="yayasan">Yayasan</option><option value="admin">Admin</option>
          </select>
        </Field>
        {(f.target_role==='akuntan'||f.target_role==='pic') && (
          <Field label="Dapur">
            <select value={f.dapur} onChange={function(e){setF(Object.assign({}, f, {dapur:e.target.value}));}} style={inputStyle}>
              <option value="">Pilih dapur…</option>
              {dapur.map(function(d){ return <option key={d.id} value={d.id}>{d.nama}</option>; })}
            </select>
          </Field>
        )}
        <div className="flex gap-2"><Btn kind="ghost" onClick={function(){setOpen(false);}}>Batal</Btn><Btn onClick={submit}>{I.check} Simpan</Btn></div>
      </Modal>
    )}
  </>);
}

// ============================================================
//  APP SHELL — new nav order
// ============================================================
function App() {
  const [session, setSession] = useState(loadSession);
  const [view, setView] = useState('dash');
  const [scope, setScope] = useState('ALL');
  const [dapurList, setDapurList] = useState([]);
  const [toastData, setToastData] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);

  function toast(msg, type) { setToastData({ msg: msg, type: type || 'ok' }); }

  useEffect(function() {
    if (session) {
      setScope(session.user.dapur || 'ALL');
      api('getDapur').then(function(r){ if (r.ok) setDapurList(r.data); });
    }
  }, [session]);

  if (!session) return (<>
    <Login onLogin={function(s){ saveSession(s); setSession(s); }} toast={toast} />
    {toastData && <Toast msg={toastData.msg} type={toastData.type} onClose={function(){setToastData(null);}}/>}
  </>);

  const role = session.user.role;
  // Urutan baru: setup, dash, input, laporan, riwayat
  const navItems = {
    akuntan: [
      ['setup','Setup',I.settings],
      ['dash','Dashboard',I.dash],
      ['input','Input',I.plus],
      ['laporan','Laporan',I.report],
      ['riwayat','Riwayat',I.list],
    ],
    pic: [
      ['dash','Dashboard',I.dash],
      ['laporan','Laporan',I.report],
      ['riwayat','Riwayat',I.list],
    ],
    yayasan: [
      ['dash','Dashboard',I.dash],
      ['riwayat','Riwayat',I.list],
    ],
    admin: [
      ['dash','Dashboard',I.dash],
      ['laporan','Laporan',I.report],
      ['riwayat','Riwayat',I.list],
      ['users','Pengguna',I.users],
    ],
  }[role] || [];

  const canPickScope = role === 'yayasan' || role === 'admin';
  const effScope = canPickScope ? scope : session.user.dapur;
  function logout() { clearSession(); setSession(null); }

  return (
    <div className="min-h-screen flex flex-col" style={{ background: COLORS.paper, color: COLORS.ink }}>
      <header className="flex items-center justify-between px-4 sm:px-6 py-3 no-print" style={{ background: COLORS.surface, borderBottom: '1px solid ' + COLORS.line }}>
        <div className="flex items-center gap-2.5 min-w-0">
          <div className="rounded-lg flex items-center justify-center shrink-0" style={{ width: 34, height: 34, background: COLORS.green, color: '#fff' }}>{I.wallet}</div>
          <div className="min-w-0">
            <div className="font-bold text-sm leading-none truncate" style={{ color: COLORS.ink }}>Keuangan MBG</div>
            <div className="text-xs truncate" style={{ color: COLORS.muted }}>{session.user.nama}</div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          {canPickScope && (view==='dash'||view==='riwayat'||view==='laporan') && (
            <select value={scope} onChange={function(e){setScope(e.target.value);}}
              style={Object.assign({}, inputStyle, { width: 'auto', padding: '7px 10px', fontSize: 13 })}>
              <option value="ALL">Semua dapur</option>
              {dapurList.map(function(d){ return <option key={d.id} value={d.id}>{d.nama}</option>; })}
            </select>
          )}
          <button onClick={logout} className="inline-flex items-center gap-1.5 text-sm rounded-lg px-3 py-2"
            style={{ color: COLORS.muted, border: '1px solid ' + COLORS.line }}>{I.logout} <span className="hidden sm:inline">Keluar</span></button>
        </div>
      </header>

      <div className="flex flex-1">
        <nav className="hidden md:flex flex-col gap-1 p-3 w-56 shrink-0 no-print" style={{ borderRight: '1px solid ' + COLORS.line }}>
          {navItems.map(function(item){
            const k = item[0], label = item[1], icon = item[2];
            return <button key={k} onClick={function(){setView(k);}}
              className="flex items-center gap-2.5 rounded-lg px-3 py-2.5 text-sm font-medium text-left transition"
              style={{ background: view===k?COLORS.green:'transparent', color: view===k?'#fff':COLORS.ink }}>
              {icon} {label}
            </button>;
          })}
        </nav>

        <main className="flex-1 p-4 sm:p-6 pb-24 md:pb-6">
          {view === 'setup'   && <SetupPeriode session={session} toast={toast}/>}
          {view === 'dash'    && <Dashboard key={'d'+refreshKey} session={session} scope={effScope} toast={toast}/>}
          {view === 'input'   && <InputTransaksi session={session} toast={toast}
            onSaved={function(){ setRefreshKey(function(k){return k+1;}); setView('riwayat'); }}
            goToSetup={function(){setView('setup');}}/>}
          {view === 'laporan' && <Laporan session={session} scope={effScope} toast={toast}/>}
          {view === 'riwayat' && <Riwayat key={'r'+refreshKey} session={session} scope={effScope} toast={toast}/>}
          {view === 'users'   && <Pengguna session={session} toast={toast}/>}
        </main>
      </div>

      <nav className="md:hidden fixed bottom-0 left-0 right-0 flex justify-around py-2 no-print" style={{ background: COLORS.surface, borderTop: '1px solid ' + COLORS.line }}>
        {navItems.map(function(item){
          const k = item[0], label = item[1], icon = item[2];
          return <button key={k} onClick={function(){setView(k);}} className="flex flex-col items-center gap-0.5 px-2 py-1"
            style={{ color: view===k?COLORS.green:COLORS.muted }}>
            {icon}<span className="text-[10px] font-medium">{label.split(' ')[0]}</span>
          </button>;
        })}
      </nav>

      {toastData && <Toast msg={toastData.msg} type={toastData.type} onClose={function(){setToastData(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(function() {
  const ls = document.getElementById('loading-screen');
  if (ls) ls.style.display = 'none';
}, 100);

} catch (err) {
  var b = document.getElementById('error-banner');
  if (b) { b.style.display = 'block'; b.innerHTML = '<b>⚠️ Error</b><br><br>' + (err.message || err) + '<br><br>Coba <b>Ctrl+Shift+R</b>.'; }
  var ls = document.getElementById('loading-screen'); if (ls) ls.style.display = 'none';
}
</script>
</body>
</html>
