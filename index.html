// ====== KONFIGURASI ======
// GANTI URL ini dengan exec URL Apps Script milikmu setelah deploy
const API_URL = 'https://script.google.com/macros/s/AKfycbxYfD1f8wr73FxdXCOw8EagYmQhK3TKPB0VgRKGopXt7wKzwIgQK5bM-AmfkOskMkkEfA/exec';

// ====== KONSTANTA ======
const COLORS = {
  paper: '#F4F2EC', surface: '#FFFFFF', ink: '#172A1F',
  green: '#15663E', deep: '#0E4429', lime: '#9BCB3C',
  amber: '#D99A1C', muted: '#6E7B70', line: '#E3E0D6', danger: '#B7472E',
};
const CAT_COLORS = ['#15663E','#9BCB3C','#D99A1C','#3E8E7E','#B7472E','#5C7AAE','#A07F3E'];
const fmt = n => 'Rp ' + new Intl.NumberFormat('id-ID').format(Math.round(n||0));
const fmtShort = n => {
  if (!n) return 'Rp 0';
  if (n >= 1e9) return 'Rp ' + (n/1e9).toFixed(1) + ' M';
  if (n >= 1e6) return 'Rp ' + (n/1e6).toFixed(1) + ' jt';
  if (n >= 1e3) return 'Rp ' + (n/1e3).toFixed(0) + ' rb';
  return 'Rp ' + n;
};

// ====== API CLIENT ======
async function api(action, params = {}) {
  // Pakai GET untuk simpel; semua diserialize sbg query string
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(k => {
    if (params[k] !== undefined && params[k] !== null) {
      url.searchParams.set(k, typeof params[k] === 'object' ? JSON.stringify(params[k]) : String(params[k]));
    }
  });
  try {
    const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
    return await res.json();
  } catch (e) {
    return { ok: false, error: 'Koneksi gagal: ' + e.message };
  }
}

// Upload file pakai POST karena base64-nya panjang
async function apiUpload(action, params) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...params }),
    });
    return await res.json();
  } catch (e) {
    return { ok: false, error: 'Upload gagal: ' + e.message };
  }
}

// ====== UI ATOM ======
const Eyebrow = ({ children }) => (
  <div className="text-[11px] font-semibold uppercase mb-1" style={{ color: COLORS.muted, letterSpacing: '0.14em' }}>{children}</div>
);
const Btn = ({ children, onClick, kind='solid', disabled, full, type='button' }) => {
  const styles = kind === 'solid'
    ? { background: disabled ? COLORS.muted : COLORS.green, color: '#fff' }
    : kind === 'danger' ? { background: COLORS.danger, color: '#fff' }
    : { background: 'transparent', color: COLORS.green, border: `1px solid ${COLORS.line}` };
  return <button type={type} onClick={onClick} disabled={disabled}
    style={{ ...styles, opacity: disabled ? 0.6 : 1, width: full ? '100%' : 'auto' }}
    className="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-semibold transition">{children}</button>;
};
const Card = ({ children, pad=true, className='' }) => (
  <div className={"rounded-xl " + className} style={{ background: COLORS.surface, border: `1px solid ${COLORS.line}`, padding: pad ? 20 : 0 }}>{children}</div>
);
const Field = ({ label, children, hint }) => (
  <label className="block mb-4">
    <div className="text-sm font-medium mb-1.5" style={{ color: COLORS.ink }}>{label}</div>
    {children}
    {hint && <div className="text-xs mt-1" style={{ color: COLORS.muted }}>{hint}</div>}
  </label>
);
const inputStyle = { width: '100%', border: `1px solid ${COLORS.line}`, borderRadius: 8, padding: '10px 12px', fontSize: 14, background: '#fff', color: COLORS.ink, outline: 'none' };

const Toast = ({ msg, type, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  return <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 rounded-lg px-4 py-2.5 text-sm font-medium shadow-lg"
    style={{ background: type === 'error' ? COLORS.danger : COLORS.deep, color: '#fff' }}>{msg}</div>;
};

// ============================================================
//  LOGIN
// ============================================================
function Login({ onLogin, toast }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!username || !password) { toast('Isi username dan password', 'error'); return; }
    setLoading(true);
    const res = await api('login', { username, password });
    setLoading(false);
    if (res.ok) onLogin(res.data);
    else toast(res.error || 'Login gagal', 'error');
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-5" style={{ background: COLORS.paper }}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="inline-flex items-center gap-2.5 mb-2">
            <div className="rounded-xl flex items-center justify-center" style={{ width: 46, height: 46, background: COLORS.green, color: '#fff' }}>{I.wallet}</div>
            <div className="text-left">
              <div className="text-xl font-bold" style={{ color: COLORS.ink }}>Keuangan MBG</div>
              <div className="text-xs" style={{ color: COLORS.muted }}>Makan Bergizi Gratis · Koperasi ISS</div>
            </div>
          </div>
        </div>
        <Card>
          <Eyebrow>Masuk ke akun</Eyebrow>
          <Field label="Username">
            <input value={username} onChange={e=>setUsername(e.target.value)} style={inputStyle} placeholder="cth. akuntan1" autoCapitalize="off" />
          </Field>
          <Field label="Password">
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} style={inputStyle} placeholder="••••••••" />
          </Field>
          <Btn full onClick={submit} disabled={loading}>
            {loading ? I.spinner : I.arrowR} {loading ? 'Memeriksa…' : 'Masuk'}
          </Btn>
        </Card>
        <p className="text-center text-xs mt-4" style={{ color: COLORS.muted }}>
          Lupa password? Hubungi Super Admin.
        </p>
      </div>
    </div>
  );
}

// ============================================================
//  DASHBOARD
// ============================================================
function KPICard({ icon, label, value, sub, accent }) {
  return (
    <Card>
      <div className="flex items-start justify-between">
        <div className="min-w-0 flex-1">
          <div className="text-xs font-medium truncate" style={{ color: COLORS.muted }}>{label}</div>
          <div className="text-xl sm:text-2xl font-bold mt-1 num truncate" style={{ color: COLORS.ink }}>{value}</div>
          {sub && <div className="text-xs mt-1 truncate" style={{ color: accent || COLORS.muted }}>{sub}</div>}
        </div>
        <div className="rounded-lg flex items-center justify-center shrink-0 ml-2" style={{ width: 38, height: 38, background: COLORS.paper, color: COLORS.green }}>{icon}</div>
      </div>
    </Card>
  );
}

function Dashboard({ session, scope, toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    const res = await api('getDashboard', {
      role: session.user.role, dapur: session.user.dapur || '', scope: scope || 'ALL'
    });
    setLoading(false);
    if (res.ok) setData(res.data);
    else toast(res.error || 'Gagal memuat dashboard', 'error');
  }, [session, scope]);

  useEffect(() => { load(); }, [load]);

  if (loading) return <Card><div className="flex items-center gap-2 text-sm" style={{ color: COLORS.muted }}>{I.spinner} Memuat…</div></Card>;
  if (!data) return <Card>Tidak ada data.</Card>;

  const k = data.kpi;
  return (
    <div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
        <KPICard icon={I.team} label="Penerima Manfaat" value={new Intl.NumberFormat('id-ID').format(k.penerima)} sub="porsi/hari" />
        <KPICard icon={I.wallet} label="Total Dana" value={fmtShort(k.totalDana)} sub={`VA ${fmtShort(k.saldoVA)}`} />
        <KPICard icon={I.trend} label="Pengeluaran (riil)" value={fmtShort(k.totalRiil)} sub={`${k.serap}% terserap`} accent={COLORS.amber} />
        <KPICard icon={I.receipt} label="Sisa Saldo" value={fmtShort(k.sisa)} sub={`dari ${fmtShort(k.totalDana)}`} accent={COLORS.green} />
      </div>

      <div className="grid lg:grid-cols-3 gap-3 mb-3">
        <Card>
          <Eyebrow>Distribusi per Jenis</Eyebrow>
          {data.byJenis.length === 0 ? <p className="text-sm py-8 text-center" style={{ color: COLORS.muted }}>Belum ada transaksi.</p> : (
            <div style={{ height: 220 }}>
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={data.byJenis} dataKey="value" nameKey="name" innerRadius={48} outerRadius={80} paddingAngle={2}>
                    {data.byJenis.map((_,i)=><Cell key={i} fill={CAT_COLORS[i%CAT_COLORS.length]}/>)}
                  </Pie>
                  <Tooltip formatter={v=>fmt(v)}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
          )}
          <div className="flex flex-wrap gap-x-3 gap-y-1 mt-2">
            {data.byJenis.map((j,i)=>(
              <div key={j.name} className="flex items-center gap-1.5 text-xs" style={{ color: COLORS.muted }}>
                <span style={{ width: 9, height: 9, borderRadius: 2, background: CAT_COLORS[i%CAT_COLORS.length] }}/>{j.name}
              </div>
            ))}
          </div>
        </Card>

        <Card className="lg:col-span-2">
          <Eyebrow>Penggunaan Anggaran per Kategori</Eyebrow>
          {data.byKategori.length === 0 ? <p className="text-sm py-8 text-center" style={{ color: COLORS.muted }}>Belum ada data.</p> : (
            <div style={{ height: 260 }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={data.byKategori} layout="vertical" margin={{ left: 4, right: 16 }}>
                  <CartesianGrid horizontal={false} stroke={COLORS.line} />
                  <XAxis type="number" tickFormatter={fmtShort} tick={{ fontSize: 11, fill: COLORS.muted }}/>
                  <YAxis type="category" dataKey="name" width={110} tick={{ fontSize: 11, fill: COLORS.ink }}/>
                  <Tooltip formatter={v=>fmt(v)} />
                  <Bar dataKey="value" fill={COLORS.green} radius={[0,4,4,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          )}
        </Card>
      </div>

      <Card>
        <Eyebrow>Pengeluaran Harian (riil)</Eyebrow>
        {data.byDay.length === 0 ? <p className="text-sm py-8 text-center" style={{ color: COLORS.muted }}>Belum ada transaksi.</p> : (
          <div style={{ height: 220 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={data.byDay} margin={{ left: 4, right: 8 }}>
                <CartesianGrid vertical={false} stroke={COLORS.line} />
                <XAxis dataKey="tanggal" tick={{ fontSize: 10, fill: COLORS.muted }}/>
                <YAxis tickFormatter={fmtShort} tick={{ fontSize: 11, fill: COLORS.muted }} width={62}/>
                <Tooltip formatter={v=>fmt(v)} />
                <Bar dataKey="value" fill={COLORS.lime} radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        )}
        <div className="text-xs mt-2" style={{ color: COLORS.muted }}>
          Total unriil (pengajuan): <b style={{ color: COLORS.ink }}>{fmt(k.totalUnriil)}</b> · Selisih vs riil: {fmt(k.totalUnriil - k.totalRiil)}
        </div>
      </Card>
    </div>
  );
}

// ============================================================
//  INPUT TRANSAKSI
// ============================================================
function InputTransaksi({ session, toast, onSaved }) {
  const [kategoriMap, setKategoriMap] = useState({});
  const [step, setStep] = useState(1);
  const [jenis, setJenis] = useState(null);
  const [form, setForm] = useState({
    tanggal: new Date().toISOString().substring(0,10),
    sumber: 'VA', uraian: '', kategori: '', riil: '', unriil: '',
  });
  const [bukti, setBukti] = useState(null); // File
  const [uploading, setUploading] = useState(false);

  useEffect(() => { api('getKategori').then(r => r.ok && setKategoriMap(r.data)); }, []);

  const set = (k,v) => setForm(f => ({ ...f, [k]: v }));
  const valid = form.uraian && form.kategori && form.riil;

  const fileToBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });

  const submit = async () => {
    setUploading(true);
    let bukti_url = '';
    if (bukti) {
      const b64 = await fileToBase64(bukti);
      const up = await apiUpload('uploadBukti', { fileData: b64, fileName: bukti.name, mimeType: bukti.type });
      if (up.ok) bukti_url = up.data.url;
      else { toast('Gagal upload bukti: ' + up.error, 'error'); setUploading(false); return; }
    }
    const res = await api('addTransaksi', {
      role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      tanggal: form.tanggal, jenis, kategori: form.kategori, uraian: form.uraian,
      sumber: form.sumber, riil: form.riil, unriil: form.unriil || form.riil, bukti_url,
    });
    setUploading(false);
    if (res.ok) {
      toast('Transaksi tersimpan');
      setStep(1); setJenis(null); setBukti(null);
      setForm({ tanggal: new Date().toISOString().substring(0,10), sumber: 'VA', uraian: '', kategori: '', riil: '', unriil: '' });
      onSaved && onSaved();
    } else toast(res.error || 'Gagal menyimpan', 'error');
  };

  if (step === 1) {
    return (
      <Card>
        <Eyebrow>Langkah 1 dari 2</Eyebrow>
        <h2 className="text-lg font-bold mb-1" style={{ color: COLORS.ink }}>Pilih jenis transaksi</h2>
        <p className="text-sm mb-4" style={{ color: COLORS.muted }}>Menentukan daftar kategori di langkah berikutnya.</p>
        <div className="grid grid-cols-2 gap-2.5">
          {Object.keys(kategoriMap).map(j => (
            <button key={j} onClick={()=>{ setJenis(j); setStep(2); }}
              className="rounded-lg p-4 text-left transition hover:bg-gray-50"
              style={{ border: `1px solid ${COLORS.line}`, background: '#fff' }}>
              <div className="font-semibold text-sm" style={{ color: COLORS.ink }}>{j}</div>
              <div className="text-xs mt-0.5" style={{ color: COLORS.muted }}>{kategoriMap[j].length} kategori</div>
            </button>
          ))}
        </div>
      </Card>
    );
  }

  return (
    <Card>
      <button onClick={()=>setStep(1)} className="inline-flex items-center gap-1.5 text-sm mb-3" style={{ color: COLORS.green }}>
        {I.arrowL} {jenis}
      </button>
      <Eyebrow>Langkah 2 dari 2 · Detail transaksi</Eyebrow>
      <div className="grid sm:grid-cols-2 gap-x-4 mt-2">
        <Field label="Tanggal transaksi"><input type="date" value={form.tanggal} onChange={e=>set('tanggal', e.target.value)} style={inputStyle}/></Field>
        <Field label="Sumber dana">
          <div className="flex gap-2">
            {['VA','Petty Cash'].map(s=>(
              <button key={s} onClick={()=>set('sumber', s)} className="flex-1 rounded-lg py-2.5 text-sm font-medium"
                style={{ border: `1px solid ${form.sumber===s?COLORS.green:COLORS.line}`,
                         background: form.sumber===s?COLORS.paper:'#fff',
                         color: form.sumber===s?COLORS.green:COLORS.muted }}>{s}</button>
            ))}
          </div>
        </Field>
        <Field label="Kategori">

        </Field>
        <Field label="Uraian transaksi"><input value={form.uraian} onChange={e=>set('uraian', e.target.value)} placeholder="cth. Ayam potong 60kg" style={inputStyle}/></Field>
        <Field label="Jumlah riil" hint="Realisasi aktual yang dibayar"><input type="number" value={form.riil} onChange={e=>set('riil', e.target.value)} placeholder="0" style={inputStyle}/></Field>
        <Field label="Jumlah unriil" hint="Nilai pengajuan / anggaran (boleh dikosongkan)"><input type="number" value={form.unriil} onChange={e=>set('unriil', e.target.value)} placeholder="0" style={inputStyle}/></Field>
      </div>
      <Field label="Bukti transaksi" hint="Foto nota, gambar, atau PDF — akan tersimpan ke Google Drive">
        <label className="flex flex-col items-center justify-center gap-1 rounded-lg py-6 cursor-pointer"
          style={{ border: `1.5px dashed ${COLORS.line}`, color: COLORS.muted }}>
          <div className="flex items-center gap-2">{I.image} {I.file}</div>
          <span className="text-sm">{bukti ? bukti.name : 'Ketuk untuk pilih / ambil foto'}</span>
          <input type="file" className="hidden" accept="image/*,application/pdf" capture="environment"
            onChange={e=>setBukti(e.target.files[0])}/>
        </label>
      </Field>
      <Btn full disabled={!valid || uploading} onClick={submit}>
        {uploading ? I.spinner : I.check} {uploading ? 'Menyimpan…' : 'Simpan transaksi'}
      </Btn>
    </Card>
  );
}

// ============================================================
//  SETUP PERIODE
// ============================================================
function SetupPeriode({ session, toast }) {
  const [f, setF] = useState({ periode: '', penerima: '', saldoVA: '', saldoPetty: '' });
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const set = (k,v) => setF(p => ({ ...p, [k]: v }));

  useEffect(() => {
    api('getSetup', { dapur: session.user.dapur }).then(r => {
      setLoading(false);
      if (r.ok && r.data) setF({ periode: r.data.periode, penerima: r.data.penerima, saldoVA: r.data.saldoVA, saldoPetty: r.data.saldoPetty });
    });
  }, []);

  const submit = async () => {
    if (!f.periode) { toast('Isi periode', 'error'); return; }
    setSaving(true);
    const res = await api('saveSetup', {
      role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      periode: f.periode, penerima: f.penerima, saldoVA: f.saldoVA, saldoPetty: f.saldoPetty,
    });
    setSaving(false);
    if (res.ok) toast('Setup tersimpan');
    else toast(res.error || 'Gagal menyimpan', 'error');
  };

  if (loading) return <Card>{I.spinner}</Card>;

  return (
    <Card>
      <Eyebrow>Awal periode</Eyebrow>
      <h2 className="text-lg font-bold mb-4" style={{ color: COLORS.ink }}>Setup data awal</h2>
      <div className="grid sm:grid-cols-2 gap-x-4">
        <Field label="Periode" hint="cth. Juni 2026"><input value={f.periode} onChange={e=>set('periode', e.target.value)} style={inputStyle}/></Field>
        <Field label="Jumlah penerima manfaat" hint="porsi per hari"><input type="number" value={f.penerima} onChange={e=>set('penerima', e.target.value)} style={inputStyle}/></Field>
        <Field label="Saldo VA awal"><input type="number" value={f.saldoVA} onChange={e=>set('saldoVA', e.target.value)} style={inputStyle}/></Field>
        <Field label="Saldo Petty Cash awal"><input type="number" value={f.saldoPetty} onChange={e=>set('saldoPetty', e.target.value)} style={inputStyle}/></Field>
      </div>
      <Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan setup</Btn>
    </Card>
  );
}

// ============================================================
//  RIWAYAT + EXPORT CSV
// ============================================================
function exportCSV(rows, dapurMap) {
  const head = ['Tanggal','Dapur','Jenis','Kategori','Uraian','Sumber','Riil','Unriil','Bukti'];
  const esc = (v) => {
    const s = String(v == null ? '' : v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const body = rows.map(r => [r.tanggal, dapurMap[r.dapur]||r.dapur, r.jenis, r.kategori, r.uraian, r.sumber, r.riil, r.unriil, r.bukti_url].map(esc).join(','));
  // BOM agar buka di Excel utf-8 aman
  const csv = '\ufeff' + [head.join(','), ...body].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `laporan-keuangan-mbg-${new Date().toISOString().substring(0,10)}.csv`;
  a.click();
}

function Riwayat({ session, scope, toast }) {
  const [rows, setRows] = useState([]);
  const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState('');

  useEffect(() => {
    Promise.all([
      api('getTransaksi', { role: session.user.role, dapur: session.user.dapur || '', scope: scope || 'ALL' }),
      api('getDapur'),
    ]).then(([t, d]) => {
      setLoading(false);
      if (t.ok) setRows(t.data);
      if (d.ok) setDapur(d.data);
    });
  }, [scope]);

  const dapurMap = useMemo(() => Object.fromEntries(dapur.map(d => [d.id, d.nama])), [dapur]);
  const filtered = useMemo(() => {
    if (!q.trim()) return rows;
    const t = q.toLowerCase();
    return rows.filter(r => (r.uraian||'').toLowerCase().includes(t) || (r.kategori||'').toLowerCase().includes(t) || (r.jenis||'').toLowerCase().includes(t));
  }, [rows, q]);

  if (loading) return <Card>{I.spinner}</Card>;

  return (
    <Card pad={false}>
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-4" style={{ borderBottom: `1px solid ${COLORS.line}` }}>
        <div>
          <div className="font-bold" style={{ color: COLORS.ink }}>Riwayat Transaksi</div>
          <div className="text-xs" style={{ color: COLORS.muted }}>{filtered.length} transaksi</div>
        </div>
        <div className="flex items-center gap-2">
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Cari uraian / kategori…"
            style={{ ...inputStyle, width: 220, padding: '8px 10px', fontSize: 13 }} />
          <Btn kind="ghost" onClick={()=>exportCSV(filtered, dapurMap)}>{I.download} Unduh Sheet</Btn>
        </div>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm" style={{ minWidth: 760 }}>
          <thead>
            <tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
              <th className="px-4 py-2.5 font-semibold">Tanggal</th>
              {scope === 'ALL' && <th className="px-4 py-2.5 font-semibold">Dapur</th>}
              <th className="px-4 py-2.5 font-semibold">Uraian</th>
              <th className="px-4 py-2.5 font-semibold">Kategori</th>
              <th className="px-4 py-2.5 font-semibold">Sumber</th>
              <th className="px-4 py-2.5 font-semibold text-right">Riil</th>
              <th className="px-4 py-2.5 font-semibold text-right">Unriil</th>
              <th className="px-4 py-2.5 font-semibold">Bukti</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="8" className="px-4 py-8 text-center" style={{ color: COLORS.muted }}>Belum ada transaksi.</td></tr>
            ) : filtered.map(r => (
              <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.line}` }}>
                <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{r.tanggal}</td>
                {scope === 'ALL' && <td className="px-4 py-2.5 text-xs" style={{ color: COLORS.muted }}>{dapurMap[r.dapur]||r.dapur}</td>}
                <td className="px-4 py-2.5" style={{ color: COLORS.ink }}>{r.uraian}
                  <span className="ml-2 text-xs rounded px-1.5 py-0.5" style={{ background: COLORS.paper, color: COLORS.muted }}>{r.jenis}</span>
                </td>
                <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{r.kategori}</td>
                <td className="px-4 py-2.5">
                  <span className="text-xs rounded px-2 py-0.5"
                    style={{ background: r.sumber==='VA'?'#E8F1EC':'#F6EEDD', color: r.sumber==='VA'?COLORS.green:COLORS.amber }}>{r.sumber}</span>
                </td>
                <td className="px-4 py-2.5 text-right font-medium num" style={{ color: COLORS.ink }}>{fmt(r.riil)}</td>
                <td className="px-4 py-2.5 text-right num" style={{ color: COLORS.muted }}>{fmt(r.unriil)}</td>
                <td className="px-4 py-2.5">
                  {r.bukti_url ? <a href={r.bukti_url} target="_blank" rel="noopener" className="inline-flex items-center gap-1 text-xs" style={{ color: COLORS.green }}>{I.file} lihat</a> : <span className="text-xs" style={{ color: COLORS.muted }}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

// ============================================================
//  USERS (admin)
// ============================================================
function Pengguna({ session, toast }) {
  const [rows, setRows] = useState([]);
  const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);
  const [f, setF] = useState({ username:'', password:'', nama:'', target_role:'akuntan', dapur:'' });

  const load = () => {
    setLoading(true);
    Promise.all([
      api('getUsers', { role: session.user.role }),
      api('getDapur'),
    ]).then(([u, d]) => {
      setLoading(false);
      if (u.ok) setRows(u.data);
      if (d.ok) setDapur(d.data);
    });
  };
  useEffect(load, []);

  const submit = async () => {
    if (!f.username || !f.password || !f.nama) { toast('Lengkapi data', 'error'); return; }
    const res = await api('addUser', { role: session.user.role, ...f });
    if (res.ok) { toast('User ditambahkan'); setOpen(false); setF({ username:'', password:'', nama:'', target_role:'akuntan', dapur:'' }); load(); }
    else toast(res.error, 'error');
  };

  if (loading) return <Card>{I.spinner}</Card>;
  const dapurMap = Object.fromEntries(dapur.map(d => [d.id, d.nama]));

  return (
    <>
      <Card pad={false}>
        <div className="flex items-center justify-between p-4" style={{ borderBottom: `1px solid ${COLORS.line}` }}>
          <div>
            <div className="font-bold" style={{ color: COLORS.ink }}>Manajemen Pengguna</div>
            <div className="text-xs" style={{ color: COLORS.muted }}>{rows.length} akun terdaftar</div>
          </div>
          <Btn onClick={()=>setOpen(true)}>{I.plus} Tambah User</Btn>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm" style={{ minWidth: 600 }}>
            <thead>
              <tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
                <th className="px-4 py-2.5 font-semibold">Nama</th>
                <th className="px-4 py-2.5 font-semibold">Username</th>
                <th className="px-4 py-2.5 font-semibold">Peran</th>
                <th className="px-4 py-2.5 font-semibold">Dapur</th>
                <th className="px-4 py-2.5 font-semibold">Status</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(u => (
                <tr key={u.id} style={{ borderTop: `1px solid ${COLORS.line}` }}>
                  <td className="px-4 py-2.5 font-medium" style={{ color: COLORS.ink }}>{u.nama}</td>
                  <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{u.username}</td>
                  <td className="px-4 py-2.5"><span className="text-xs rounded px-2 py-0.5" style={{ background: COLORS.paper, color: COLORS.green }}>{u.role}</span></td>
                  <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{u.dapur ? dapurMap[u.dapur] : '—'}</td>
                  <td className="px-4 py-2.5">
                    <span className="text-xs rounded px-2 py-0.5" style={{ background: u.aktif==='YA'?'#E8F1EC':'#FAE5DF', color: u.aktif==='YA'?COLORS.green:COLORS.danger }}>{u.aktif}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      {open && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.4)' }}>
          <Card className="w-full max-w-md">
            <Eyebrow>Tambah pengguna</Eyebrow>
            <Field label="Nama lengkap"><input value={f.nama} onChange={e=>setF({...f, nama:e.target.value})} style={inputStyle}/></Field>
            <Field label="Username"><input value={f.username} onChange={e=>setF({...f, username:e.target.value})} style={inputStyle} autoCapitalize="off"/></Field>
            <Field label="Password awal"><input value={f.password} onChange={e=>setF({...f, password:e.target.value})} style={inputStyle}/></Field>
            <Field label="Peran">
              <select value={f.target_role} onChange={e=>setF({...f, target_role:e.target.value})} style={inputStyle}>
                <option value="akuntan">Akuntan</option><option value="pic">PIC Dapur</option>
                <option value="yayasan">Yayasan</option><option value="admin">Admin</option>
              </select>
            </Field>
            {(f.target_role==='akuntan'||f.target_role==='pic') && (
              <Field label="Dapur">
                <select value={f.dapur} onChange={e=>setF({...f, dapur:e.target.value})} style={inputStyle}>
                  <option value="">Pilih dapur…</option>
                  {dapur.map(d => <option key={d.id} value={d.id}>{d.nama}</option>)}
                </select>
              </Field>
            )}
            <div className="flex gap-2">
              <Btn kind="ghost" onClick={()=>setOpen(false)}>Batal</Btn>
              <Btn onClick={submit}>{I.check} Simpan</Btn>
            </div>
          </Card>
        </div>
      )}
    </>
  );
}

// ============================================================
//  APP SHELL
// ============================================================
function App() {
  const [session, setSession] = useState(loadSession);
  const [view, setView] = useState('dash');
  const [scope, setScope] = useState('ALL');
  const [dapurList, setDapurList] = useState([]);
  const [toastData, setToastData] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);

  const toast = (msg, type='ok') => setToastData({ msg, type });

  useEffect(() => {
    if (session) {
      setScope(session.user.dapur || 'ALL');
      api('getDapur').then(r => r.ok && setDapurList(r.data));
    }
  }, [session]);

  if (!session) return (
    <>
      <Login onLogin={s => { saveSession(s); setSession(s); }} toast={toast} />
      {toastData && <Toast {...toastData} onClose={()=>setToastData(null)}/>}
    </>
  );

  const role = session.user.role;
  const navItems = {
    akuntan: [['dash','Dashboard',I.dash],['input','Input Transaksi',I.plus],['setup','Setup Periode',I.settings],['riwayat','Riwayat',I.list]],
    pic:     [['dash','Dashboard',I.dash],['riwayat','Riwayat',I.list]],
    yayasan: [['dash','Dashboard',I.dash],['riwayat','Riwayat',I.list]],
    admin:   [['dash','Dashboard',I.dash],['riwayat','Riwayat',I.list],['users','Pengguna',I.users]],
  }[role] || [];

  const canPickScope = role === 'yayasan' || role === 'admin';
  const effScope = canPickScope ? scope : session.user.dapur;
  const logout = () => { clearSession(); setSession(null); };

  return (
    <div className="min-h-screen flex flex-col" style={{ background: COLORS.paper, color: COLORS.ink }}>
      <header className="flex items-center justify-between px-4 sm:px-6 py-3" style={{ background: COLORS.surface, borderBottom: `1px solid ${COLORS.line}` }}>
        <div className="flex items-center gap-2.5 min-w-0">
          <div className="rounded-lg flex items-center justify-center shrink-0" style={{ width: 34, height: 34, background: COLORS.green, color: '#fff' }}>{I.wallet}</div>
          <div className="min-w-0">
            <div className="font-bold text-sm leading-none truncate" style={{ color: COLORS.ink }}>Keuangan MBG</div>
            <div className="text-xs truncate" style={{ color: COLORS.muted }}>{session.user.nama}</div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          {canPickScope && (view==='dash'||view==='riwayat') && (
            <select value={scope} onChange={e=>setScope(e.target.value)}
              style={{ ...inputStyle, width: 'auto', padding: '7px 10px', fontSize: 13 }}>
              <option value="ALL">Semua dapur</option>
              {dapurList.map(d => <option key={d.id} value={d.id}>{d.nama}</option>)}
            </select>
          )}
          <button onClick={logout} className="inline-flex items-center gap-1.5 text-sm rounded-lg px-3 py-2"
            style={{ color: COLORS.muted, border: `1px solid ${COLORS.line}` }}>{I.logout} <span className="hidden sm:inline">Keluar</span></button>
        </div>
      </header>

      <div className="flex flex-1">
        <nav className="hidden md:flex flex-col gap-1 p-3 w-56 shrink-0" style={{ borderRight: `1px solid ${COLORS.line}` }}>
          {navItems.map(([k,label,icon])=>(
            <button key={k} onClick={()=>setView(k)}
              className="flex items-center gap-2.5 rounded-lg px-3 py-2.5 text-sm font-medium text-left transition"
              style={{ background: view===k?COLORS.green:'transparent', color: view===k?'#fff':COLORS.ink }}>
              {icon} {label}
            </button>
          ))}
        </nav>

        <main className="flex-1 p-4 sm:p-6 pb-24 md:pb-6">
          {view === 'dash'    && <Dashboard key={'d'+refreshKey} session={session} scope={effScope} toast={toast}/>}
          {view === 'input'   && <InputTransaksi session={session} toast={toast} onSaved={()=>{ setRefreshKey(k=>k+1); setView('riwayat'); }}/>}
          {view === 'setup'   && <SetupPeriode session={session} toast={toast}/>}
          {view === 'riwayat' && <Riwayat key={'r'+refreshKey} session={session} scope={effScope} toast={toast}/>}
          {view === 'users'   && <Pengguna session={session} toast={toast}/>}
        </main>
      </div>

      <nav className="md:hidden fixed bottom-0 left-0 right-0 flex justify-around py-2" style={{ background: COLORS.surface, borderTop: `1px solid ${COLORS.line}` }}>
        {navItems.map(([k,label,icon])=>(
          <button key={k} onClick={()=>setView(k)} className="flex flex-col items-center gap-0.5 px-2 py-1"
            style={{ color: view===k?COLORS.green:COLORS.muted }}>
            {icon}<span className="text-[10px] font-medium">{label.split(' ')[0]}</span>
          </button>
        ))}
      </nav>

      {toastData && <Toast {...toastData} onClose={()=>setToastData(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
