          <select value={selDapur} onChange={function(e){setSelDapur(e.target.value);}}
            style={Object.assign({}, inputStyle, { width: 'auto', padding: '8px 10px', fontSize: 13 })}>
            <option value="ALL">Semua dapur</option>
            {dapur.map(function(d){ return <option key={d.id} value={d.id}>{d.nama}</option>; })}
          </select>
        </div>
      </div>

      <div className="p-4 pb-2">
        <div className="rounded-lg p-3 mb-2 flex items-start gap-2" style={{ background: '#FAE5DF' }}>
          <span style={{ color: COLORS.danger }}>{I.warn}</span>
          <div className="text-xs" style={{ color: COLORS.ink }}>
            <b>Hati-hati:</b> Menghapus periode akan ikut menghapus <b>semua transaksi, top-up VA, dan top-up Petty Cash</b> di periode itu. Tindakan ini permanen dan tidak bisa dibatalkan.
          </div>
        </div>
      </div>

      {loading ? <div className="p-6">{I.spinner}</div> : (
        <div className="overflow-x-auto">
          <table className="w-full text-sm" style={{ minWidth: 700 }}>
            <thead>
              <tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
                <th className="px-4 py-2.5 font-semibold">Dapur</th>
                <th className="px-4 py-2.5 font-semibold">Periode</th>
                <th className="px-4 py-2.5 font-semibold">Rentang</th>
                <th className="px-4 py-2.5 font-semibold text-right">Saldo VA Awal</th>
                <th className="px-4 py-2.5 font-semibold">Status</th>
                <th className="px-4 py-2.5 font-semibold"></th>
              </tr>
            </thead>
            <tbody>
              {periodeList.length === 0 ? (
                <tr><td colSpan="6" className="px-4 py-8 text-center" style={{ color: COLORS.muted }}>Belum ada periode.</td></tr>
              ) : periodeList.map(function(p){
                return <tr key={p.id} style={{ borderTop: '1px solid ' + COLORS.line }}>
                  <td className="px-4 py-2.5" style={{ color: COLORS.ink }}>{dapurMap[p.dapur] || p.dapur}</td>
                  <td className="px-4 py-2.5 font-medium" style={{ color: COLORS.ink }}>Periode {p.periode_no}</td>
                  <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)}</td>

          <Btn kind="ghost" onClick={function(){setConfirmDel(null);}} disabled={deleting}>Batal</Btn>
          <Btn kind="danger" onClick={doDelete} disabled={deleting}>{deleting ? I.spinner : I.trash} Hapus Permanen</Btn>
        </div>
      </Modal>
    )}
  </>);
}

function Profil({ session, toast, onUpdated }) {
  const [f, setF] = useState({ nama: session.user.nama, username: session.user.username,
    password_lama: '', password_baru: '', password_baru2: '' });
  const [saving, setSaving] = useState(false);
  function set(k, v) { setF(function(p){ const n = Object.assign({}, p); n[k] = v; return n; }); }

  async function submit() {
    if (!f.nama || !f.username) { toast('Nama & username wajib', 'error'); return; }
    if (f.password_baru || f.password_baru2 || f.password_lama) {
      if (!f.password_lama) { toast('Isi password lama untuk ganti password', 'error'); return; }
      if (!f.password_baru) { toast('Isi password baru', 'error'); return; }
      if (f.password_baru !== f.password_baru2) { toast('Konfirmasi password tidak cocok', 'error'); return; }
    }
    setSaving(true);
    const payload = { user_id: session.user.id, nama: f.nama, username: f.username };
    if (f.password_baru) { payload.password_lama = f.password_lama; payload.password_baru = f.password_baru; }
    const res = await api('updateMyProfile', payload);
    setSaving(false);
    if (res.ok) {
      toast('Profil tersimpan');
      onUpdated && onUpdated({ nama: f.nama, username: f.username });
      set('password_lama', ''); set('password_baru', ''); set('password_baru2', '');
    } else toast(res.error || 'Gagal simpan', 'error');
  }

  return (
    <div className="max-w-xl">
      <Card className="mb-3">
        <Eyebrow>Akun saya</Eyebrow>
        <div className="grid grid-cols-2 gap-3 mt-2 mb-3">
          <div className="rounded p-3" style={{ background: COLORS.paper }}>
            <div className="text-xs" style={{ color: COLORS.muted }}>Peran</div>
            <div className="font-semibold" style={{ color: COLORS.ink, textTransform: 'capitalize' }}>{session.user.role}</div>
          </div>
          <div className="rounded p-3" style={{ background: COLORS.paper }}>
            <div className="text-xs" style={{ color: COLORS.muted }}>Dapur</div>
            <div className="font-semibold" style={{ color: COLORS.ink }}>{session.user.dapur || '—'}</div>
          </div>
        </div>
        <Field label="Nama lengkap"><input value={f.nama} onChange={function(e){set('nama', e.target.value);}} style={inputStyle}/></Field>
        <Field label="Username"><input value={f.username} onChange={function(e){set('username', e.target.value);}} style={inputStyle} autoCapitalize="off"/></Field>
      </Card>
      <Card>
        <Eyebrow>Ganti password</Eyebrow>
        <p className="text-xs mb-3 mt-1" style={{ color: COLORS.muted }}>Kosongkan semua field di bawah kalau tidak ingin ganti password.</p>
        <Field label="Password lama"><input type="password" value={f.password_lama} onChange={function(e){set('password_lama', e.target.value);}} style={inputStyle}/></Field>
        <Field label="Password baru"><input type="password" value={f.password_baru} onChange={function(e){set('password_baru', e.target.value);}} style={inputStyle}/></Field>
        <Field label="Konfirmasi password baru"><input type="password" value={f.password_baru2} onChange={function(e){set('password_baru2', e.target.value);}} style={inputStyle}/></Field>
        <Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan Perubahan</Btn>
      </Card>
    </div>
  );
}

// ============================================================
//  PENGGUNA (admin) — CRUD lengkap
// ============================================================
function Pengguna({ session, toast }) {
  const [rows, setRows] = useState([]); const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openAdd, setOpenAdd] = useState(false);
  const [editUser, setEditUser] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [revealPw, setRevealPw] = useState({});

  function load() {
    setLoading(true);
    Promise.all([api('getUsers', { role: session.user.role }), api('getDapur')]).then(function(arr){
      setLoading(false);
      if (arr[0].ok) setRows(arr[0].data); if (arr[1].ok) setDapur(arr[1].data);
    });
  }
  useEffect(load, []);

  const dapurMap = {}; dapur.forEach(function(d){ dapurMap[d.id] = d.nama; });

  async function doDelete() {
    const res = await api('deleteUser', { role: session.user.role, user_id: session.user.id, id: confirmDel.id });
    if (res.ok) { toast('User dihapus'); setConfirmDel(null); load(); }
    else toast(res.error, 'error');
  }

  if (loading) return <Card>{I.spinner}</Card>;

  return (<>
    <Card pad={false}>
      <div className="flex items-center justify-between p-4" style={{ borderBottom: '1px solid ' + COLORS.line }}>
        <div><div className="font-bold" style={{ color: COLORS.ink }}>Manajemen Pengguna</div><div className="text-xs" style={{ color: COLORS.muted }}>{rows.length} akun</div></div>
        <Btn onClick={function(){setOpenAdd(true);}}>{I.plus} Tambah User</Btn>
      </div>
      <div className="overflow-x-auto"><table className="w-full text-sm" style={{ minWidth: 700 }}>
        <thead><tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
          <th className="px-4 py-2.5 font-semibold">Nama</th>
          <th className="px-4 py-2.5 font-semibold">Username</th>
          <th className="px-4 py-2.5 font-semibold">Password</th>
          <th className="px-4 py-2.5 font-semibold">Peran</th>
          <th className="px-4 py-2.5 font-semibold">Dapur</th>
          <th className="px-4 py-2.5 font-semibold">Status</th>
          <th className="px-4 py-2.5 font-semibold"></th>
        </tr></thead>
        <tbody>{rows.map(function(u){
          return <tr key={u.id} style={{ borderTop: '1px solid ' + COLORS.line }}>
            <td className="px-4 py-2.5 font-medium" style={{ color: COLORS.ink }}>{u.nama}</td>
            <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{u.username}</td>
            <td className="px-4 py-2.5 text-xs">
              {revealPw[u.id] ? (
                <code style={{ color: COLORS.ink }}>{u.password}</code>
              ) : (
                <button onClick={function(){setRevealPw(Object.assign({}, revealPw, { [u.id]: true }));}}
                  className="text-xs underline" style={{ color: COLORS.muted }}>tampilkan</button>
              )}
            </td>
            <td className="px-4 py-2.5"><span className="text-xs rounded px-2 py-0.5" style={{ background: COLORS.paper, color: COLORS.green }}>{u.role}</span></td>
            <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{u.dapur ? (dapurMap[u.dapur] || u.dapur) : '—'}</td>
            <td className="px-4 py-2.5"><span className="text-xs rounded px-2 py-0.5" style={{ background: u.aktif==='YA'?'#E8F1EC':'#FAE5DF', color: u.aktif==='YA'?COLORS.green:COLORS.danger }}>{u.aktif}</span></td>
            <td className="px-4 py-2.5">
              <div className="flex gap-1 justify-end">
                <button onClick={function(){setEditUser(u);}} title="Edit"
                  style={{ color: COLORS.blue, border: '1px solid ' + COLORS.line, borderRadius: 6, padding: 5 }}>{I.edit}</button>
                {u.id !== session.user.id && (
                  <button onClick={function(){setConfirmDel(u);}} title="Hapus"
                    style={{ color: COLORS.danger, border: '1px solid ' + COLORS.line, borderRadius: 6, padding: 5 }}>{I.trash}</button>
                )}
              </div>
            </td>
          </tr>;
        })}</tbody>
      </table></div>
    </Card>

    {openAdd && <UserForm mode="add" session={session} toast={toast} dapur={dapur}
      onClose={function(){setOpenAdd(false);}} onSaved={load}/>}
    {editUser && <UserForm mode="edit" session={session} toast={toast} dapur={dapur} initial={editUser}
      onClose={function(){setEditUser(null);}} onSaved={load}/>}
    {confirmDel && (
      <ConfirmModal title="Hapus User"
        message={'Hapus user "' + confirmDel.nama + '" (' + confirmDel.username + ')? Tidak bisa dibatalkan.'}
        onConfirm={doDelete} onClose={function(){setConfirmDel(null);}} confirmLabel="Hapus" danger/>
    )}
  </>);
}

function UserForm({ mode, initial, dapur, session, toast, onClose, onSaved }) {
  const [f, setF] = useState(initial ? {
    username: initial.username, password: '', nama: initial.nama,
    target_role: initial.role, dapur: initial.dapur || '', aktif: initial.aktif,
  } : { username:'', password:'', nama:'', target_role:'akuntan', dapur:'', aktif: 'YA' });
  const [saving, setSaving] = useState(false);

  async function submit() {
    if (!f.username || !f.nama) { toast('Lengkapi data', 'error'); return; }
    if (mode === 'add' && !f.password) { toast('Password wajib untuk user baru', 'error'); return; }
    setSaving(true);
    const action = mode === 'edit' ? 'updateUser' : 'addUser';
    const payload = Object.assign({ role: session.user.role, user_id: session.user.id, target_role: f.target_role }, f);
    if (mode === 'edit') { payload.id = initial.id; if (!f.password) delete payload.password; }
    const res = await api(action, payload);
    setSaving(false);
    if (res.ok) { toast(mode==='edit'?'User diupdate':'User ditambahkan'); onSaved(); onClose(); }
    else toast(res.error, 'error');
  }

  return <Modal title={mode === 'edit' ? 'Edit pengguna' : 'Tambah pengguna'} onClose={onClose}>
    <Field label="Nama lengkap"><input value={f.nama} onChange={function(e){setF(Object.assign({}, f, {nama:e.target.value}));}} style={inputStyle}/></Field>
    <Field label="Username"><input value={f.username} onChange={function(e){setF(Object.assign({}, f, {username:e.target.value}));}} style={inputStyle} autoCapitalize="off"/></Field>
    <Field label={mode === 'edit' ? 'Password baru (kosongkan kalau tidak ganti)' : 'Password awal'}>
      <input value={f.password} onChange={function(e){setF(Object.assign({}, f, {password:e.target.value}));}} style={inputStyle}/>
    </Field>
    <Field label="Peran">
      <select value={f.target_role} onChange={function(e){setF(Object.assign({}, f, {target_role:e.target.value}));}} style={inputStyle}>
        <option value="akuntan">Akuntan</option><option value="pic">PIC Dapur</option>
        <option value="yayasan">Yayasan</option><option value="admin">Admin</option>
      </select>
    </Field>
    {(f.target_role==='akuntan'||f.target_role==='pic') && (
      <Field label="Dapur">
        <select value={f.dapur} onChange={function(e){setF(Object.assign({}, f, {dapur:e.target.value}));}} style={inputStyle}>
          <option value="">Pilih dapur…</option>
          {dapur.map(function(d){ return <option key={d.id} value={d.id}>{d.nama}</option>; })}
        </select>
      </Field>
    )}
    {mode === 'edit' && (
      <Field label="Status">
        <select value={f.aktif} onChange={function(e){setF(Object.assign({}, f, {aktif:e.target.value}));}} style={inputStyle}>
          <option value="YA">Aktif</option><option value="TIDAK">Non-aktif</option>
        </select>
      </Field>
    )}
    <div className="flex gap-2"><Btn kind="ghost" onClick={onClose}>Batal</Btn><Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan</Btn></div>
  </Modal>;
}

// ============================================================
//  DAPUR (admin) — CRUD
// ============================================================
function DapurPage({ session, toast }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openAdd, setOpenAdd] = useState(false);
  const [edit, setEdit] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  function load() {
    setLoading(true);
    api('getDapur').then(function(r){ setLoading(false); if (r.ok) setRows(r.data); });
  }
  useEffect(load, []);

  async function doDelete() {
    const res = await api('deleteDapur', { role: session.user.role, user_id: session.user.id, id: confirmDel.id });
    if (res.ok) { toast('Dapur dihapus'); setConfirmDel(null); load(); }
    else toast(res.error, 'error');
  }

  if (loading) return <Card>{I.spinner}</Card>;

  return (<>
    <Card pad={false}>
      <div className="flex items-center justify-between p-4" style={{ borderBottom: '1px solid ' + COLORS.line }}>
        <div><div className="font-bold" style={{ color: COLORS.ink }}>Manajemen Dapur</div><div className="text-xs" style={{ color: COLORS.muted }}>{rows.length} dapur</div></div>
        <Btn onClick={function(){setOpenAdd(true);}}>{I.plus} Tambah Dapur</Btn>
      </div>
      <div className="overflow-x-auto"><table className="w-full text-sm">
        <thead><tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
          <th className="px-4 py-2.5 font-semibold">ID</th>
          <th className="px-4 py-2.5 font-semibold">Nama</th>
          <th className="px-4 py-2.5 font-semibold">Alamat</th>
          <th className="px-4 py-2.5 font-semibold"></th>
        </tr></thead>
        <tbody>{rows.map(function(d){
          return <tr key={d.id} style={{ borderTop: '1px solid ' + COLORS.line }}>
            <td className="px-4 py-2.5 font-mono text-xs" style={{ color: COLORS.muted }}>{d.id}</td>
            <td className="px-4 py-2.5 font-medium" style={{ color: COLORS.ink }}>{d.nama}</td>
            <td className="px-4 py-2.5" style={{ color: COLORS.muted }}>{d.alamat || '—'}</td>
            <td className="px-4 py-2.5">
              <div className="flex gap-1 justify-end">
                <button onClick={function(){setEdit(d);}} title="Edit"
                  style={{ color: COLORS.blue, border: '1px solid ' + COLORS.line, borderRadius: 6, padding: 5 }}>{I.edit}</button>
                <button onClick={function(){setConfirmDel(d);}} title="Hapus"
                  style={{ color: COLORS.danger, border: '1px solid ' + COLORS.line, borderRadius: 6, padding: 5 }}>{I.trash}</button>
              </div>
            </td>
          </tr>;
        })}</tbody>
      </table></div>
    </Card>

    {openAdd && <DapurForm mode="add" session={session} toast={toast} onClose={function(){setOpenAdd(false);}} onSaved={load}/>}
    {edit && <DapurForm mode="edit" initial={edit} session={session} toast={toast} onClose={function(){setEdit(null);}} onSaved={load}/>}
    {confirmDel && (
      <ConfirmModal title="Hapus Dapur"
        message={'Hapus dapur "' + confirmDel.nama + '"? Hanya bisa kalau tidak ada user/transaksi yang terhubung.'}
        onConfirm={doDelete} onClose={function(){setConfirmDel(null);}} confirmLabel="Hapus" danger/>
    )}
  </>);
}

function DapurForm({ mode, initial, session, toast, onClose, onSaved }) {
  const [f, setF] = useState(initial || { nama: '', alamat: '' });
  const [saving, setSaving] = useState(false);

  async function submit() {
    if (!f.nama) { toast('Nama wajib', 'error'); return; }
    setSaving(true);
    const action = mode === 'edit' ? 'updateDapur' : 'addDapur';
    const payload = Object.assign({ role: session.user.role, user_id: session.user.id }, f);
    if (mode === 'edit') payload.id = initial.id;
    const res = await api(action, payload);
    setSaving(false);
    if (res.ok) { toast(mode==='edit'?'Dapur diupdate':'Dapur ditambahkan'); onSaved(); onClose(); }
    else toast(res.error, 'error');
  }

  return <Modal title={mode === 'edit' ? 'Edit dapur' : 'Tambah dapur'} onClose={onClose}>
    <Field label="Nama dapur"><input value={f.nama} onChange={function(e){setF(Object.assign({}, f, {nama:e.target.value}));}} style={inputStyle} placeholder="cth. SPPG Kebon Jeruk 01"/></Field>
    <Field label="Alamat" hint="Opsional"><input value={f.alamat} onChange={function(e){setF(Object.assign({}, f, {alamat:e.target.value}));}} style={inputStyle}/></Field>
    <div className="flex gap-2"><Btn kind="ghost" onClick={onClose}>Batal</Btn><Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan</Btn></div>
  </Modal>;
}

// ============================================================
//  APP SHELL
// ============================================================
function App() {
  const [session, setSession] = useState(loadSession);
  const [view, setView] = useState('dash');
  const [scope, setScope] = useState('ALL');
  const [dapurList, setDapurList] = useState([]);
  const [toastData, setToastData] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);

  function toast(msg, type) { setToastData({ msg: msg, type: type || 'ok' }); }

  useEffect(function() {
    if (session) {
      setScope(session.user.dapur || 'ALL');
      api('getDapur').then(function(r){ if (r.ok) setDapurList(r.data); });
    }
  }, [session]);

  if (!session) return (<>
    <Login onLogin={function(s){ saveSession(s); setSession(s); setView('dash'); }} toast={toast} />
    {toastData && <Toast msg={toastData.msg} type={toastData.type} onClose={function(){setToastData(null);}}/>}
  </>);

  const role = session.user.role;
  // Nav: setup, dash, input, laporan, riwayat, bukubesar, profil + (admin: pengguna, dapur)
  const navItems = ({
    akuntan: [
      ['setup','Setup',I.settings],
      ['dash','Dashboard',I.dash],
      ['input','Input',I.plus],
      ['laporan','Laporan',I.report],
      ['riwayat','Riwayat',I.list],
      ['bukubesar','Buku Besar',I.trend],
      ['profil','Profil',I.user],
    ],
    pic: [
      ['dash','Dashboard',I.dash],
      ['laporan','Laporan',I.report],
      ['riwayat','Riwayat',I.list],
      ['bukubesar','Buku Besar',I.trend],
      ['profil','Profil',I.user],
    ],
    yayasan: [
      ['dash','Dashboard',I.dash],
      ['laporan','Laporan',I.report],
      ['riwayat','Riwayat',I.list],
      ['bukubesar','Buku Besar',I.trend],
      ['profil','Profil',I.user],
    ],
    admin: [
      ['dash','Dashboard',I.dash],
      ['laporan','Laporan',I.report],
      ['riwayat','Riwayat',I.list],
      ['bukubesar','Buku Besar',I.trend],
      ['periode','Periode',I.settings],
      ['users','Pengguna',I.users],
      ['dapur','Dapur',I.building],
      ['profil','Profil',I.user],
    ],
  })[role] || [];

  const canPickScope = role === 'yayasan' || role === 'admin';
  const effScope = canPickScope ? scope : session.user.dapur;
  function logout() { clearSession(); setSession(null); }

  function onProfileUpdated(patch) {
    const newSession = Object.assign({}, session, { user: Object.assign({}, session.user, patch) });
    saveSession(newSession); setSession(newSession);
  }

  return (
    <div className="min-h-screen flex flex-col" style={{ background: COLORS.paper, color: COLORS.ink }}>
      <header className="sticky top-0 z-30 flex items-center justify-between gap-2 px-3 sm:px-6 py-3 no-print"
        style={{ background: COLORS.surface, borderBottom: '1px solid ' + COLORS.line, paddingTop: 'calc(env(safe-area-inset-top, 0px) + 12px)' }}>
        <div className="flex items-center gap-2 min-w-0">
          <div className="rounded-lg flex items-center justify-center shrink-0" style={{ width: 32, height: 32, background: COLORS.green, color: '#fff' }}>{I.wallet}</div>
          <div className="min-w-0">
            <div className="font-bold text-sm leading-tight truncate" style={{ color: COLORS.ink }}>Keuangan MBG</div>
            <div className="text-[11px] leading-tight truncate" style={{ color: COLORS.muted }}>{session.user.nama} · {session.user.role}</div>
          </div>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {canPickScope && (view==='dash'||view==='riwayat'||view==='laporan'||view==='bukubesar') && (
            <select value={scope} onChange={function(e){setScope(e.target.value);}}
              style={Object.assign({}, inputStyle, { width: 'auto', maxWidth: 120, padding: '6px 8px', fontSize: 12 })}>
              <option value="ALL">Semua dapur</option>
              {dapurList.map(function(d){ return <option key={d.id} value={d.id}>{d.nama}</option>; })}
            </select>
          )}
          <button onClick={logout} title="Keluar" className="inline-flex items-center gap-1.5 text-sm rounded-lg px-2.5 py-2 shrink-0"
            style={{ color: COLORS.muted, border: '1px solid ' + COLORS.line }}>{I.logout} <span className="hidden lg:inline">Keluar</span></button>
        </div>
      </header>

      <div className="flex flex-1">
        <nav className="hidden md:flex flex-col gap-1 p-3 w-56 shrink-0 no-print" style={{ borderRight: '1px solid ' + COLORS.line }}>
          {navItems.map(function(item){
            const k = item[0], label = item[1], icon = item[2];
            return <button key={k} onClick={function(){setView(k);}}
              className="flex items-center gap-2.5 rounded-lg px-3 py-2.5 text-sm font-medium text-left transition"
              style={{ background: view===k?COLORS.green:'transparent', color: view===k?'#fff':COLORS.ink }}>
              {icon} {label}
            </button>;
          })}
        </nav>

        <main className="flex-1 p-4 sm:p-6 overflow-x-hidden md:!pb-6" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 88px)' }}>
          {view === 'setup'   && <SetupPeriode session={session} toast={toast}/>}
          {view === 'dash'    && <Dashboard key={'d'+refreshKey} session={session} scope={effScope} toast={toast}/>}
          {view === 'input'   && <InputTransaksi session={session} toast={toast}
            onSaved={function(){ setRefreshKey(function(k){return k+1;}); setView('riwayat'); }}
            goToSetup={function(){setView('setup');}}/>}
          {view === 'laporan' && <Laporan session={session} scope={effScope} toast={toast}/>}
          {view === 'riwayat' && <Riwayat session={session} scope={effScope} toast={toast} refreshKey={refreshKey}/>}
          {view === 'bukubesar' && <BukuBesar session={session} scope={effScope} toast={toast}/>}
          {view === 'periode' && <PeriodeAdmin session={session} toast={toast}/>}
          {view === 'profil'  && <Profil session={session} toast={toast} onUpdated={onProfileUpdated}/>}
          {view === 'users'   && <Pengguna session={session} toast={toast}/>}
          {view === 'dapur'   && <DapurPage session={session} toast={toast}/>}
        </main>
      </div>

      <nav className="md:hidden fixed bottom-0 left-0 right-0 flex no-print"
        style={{ background: COLORS.surface, borderTop: '1px solid ' + COLORS.line, paddingBottom: 'env(safe-area-inset-bottom, 0px)', overflowX: 'auto', overflowY: 'hidden', WebkitOverflowScrolling: 'touch' }}>
        <div className="flex" style={{ width: navItems.length > 5 ? 'max-content' : '100%', minWidth: '100%' }}>
          {navItems.map(function(item){
            const k = item[0], label = item[1], icon = item[2];
            const active = view === k;
            return <button key={k} onClick={function(){setView(k);}}
              className="flex flex-col items-center justify-center gap-0.5 py-2 shrink-0"
              style={{ color: active?COLORS.green:COLORS.muted, flex: navItems.length > 5 ? '0 0 auto' : '1 1 0',
                       width: navItems.length > 5 ? 68 : 'auto', minWidth: navItems.length > 5 ? 68 : 0,
                       borderTop: active ? '2px solid ' + COLORS.green : '2px solid transparent' }}>
              {icon}<span className="text-[10px] font-medium whitespace-nowrap leading-none mt-0.5">{label}</span>
            </button>;
          })}
        </div>
      </nav>

      {toastData && <Toast msg={toastData.msg} type={toastData.type} onClose={function(){setToastData(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(function() {
  const ls = document.getElementById('loading-screen');
  if (ls) ls.style.display = 'none';
}, 100);

} catch (err) {
  var b = document.getElementById('error-banner');
  if (b) { b.style.display = 'block'; b.innerHTML = '<b>⚠️ Error</b><br><br>' + (err.message || err) + '<br><br>Coba <b>Ctrl+Shift+R</b>.'; }
  var ls = document.getElementById('loading-screen'); if (ls) ls.style.display = 'none';
}
</script>
</body>
