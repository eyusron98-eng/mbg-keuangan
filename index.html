<script>
  function showError(msg, src) {
    var b = document.getElementById('error-banner');
    if (!b) return;
    b.style.display = 'block';
    b.innerHTML = '<b>⚠️ Error</b><br>' + (src ? '<i>' + src + '</i><br>' : '') + String(msg) + '<br><br>Coba <b>Ctrl+Shift+R</b>.';
    var ls = document.getElementById('loading-screen'); if (ls) ls.style.display = 'none';
  }
  window.addEventListener('error', function(e) { showError((e.message || 'Unknown') + '\n' + (e.filename || ''), 'window.onerror'); });
  setTimeout(function() {
    var root = document.getElementById('root');
    if (root && root.children.length === 0) showError('React tidak ter-render dalam 15 detik.', 'timeout');
  }, 15000);
</script>

}

// Build ledger rows: Saldo Awal + VA Topups + Transaksi (sorted by date)
// mode: 'aktual' uses riil, 'anggaran' uses unriil
function buildLedger(saldoAwalVA, saldoAwalPetty, vaTopups, transaksi, mode) {
  const events = [];
  vaTopups.forEach(t => events.push({ tanggal: t.tanggal, type: 'topup_va', amount: t.jumlah, ket: t.keterangan, _ts: new Date(t.tanggal).getTime() }));
  transaksi.forEach(t => events.push({ tanggal: t.tanggal, type: 'transaksi', tx: t, amount: mode === 'anggaran' ? t.unriil : t.riil, _ts: new Date(t.tanggal).getTime() }));
  events.sort((a, b) => a._ts - b._ts);

  const saldoAwal = (saldoAwalVA || 0) + (saldoAwalPetty || 0);
  let running = saldoAwal;
  const rows = [];
  rows.push({ kind: 'awal', bulan: '-', tanggal: '-', no_bukti: '-', uraian: 'Saldo Awal Periode', debit: saldoAwal, kredit: 0, saldo: running });
  events.forEach(ev => {
    if (ev.type === 'topup_va') {
      running += ev.amount;
      rows.push({ kind: 'topup', bulan: getBulan(ev.tanggal), tanggal: ev.tanggal, no_bukti: '-',
        uraian: 'Top-up Saldo VA' + (ev.ket ? ' — ' + ev.ket : ''), debit: ev.amount, kredit: 0, saldo: running });
    } else {
      running -= ev.amount;
      rows.push({ kind: 'tx', bulan: getBulan(ev.tanggal), tanggal: ev.tanggal, no_bukti: ev.tx.no_bukti || '-',
        uraian: ev.tx.uraian, debit: 0, kredit: ev.amount, saldo: running,
        tx: ev.tx });
    }
  });
  return rows;
}

// Dual-mode ledger: 1 baris, 2 kolom Kredit (Aktual & Anggaran), 2 kolom Saldo
function buildDualLedger(saldoAwalVA, saldoAwalPetty, vaTopups, transaksi) {
  const events = [];
  vaTopups.forEach(t => events.push({ tanggal: t.tanggal, type: 'topup_va', amount: t.jumlah, ket: t.keterangan, _ts: new Date(t.tanggal).getTime() }));
  transaksi.forEach(t => events.push({ tanggal: t.tanggal, type: 'transaksi', tx: t, aktual: t.riil, anggaran: t.unriil, _ts: new Date(t.tanggal).getTime() }));
  events.sort((a, b) => a._ts - b._ts);

  const saldoAwal = (saldoAwalVA || 0) + (saldoAwalPetty || 0);
  let runAktual = saldoAwal, runAnggaran = saldoAwal;
  const rows = [];
  rows.push({ kind: 'awal', bulan: '-', tanggal: '-', no_bukti: '-', uraian: 'Saldo Awal Periode',
    debit: saldoAwal, kreditAktual: 0, kreditAnggaran: 0, saldoAktual: runAktual, saldoAnggaran: runAnggaran });
  events.forEach(ev => {
    if (ev.type === 'topup_va') {
      runAktual += ev.amount; runAnggaran += ev.amount;
      rows.push({ kind: 'topup', bulan: getBulan(ev.tanggal), tanggal: ev.tanggal, no_bukti: '-',
        uraian: 'Top-up Saldo VA' + (ev.ket ? ' — ' + ev.ket : ''),
        debit: ev.amount, kreditAktual: 0, kreditAnggaran: 0,
        saldoAktual: runAktual, saldoAnggaran: runAnggaran });
    } else {
      runAktual -= ev.aktual; runAnggaran -= ev.anggaran;
      rows.push({ kind: 'tx', bulan: getBulan(ev.tanggal), tanggal: ev.tanggal, no_bukti: ev.tx.no_bukti || '-',
        uraian: ev.tx.uraian, debit: 0,
        kreditAktual: ev.aktual, kreditAnggaran: ev.anggaran,
        saldoAktual: runAktual, saldoAnggaran: runAnggaran, tx: ev.tx });
    }
  });
  return rows;
}

function Login(props) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  async function submit() {
    if (!username || !password) { props.toast('Isi username dan password', 'error'); return; }
    setLoading(true);
    const res = await api('login', { username: username, password: password });
    setLoading(false);
    if (res.ok) props.onLogin(res.data); else props.toast(res.error || 'Login gagal', 'error');
  }
  return (
    <div className="min-h-screen flex items-center justify-center p-5" style={{ background: COLORS.paper }}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="inline-flex items-center gap-2.5 mb-2">
            <div className="rounded-xl flex items-center justify-center" style={{ width: 46, height: 46, background: COLORS.green, color: '#fff' }}>{I.wallet}</div>
            <div className="text-left">
              <div className="text-xl font-bold" style={{ color: COLORS.ink }}>Keuangan MBG</div>
              <div className="text-xs" style={{ color: COLORS.muted }}>Makan Bergizi Gratis · Koperasi ISS</div>
            </div>
          </div>
        </div>
        <Card>
          <Eyebrow>Masuk ke akun</Eyebrow>
          <Field label="Username"><input value={username} onChange={function(e){setUsername(e.target.value);}} style={inputStyle} placeholder="cth. akuntan1" autoCapitalize="off"/></Field>
          <Field label="Password"><input type="password" value={password} onChange={function(e){setPassword(e.target.value);}}
            onKeyDown={function(e){ if(e.key==='Enter') submit(); }} style={inputStyle} placeholder="••••••••"/></Field>
          <Btn full onClick={submit} disabled={loading}>{loading ? I.spinner : I.arrowR} {loading ? 'Memeriksa…' : 'Masuk'}</Btn>
        </Card>
        <p className="text-center text-xs mt-4" style={{ color: COLORS.muted }}>Lupa password? Hubungi Super Admin.</p>
      </div>
    </div>
  );
}

function PeriodeBadge(p) {
  const aktif = p.status === 'AKTIF';
  return <span className="text-xs rounded px-2 py-0.5 font-medium"
    style={{ background: aktif ? '#E8F1EC' : '#F3EFE5', color: aktif ? COLORS.green : COLORS.muted }}>{p.status}</span>;
}

function PeriodeForm({ initial, onClose, onSaved, session, toast }) {
  const [f, setF] = useState(initial || { tanggal_mulai: '', tanggal_akhir: '', penerima: '', saldoVA: '', saldoPettyAwal: '' });
  const [saving, setSaving] = useState(false);
  const isEdit = !!initial && !!initial.id;
  function set(k, v) { setF(function(p){ const n = Object.assign({}, p); n[k] = v; return n; }); }
  async function submit() {
    if (!f.tanggal_mulai || !f.tanggal_akhir) { toast('Isi tanggal mulai & akhir', 'error'); return; }
    if (f.tanggal_mulai >= f.tanggal_akhir) { toast('Tanggal mulai harus sebelum tanggal akhir', 'error'); return; }
    setSaving(true);
    const action = isEdit ? 'updatePeriode' : 'addPeriode';
    const payload = Object.assign({ role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      tanggal_mulai: f.tanggal_mulai, tanggal_akhir: f.tanggal_akhir,
      penerima: f.penerima, saldoVA: f.saldoVA, saldoPettyAwal: f.saldoPettyAwal },
      isEdit ? { id: initial.id } : {});
    const res = await api(action, payload);
    setSaving(false);
    if (res.ok) { toast(isEdit ? 'Periode diupdate' : 'Periode dibuat'); onSaved(); onClose(); }
    else toast(res.error || 'Gagal menyimpan', 'error');
  }
  return (
    <Modal title={isEdit ? ('Edit Periode ' + initial.periode_no) : 'Buat Periode Baru'} onClose={onClose}>
      <Field label="Tanggal mulai"><input type="date" value={f.tanggal_mulai} onChange={function(e){set('tanggal_mulai', e.target.value);}} style={inputStyle}/></Field>
      <Field label="Tanggal akhir"><input type="date" value={f.tanggal_akhir} onChange={function(e){set('tanggal_akhir', e.target.value);}} style={inputStyle}/></Field>
      <Field label="Jumlah penerima manfaat" hint="porsi/hari"><input type="number" value={f.penerima} onChange={function(e){set('penerima', e.target.value);}} style={inputStyle} placeholder="0"/></Field>
      <Field label="Saldo VA awal"><input type="number" value={f.saldoVA} onChange={function(e){set('saldoVA', e.target.value);}} style={inputStyle} placeholder="0"/></Field>
      <Field label="Saldo Petty Cash awal" hint="Boleh 0. Petty Cash akan diisi via Top-up (diambil dari saldo VA)."><input type="number" value={f.saldoPettyAwal} onChange={function(e){set('saldoPettyAwal', e.target.value);}} style={inputStyle} placeholder="0"/></Field>
      <div className="flex gap-2"><Btn kind="ghost" onClick={onClose}>Batal</Btn><Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan</Btn></div>
    </Modal>
  );
}

function TopupForm({ tipe, periode, onClose, onSaved, session, toast }) {
  const [f, setF] = useState({ tanggal: new Date().toISOString().substring(0,10), jumlah: '', keterangan: '' });
  const [saving, setSaving] = useState(false);
  function set(k, v) { setF(function(p){ const n = Object.assign({}, p); n[k] = v; return n; }); }
  async function submit() {
    if (!f.tanggal || !f.jumlah) { toast('Isi tanggal & jumlah', 'error'); return; }
    setSaving(true);
    const action = tipe === 'VA' ? 'addVATopup' : 'addPettyTopup';
    const res = await api(action, { role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      tanggal: f.tanggal, jumlah: f.jumlah, keterangan: f.keterangan });
    setSaving(false);
    if (res.ok) { toast('Top-up tersimpan'); onSaved(); onClose(); }
    else toast(res.error || 'Gagal menyimpan', 'error');
  }
  const label = tipe === 'VA' ? 'Saldo VA' : 'Saldo Petty Cash';
  const isPetty = tipe === 'Petty';
  return (
    <Modal title={'Top-up ' + label} onClose={onClose}>
      <div className="mb-3 p-3 rounded-lg text-xs" style={{ background: COLORS.paper, color: COLORS.muted }}>
        Periode {periode.periode_no} · {fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}<br/>
        <span style={{ color: COLORS.ink }}>Saldo VA tersedia: <b>{fmt(periode.sisaVA)}</b></span>
        {isPetty && <><br/><span style={{ color: COLORS.amber }}>⚠️ Top-up Petty akan mengurangi saldo VA</span></>}
      </div>
      <Field label="Tanggal terima"><input type="date" value={f.tanggal} min={periode.tanggal_mulai} max={periode.tanggal_akhir} onChange={function(e){set('tanggal', e.target.value);}} style={inputStyle}/></Field>
      <Field label="Jumlah" hint={isPetty ? 'Maks Rp ' + new Intl.NumberFormat('id-ID').format(periode.sisaVA) : null}>
        <input type="number" value={f.jumlah} onChange={function(e){set('jumlah', e.target.value);}} style={inputStyle} placeholder="0"/>
      </Field>
      <Field label="Keterangan" hint={tipe==='VA' ? 'cth. Transfer dari yayasan' : 'cth. Tarik tunai untuk kas operasional'}>
        <input value={f.keterangan} onChange={function(e){set('keterangan', e.target.value);}} style={inputStyle}/>
      </Field>
      <div className="flex gap-2"><Btn kind="ghost" onClick={onClose}>Batal</Btn><Btn onClick={submit} disabled={saving}>{saving ? I.spinner : I.check} Simpan</Btn></div>
    </Modal>
  );
}

function SaldoCard({ tipe, periode, topups, onTopup, color }) {
  const isVA = tipe === 'VA';
  const awal = isVA ? periode.saldoVA : periode.saldoPettyAwal;
  const topupTotal = isVA ? periode.totalVATopup : periode.totalPettyTopup;
  const pengeluaran = isVA ? periode.pengeluaranVA : periode.pengeluaranPetty;
  const sisa = isVA ? periode.sisaVA : periode.sisaPetty;
  const denom = isVA ? (awal + topupTotal) : (awal + topupTotal);
  const used = isVA ? (pengeluaran + periode.totalPettyTopup) : pengeluaran;
  const usedPct = denom > 0 ? Math.min(100, (used / denom) * 100) : 0;
  return (
    <Card>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <div className="rounded-lg flex items-center justify-center" style={{ width: 32, height: 32, background: COLORS.paper, color: color }}>
            {isVA ? I.wallet : I.cash}
          </div>
          <div className="font-bold text-sm" style={{ color: COLORS.ink }}>Saldo {isVA ? 'VA' : 'Petty Cash'}</div>
        </div>
        <Btn kind={isVA ? 'blue' : 'amber'} size="sm" onClick={onTopup}>{I.plusSm} Top-up</Btn>
      </div>

      <div className="grid grid-cols-2 gap-2 mb-3 text-xs">
        <div className="rounded p-2" style={{ background: COLORS.paper }}>
          <div style={{ color: COLORS.muted }}>Saldo Awal</div>
          <div className="font-semibold num" style={{ color: COLORS.ink }}>{fmt(awal)}</div>
        </div>
        <div className="rounded p-2" style={{ background: COLORS.paper }}>
          <div style={{ color: COLORS.muted }}>Top-up ({topups.length})</div>
          <div className="font-semibold num" style={{ color: COLORS.ink }}>+ {fmt(topupTotal)}</div>
        </div>
        <div className="rounded p-2" style={{ background: COLORS.paper }}>
          <div style={{ color: COLORS.muted }}>{isVA ? 'Keluar (pengeluaran + ke Petty)' : 'Pengeluaran'}</div>
          <div className="font-semibold num" style={{ color: COLORS.danger }}>− {fmt(used)}</div>
        </div>
        <div className="rounded p-2" style={{ background: '#E8F1EC' }}>
          <div style={{ color: COLORS.muted }}>Saldo Sekarang</div>
          <div className="font-bold num" style={{ color: color }}>{fmt(sisa)}</div>
        </div>
      </div>

      <div className="h-1.5 rounded-full overflow-hidden mb-1" style={{ background: COLORS.paper }}>
        <div style={{ width: usedPct + '%', height: '100%', background: color }}/>
      </div>
      <div className="text-[11px]" style={{ color: COLORS.muted }}>Terpakai {usedPct.toFixed(1)}% dari {fmt(denom)}</div>

      {topups.length > 0 && (
        <div className="mt-3 pt-3 border-t" style={{ borderColor: COLORS.line }}>
          <div className="text-xs font-semibold mb-2" style={{ color: COLORS.muted }}>Riwayat Top-up</div>
          <div className="space-y-1">
            {topups.slice(0, 5).map(function(t){
              return <div key={t.id} className="flex items-center justify-between text-xs">
                <div>
                  <span style={{ color: COLORS.ink }}>{fmtDate(t.tanggal)}</span>
                  {t.keterangan && <span style={{ color: COLORS.muted }}> · {t.keterangan}</span>}
                </div>
                <span className="font-medium num" style={{ color: color }}>+ {fmt(t.jumlah)}</span>
              </div>;
            })}
            {topups.length > 5 && <div className="text-xs" style={{ color: COLORS.muted }}>+ {topups.length - 5} lainnya</div>}
          </div>
        </div>
      )}
    </Card>
  );
}

function SetupPeriode({ session, toast }) {
  const [periode, setPeriode] = useState(null);
  const [list, setList] = useState([]);
  const [vaTopups, setVaTopups] = useState([]);
  const [pettyTopups, setPettyTopups] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openForm, setOpenForm] = useState(false);
  const [editPeriode, setEditPeriode] = useState(null);
  const [openTopup, setOpenTopup] = useState(null);
  const [confirmClose, setConfirmClose] = useState(null);

  const load = useCallback(async function() {
    setLoading(true);
    const [act, pl, va, pc] = await Promise.all([
      api('getActivePeriode', { dapur: session.user.dapur }),
      api('getPeriodeList', { role: session.user.role, dapur: session.user.dapur, scope: session.user.dapur }),
      api('getVATopups', { dapur: session.user.dapur }),
      api('getPettyTopups', { dapur: session.user.dapur }),
    ]);
    setLoading(false);
    if (act.ok) setPeriode(act.data);
    if (pl.ok) setList(pl.data);
    if (va.ok) setVaTopups(va.data);
    if (pc.ok) setPettyTopups(pc.data);
  }, []);
  useEffect(function() { load(); }, [load]);

  if (loading) return <Card>{I.spinner}</Card>;

  const closed = list.filter(p => p.status !== 'AKTIF').sort((a,b)=>b.periode_no-a.periode_no);
  const aktifVATopups = periode ? vaTopups.filter(t => t.periode_id === periode.id) : [];
  const aktifPettyTopups = periode ? pettyTopups.filter(t => t.periode_id === periode.id) : [];

  async function doClose() {
    const res = await api('closePeriode', { role: session.user.role, user_id: session.user.id, id: confirmClose.id });
    if (res.ok) { toast('Periode ditutup'); setConfirmClose(null); load(); }
    else toast(res.error, 'error');
  }

  return (
    <div>
      <Card className="mb-3">
        <Eyebrow>Periode Aktif</Eyebrow>
        {!periode ? (
          <div className="text-center py-6">
            <div className="mb-3 flex justify-center" style={{ color: COLORS.muted }}>{I.warn}</div>
            <div className="text-sm font-medium" style={{ color: COLORS.ink }}>Belum ada periode aktif</div>
            <div className="text-xs mb-4" style={{ color: COLORS.muted }}>Transaksi tidak bisa diinput sampai periode dibuat.</div>
            {session.user.role === 'akuntan' && (
              <Btn onClick={function(){setEditPeriode(null); setOpenForm(true);}}>{I.plusSm} Buat Periode Baru</Btn>
            )}
          </div>
        ) : (
          <div>
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3">
              <div>
                <div className="text-lg font-bold" style={{ color: COLORS.ink }}>Periode {periode.periode_no}</div>
                <div className="text-sm" style={{ color: COLORS.muted }}>{fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}</div>
              </div>
              <PeriodeBadge status="AKTIF"/>
            </div>
            <div className="rounded-lg p-3 mb-3" style={{ background: COLORS.paper }}>
              <div className="text-xs" style={{ color: COLORS.muted }}>Penerima Manfaat</div>
              <div className="font-bold num" style={{ color: COLORS.ink }}>{new Intl.NumberFormat('id-ID').format(periode.penerima)} porsi/hari</div>
            </div>

            {session.user.role === 'akuntan' && (
              <div className="flex flex-wrap gap-2 mt-3">
                <Btn kind="ghost" onClick={function(){
                  setEditPeriode({ id: periode.id, periode_no: periode.periode_no,
                    tanggal_mulai: periode.tanggal_mulai, tanggal_akhir: periode.tanggal_akhir,
                    penerima: periode.penerima, saldoVA: periode.saldoVA, saldoPettyAwal: periode.saldoPettyAwal });
                  setOpenForm(true);
                }}>{I.edit} Edit Periode</Btn>
                <Btn kind="danger" onClick={function(){setConfirmClose(periode);}}>{I.lock} Tutup Periode</Btn>
              </div>
            )}
          </div>
        )}
      </Card>

      {periode && (
        <div className="grid lg:grid-cols-2 gap-3 mb-3">
          <SaldoCard tipe="VA" periode={periode} topups={aktifVATopups}
            onTopup={function(){setOpenTopup('VA');}} color={COLORS.blue}/>
          <SaldoCard tipe="Petty" periode={periode} topups={aktifPettyTopups}
            onTopup={function(){setOpenTopup('Petty');}} color={COLORS.amber}/>
        </div>
      )}

      {closed.length > 0 && (
        <Card className="mb-3">
          <Eyebrow>Riwayat Periode ({closed.length} ditutup)</Eyebrow>
          <div className="space-y-2 mt-2">
            {closed.map(function(p){
              return <div key={p.id} className="flex items-center justify-between rounded-lg p-3" style={{ background: COLORS.paper }}>
                <div>
                  <div className="text-sm font-medium" style={{ color: COLORS.ink }}>Periode {p.periode_no}</div>
                  <div className="text-xs" style={{ color: COLORS.muted }}>{fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)}</div>
                </div>
                <PeriodeBadge status={p.status}/>
              </div>;
            })}
          </div>
        </Card>
      )}

      {openForm && (
        <PeriodeForm initial={editPeriode} onClose={function(){setOpenForm(false); setEditPeriode(null);}}
          onSaved={load} session={session} toast={toast}/>
      )}
      {openTopup && periode && (
        <TopupForm tipe={openTopup} periode={periode}
          onClose={function(){setOpenTopup(null);}} onSaved={load} session={session} toast={toast}/>
      )}
      {confirmClose && (
        <ConfirmModal title="Tutup Periode"
          message={'Akan menutup Periode ' + confirmClose.periode_no + ' (' + fmtDateRange(confirmClose.tanggal_mulai, confirmClose.tanggal_akhir) + '). Setelah ditutup, tidak bisa edit/hapus transaksi, top-up, atau ubah periode. Lanjutkan?'}
          onConfirm={doClose} onClose={function(){setConfirmClose(null);}} confirmLabel="Ya, Tutup" danger/>
      )}
    </div>
  );
}

function KPICard(p) {
  return <Card>
    <div className="flex items-start justify-between gap-1.5">
      <div className="min-w-0 flex-1">
        <div className="text-[11px] sm:text-xs font-medium leading-tight" style={{ color: COLORS.muted }}>{p.label}</div>
        <div className="text-base sm:text-xl lg:text-2xl font-bold mt-1 num leading-tight" style={{ color: COLORS.ink, wordBreak: 'break-word' }}>{p.value}</div>
        {p.sub && <div className="text-[10px] sm:text-xs mt-0.5 leading-tight" style={{ color: p.accent || COLORS.muted, wordBreak: 'break-word' }}>{p.sub}</div>}
      </div>
      <div className="rounded-lg hidden sm:flex items-center justify-center shrink-0" style={{ width: 34, height: 34, background: COLORS.paper, color: COLORS.green }}>{p.icon}</div>
    </div>
  </Card>;
}

function Dashboard({ session, scope, toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [periodeList, setPeriodeList] = useState([]);
  const [selPeriode, setSelPeriode] = useState('');
  const canPickPeriode = (session.user.role === 'akuntan' || session.user.role === 'pic') && scope && scope !== 'ALL';

  useEffect(function() {
    if (canPickPeriode) {
      api('getPeriodeList', { role: session.user.role, dapur: scope, scope: scope }).then(function(r){
        if (r.ok) setPeriodeList(r.data);
      });
    }
  }, [scope]);

  const load = useCallback(async function() {
    setLoading(true);
    const res = await api('getDashboard', { role: session.user.role, dapur: session.user.dapur || '',
      scope: scope || 'ALL', periode_id: selPeriode || '' });
    setLoading(false);
    if (res.ok) setData(res.data); else toast(res.error || 'Gagal memuat dashboard', 'error');
  }, [session, scope, selPeriode]);
  useEffect(function() { load(); }, [load]);

  if (loading) return <Card><div className="flex items-center gap-2 text-sm" style={{ color: COLORS.muted }}>{I.spinner} Memuat…</div></Card>;
  if (!data) return <Card>Tidak ada data.</Card>;

  const k = data.kpi;
  const periode = data.periode;
  const noActive = !data.hasActivePeriode;

  return (
    <div>
      <Card className="mb-3">
        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
          <div>
            <Eyebrow>Periode dashboard</Eyebrow>
            {noActive ? (
              <div className="text-sm" style={{ color: COLORS.danger }}>
                Belum ada periode aktif. {session.user.role === 'akuntan' && 'Buka menu Setup untuk membuat.'}
              </div>
            ) : periode && periode.multi ? (
              <div className="text-sm font-semibold" style={{ color: COLORS.ink }}>Gabungan {periode.count} periode aktif</div>
            ) : periode ? (
              <div>
                <div className="text-base font-bold" style={{ color: COLORS.ink }}>Periode {periode.periode_no}</div>
                <div className="text-sm" style={{ color: COLORS.muted }}>
                  {fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}
                  <span className="ml-2 text-xs rounded px-1.5 py-0.5"
                    style={{ background: periode.status==='AKTIF'?'#E8F1EC':'#F3EFE5', color: periode.status==='AKTIF'?COLORS.green:COLORS.muted }}>{periode.status}</span>
                </div>
              </div>
            ) : null}
          </div>
          {canPickPeriode && periodeList.length > 1 && (
            <select value={selPeriode} onChange={function(e){setSelPeriode(e.target.value);}}
              style={Object.assign({}, inputStyle, { width: 'auto', padding: '7px 10px', fontSize: 13 })}>
              <option value="">Periode aktif</option>
              {periodeList.map(function(p){
                return <option key={p.id} value={p.id}>Periode {p.periode_no} · {fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)} · {p.status}</option>;
              })}
            </select>
          )}
        </div>
      </Card>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
        <KPICard icon={I.team} label="Penerima" value={new Intl.NumberFormat('id-ID').format(k.penerima)} sub="porsi/hari" />
        <KPICard icon={I.wallet} label="Sisa VA" value={fmtShort(k.sisaVA)} sub={'dari ' + fmtShort(k.saldoVATotal)} accent={COLORS.blue} />
        <KPICard icon={I.cash} label="Sisa Petty Cash" value={fmtShort(k.sisaPetty)} sub={'dari ' + fmtShort(k.saldoPettyTotal)} accent={COLORS.amber} />
        <KPICard icon={I.trend} label="Total Realisasi Aktual" value={fmtShort(k.totalRiil)} sub={k.serap + '% terserap'} accent={COLORS.green} />
      </div>

      {!noActive && (
        <Card className="mb-3">
          <Eyebrow>Realisasi Aktual vs Anggaran</Eyebrow>
          <div className="grid grid-cols-3 gap-2 mt-2">
            <div className="rounded-lg p-2.5 sm:p-3" style={{ background: COLORS.paper }}>
              <div className="text-[11px] sm:text-xs leading-tight" style={{ color: COLORS.muted }}>Realisasi Aktual</div>
              <div className="font-bold num text-sm sm:text-lg leading-tight mt-0.5" title={fmt(k.totalRiil)} style={{ color: COLORS.green, wordBreak: 'break-word' }}>{fmtShort(k.totalRiil)}</div>
            </div>
            <div className="rounded-lg p-2.5 sm:p-3" style={{ background: COLORS.paper }}>
              <div className="text-[11px] sm:text-xs leading-tight" style={{ color: COLORS.muted }}>Realisasi Anggaran</div>

                  {cats.map(function(c, i){
                    const pct = subAktual > 0 ? (c.riil / subAktual * 100) : 0;
                    return <tr key={c.name} style={{ borderTop: '1px solid ' + COLORS.line }}>

      {RECHARTS_OK && !noActive && data.byDay.length > 0 && (

function TransaksiForm({ mode, initial, jenis, kategoriMap, periode, session, toast, onSubmit, submitting }) {
  // mode: 'add' or 'edit'. initial used for edit.
  const today = new Date().toISOString().substring(0,10);
  const defaultTgl = periode ? (today >= periode.tanggal_mulai && today <= periode.tanggal_akhir ? today : periode.tanggal_mulai) : today;
  const [form, setForm] = useState(initial || {
    tanggal: defaultTgl, no_bukti: '', sumber: 'VA', uraian: '', kategori: '', riil: '', unriil: '',
  });
  const [bukti, setBukti] = useState(null);

  function set(k, v) { setForm(function(f){ const n = Object.assign({}, f); n[k] = v; return n; }); }
  const isBahanBaku = jenis === 'Bahan Baku';
  const dateOutOfRange = form.tanggal && periode && (form.tanggal < periode.tanggal_mulai || form.tanggal > periode.tanggal_akhir);
  // Semua field WAJIB. Bukti wajib di mode 'add' (di 'edit' boleh kosong = pakai yang lama).
  const valid = form.tanggal && !dateOutOfRange && form.no_bukti && form.sumber &&
    form.kategori && form.uraian && form.riil &&
    (isBahanBaku || form.unriil) &&
    (mode === 'edit' || bukti) &&
    periode;

  function go() {
    if (!valid) return;
    const unrillVal = isBahanBaku ? form.riil : form.unriil;
    onSubmit({ ...form, jenis: jenis, unriil: unrillVal, bukti: bukti });
  }

  // Wrapper input untuk nominal dengan "Rp" prefix & real-time format Indonesia
  function rupiahInput(val, onChange) {
    return <div style={{ position: 'relative' }}>
      <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: COLORS.muted, fontSize: 14, pointerEvents: 'none' }}>Rp</span>
      <input type="text" inputMode="numeric" value={fmtRupiahInput(val)}
        onChange={function(e){ onChange(parseRupiahInput(e.target.value)); }}
        placeholder="0"
        style={Object.assign({}, inputStyle, { paddingLeft: 32, textAlign: 'right', fontVariantNumeric: 'tabular-nums' })}/>
    </div>;
  }

  return <div className="grid sm:grid-cols-2 gap-x-4 mt-2">
    <Field label="Tanggal transaksi *" hint={dateOutOfRange ? '⚠️ Di luar periode aktif' : null} hintColor={dateOutOfRange ? COLORS.danger : null}>
      <input type="date" value={form.tanggal} min={periode && periode.tanggal_mulai} max={periode && periode.tanggal_akhir}
        onChange={function(e){set('tanggal', e.target.value);}}
        style={Object.assign({}, inputStyle, dateOutOfRange ? { borderColor: COLORS.danger } : {})}/>
    </Field>
    <Field label="No Bukti *" hint="cth. NB-001, BKK-12, dst. — juga dipakai sebagai nama file bukti">
      <input value={form.no_bukti} onChange={function(e){set('no_bukti', e.target.value);}} style={inputStyle} placeholder="NB-001"/>
    </Field>
    <Field label="Sumber dana *">
      <div className="flex gap-2">
        {['VA','Petty Cash'].map(function(s){
          return <button key={s} onClick={function(){set('sumber', s);}} className="flex-1 rounded-lg py-2.5 text-sm font-medium"
            style={{ border: '1px solid ' + (form.sumber===s?COLORS.green:COLORS.line),
                     background: form.sumber===s?COLORS.paper:'#fff',
                     color: form.sumber===s?COLORS.green:COLORS.muted }}>{s}</button>;
        })}
      </div>
    </Field>
    <Field label="Kategori *">
      <select value={form.kategori} onChange={function(e){set('kategori', e.target.value);}} style={inputStyle}>
        <option value="">Pilih kategori…</option>
        {(kategoriMap[jenis]||[]).map(function(k){ return <option key={k} value={k}>{k}</option>; })}
      </select>
    </Field>
    <Field label="Uraian transaksi *"><input value={form.uraian} onChange={function(e){set('uraian', e.target.value);}} placeholder="cth. Ayam potong 60kg" style={inputStyle}/></Field>
    {isBahanBaku ? (
      <Field label="Nominal *" hint="Realisasi aktual">{rupiahInput(form.riil, function(v){set('riil', v);})}</Field>
    ) : (
      <>
        <Field label="Realisasi Aktual *" hint="Yang benar-benar dibayar">{rupiahInput(form.riil, function(v){set('riil', v);})}</Field>
        <Field label="Realisasi Anggaran *" hint="Nilai pengajuan / markup">{rupiahInput(form.unriil, function(v){set('unriil', v);})}</Field>
      </>
    )}
    <div className="sm:col-span-2">
      <Field label={'Bukti transaksi ' + (mode === 'edit' ? '(opsional kalau tidak ganti)' : '*')}
        hint={mode === 'edit' ? 'Kosongkan kalau tidak ganti bukti' : 'Nama file otomatis: {Tanggal}_{No Bukti}'}>
        {/* Status bukti terpilih */}
        <div className="rounded-lg p-3 mb-2 flex items-center gap-2"
          style={{ border: '1.5px dashed ' + (bukti || (mode === 'edit' && initial && initial.bukti_url) ? COLORS.green : COLORS.line),
                   background: bukti ? '#E8F1EC' : '#fff' }}>
          <span style={{ color: bukti ? COLORS.green : COLORS.muted }}>{bukti ? I.check : I.image}</span>
          <span className="text-sm flex-1 truncate" style={{ color: bukti ? COLORS.ink : COLORS.muted }}>
            {bukti ? bukti.name : (mode === 'edit' && initial && initial.bukti_url ? 'Bukti lama tersimpan — pilih baru untuk mengganti' : 'Belum ada bukti dipilih')}
          </span>
          {bukti && <button onClick={function(){setBukti(null);}} title="Hapus pilihan"
            style={{ color: COLORS.danger }}>{I.x}</button>}
        </div>
        {/* Dua tombol: Galeri/File & Kamera */}
        <div className="grid grid-cols-2 gap-2">
          <label className="flex flex-col items-center justify-center gap-1 rounded-lg py-3.5 cursor-pointer text-sm font-semibold active:opacity-70"
            style={{ border: '1.5px solid ' + COLORS.line, color: COLORS.green, background: '#fff' }}>
            <span className="flex items-center gap-1.5">{I.image} Galeri / File</span>
            <span className="text-[10px] font-normal" style={{ color: COLORS.muted }}>Foto tersimpan / PDF</span>
            <input type="file" className="hidden" accept="image/*,application/pdf"
              onChange={function(e){ if(e.target.files[0]) setBukti(e.target.files[0]); }}/>
          </label>
          <label className="flex flex-col items-center justify-center gap-1 rounded-lg py-3.5 cursor-pointer text-sm font-semibold active:opacity-70"
            style={{ border: '1.5px solid ' + COLORS.line, color: COLORS.green, background: '#fff' }}>
            <span className="flex items-center gap-1.5">{I.camera} Kamera</span>
            <span className="text-[10px] font-normal" style={{ color: COLORS.muted }}>Ambil foto langsung</span>
            <input type="file" className="hidden" accept="image/*" capture="environment"
              onChange={function(e){ if(e.target.files[0]) setBukti(e.target.files[0]); }}/>
          </label>
        </div>
      </Field>
      {!valid && (
        <div className="text-xs mb-3" style={{ color: COLORS.danger }}>
          {!form.tanggal ? '• Tanggal wajib diisi' : dateOutOfRange ? '• Tanggal di luar periode aktif' :
           !form.no_bukti ? '• No Bukti wajib diisi' :
           !form.kategori ? '• Kategori wajib dipilih' :
           !form.uraian ? '• Uraian wajib diisi' :
           !form.riil ? '• Nominal wajib diisi' :
           (!isBahanBaku && !form.unriil) ? '• Realisasi Anggaran wajib diisi' :
           (mode !== 'edit' && !bukti) ? '• Bukti transaksi wajib diunggah' : ''}
        </div>
      )}
      <Btn full disabled={!valid || submitting} onClick={go}>{submitting ? I.spinner : I.check} {submitting ? 'Menyimpan…' : (mode === 'edit' ? 'Simpan Perubahan' : 'Simpan transaksi')}</Btn>
    </div>
  </div>;
}

function fileToBase64(file) {
  return new Promise(function(res, rej) {
    const r = new FileReader();
    r.onload = function(){ res(r.result.split(',')[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Generate nama file bukti = "{Tanggal}_{NoBukti}.{ext}"
function buktiFileName(file, tanggal, noBukti) {
  const ext = (String(file.name).split('.').pop() || 'jpg').toLowerCase();
  const safeBukti = String(noBukti || 'tanpa-bukti').replace(/[^a-zA-Z0-9_-]+/g, '-').replace(/^-|-$/g, '');
  return tanggal + '_' + safeBukti + '.' + ext;
}

function InputTransaksi({ session, toast, onSaved, goToSetup }) {
  const [periode, setPeriode] = useState(null);
  const [loadingPeriode, setLoadingPeriode] = useState(true);
  const [kategoriMap, setKategoriMap] = useState({});
  const [step, setStep] = useState(1);
  const [jenis, setJenis] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  useEffect(function() {
    Promise.all([api('getActivePeriode', { dapur: session.user.dapur }), api('getKategori')]).then(function(arr){
      setLoadingPeriode(false);
      if (arr[0].ok) setPeriode(arr[0].data);
      if (arr[1].ok) setKategoriMap(arr[1].data);
    });
  }, []);

  async function doSubmit(form) {
    setSubmitting(true);
    let bukti_url = '';
    if (form.bukti) {
      const b64 = await fileToBase64(form.bukti);
      const up = await apiUpload('uploadBukti', { fileData: b64, fileName: buktiFileName(form.bukti, form.tanggal, form.no_bukti), mimeType: form.bukti.type });
      if (up.ok) bukti_url = up.data.url;
      else { toast('Gagal upload bukti: ' + up.error, 'error'); setSubmitting(false); return; }
    }
    const res = await api('addTransaksi', {
      role: session.user.role, user_id: session.user.id, dapur: session.user.dapur,
      tanggal: form.tanggal, no_bukti: form.no_bukti, jenis: form.jenis, kategori: form.kategori, uraian: form.uraian,
      sumber: form.sumber, riil: form.riil, unriil: form.unriil, bukti_url: bukti_url,
    });
    setSubmitting(false);
    if (res.ok) {
      toast('Transaksi tersimpan');
      setStep(1); setJenis(null);
      onSaved && onSaved();
    } else toast(res.error || 'Gagal menyimpan', 'error');
  }

  if (loadingPeriode) return <Card>{I.spinner}</Card>;
  if (!periode) {
    return (
      <Card>
        <div className="text-center py-6">
          <div className="mb-3 flex justify-center" style={{ color: COLORS.danger }}>{I.warn}</div>
          <div className="text-base font-bold mb-1" style={{ color: COLORS.ink }}>Belum ada periode aktif</div>
          <div className="text-sm mb-4" style={{ color: COLORS.muted }}>Setup periode dulu sebelum input transaksi.</div>
          <Btn onClick={goToSetup}>{I.settings} Ke Setup Periode</Btn>
        </div>
      </Card>
    );
  }

  if (step === 1) {
    return (
      <div>
        <Card className="mb-3">
          <Eyebrow>Periode aktif</Eyebrow>
          <div className="text-base font-bold" style={{ color: COLORS.ink }}>Periode {periode.periode_no}</div>
          <div className="text-sm" style={{ color: COLORS.muted }}>{fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}</div>
        </Card>
        <Card>
          <Eyebrow>Langkah 1 dari 2</Eyebrow>
          <h2 className="text-lg font-bold mb-1" style={{ color: COLORS.ink }}>Pilih jenis transaksi</h2>
          <p className="text-sm mb-4" style={{ color: COLORS.muted }}>Menentukan daftar kategori di langkah berikutnya.</p>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-2.5">
            {Object.keys(kategoriMap).map(function(j){
              return <button key={j} onClick={function(){ setJenis(j); setStep(2); }}
                className="rounded-lg p-4 text-left transition hover:bg-gray-50"
                style={{ border: '1px solid ' + COLORS.line, background: '#fff' }}>
                <div className="font-semibold text-sm" style={{ color: COLORS.ink }}>{j}</div>
                <div className="text-xs mt-0.5" style={{ color: COLORS.muted }}>{kategoriMap[j].length} kategori</div>
              </button>;
            })}
          </div>
        </Card>
      </div>
    );
  }

  return (
    <div>
      <Card className="mb-3">
        <Eyebrow>Periode aktif</Eyebrow>
        <div className="text-sm font-bold" style={{ color: COLORS.ink }}>Periode {periode.periode_no} · {fmtDateRange(periode.tanggal_mulai, periode.tanggal_akhir)}</div>
      </Card>
      <Card>
        <button onClick={function(){setStep(1);}} className="inline-flex items-center gap-1.5 text-sm mb-3" style={{ color: COLORS.green }}>{I.arrowL} {jenis}</button>
        <Eyebrow>Langkah 2 dari 2 · Detail transaksi</Eyebrow>
        <TransaksiForm mode="add" jenis={jenis} kategoriMap={kategoriMap} periode={periode}
          session={session} toast={toast} onSubmit={doSubmit} submitting={submitting}/>
      </Card>
    </div>
  );
}

  async function doSubmit(form) {
    setSubmitting(true);

  return (

//  LAPORAN — Format Ledger (Bulan|Tgl|NoBukti|Uraian|Debit|Kredit|Saldo)
//  Mode: anggaran (untuk yayasan, pakai unriil)
// ============================================================
function Laporan({ session, scope, toast }) {
  const [periodeList, setPeriodeList] = useState([]);
  const [selPeriode, setSelPeriode] = useState('');
  const [transaksi, setTransaksi] = useState([]);
  const [vaTopups, setVaTopups] = useState([]);
  const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(function() {
    Promise.all([
      api('getPeriodeList', { role: session.user.role, dapur: scope, scope: scope }),
      api('getDapur'),
    ]).then(function(arr){
      if (arr[0].ok) {
        setPeriodeList(arr[0].data);
        const aktif = arr[0].data.find(function(p){return p.status === 'AKTIF';});
        if (aktif) setSelPeriode(aktif.id);
        else if (arr[0].data[0]) setSelPeriode(arr[0].data[0].id);
        else setLoading(false);
      } else setLoading(false);
      if (arr[1].ok) setDapur(arr[1].data);
    });
  }, [scope]);

  useEffect(function() {
    if (!selPeriode) return;
    setLoading(true);
    const selObj = periodeList.find(function(p){return p.id === selPeriode;});
    const dapurId = selObj ? selObj.dapur : (scope && scope !== 'ALL' ? scope : (session.user.dapur || ''));
    Promise.all([
      api('getTransaksi', { role: session.user.role, dapur: session.user.dapur || '', scope: scope || 'ALL', periode_id: selPeriode }),
      api('getVATopups', { dapur: dapurId, periode_id: selPeriode }),
    ]).then(function(arr){
      setLoading(false);
      if (arr[0].ok) setTransaksi(arr[0].data);
      if (arr[1].ok) setVaTopups(arr[1].data);
    });
  }, [selPeriode, scope, periodeList]);

  const periode = periodeList.find(function(p){return p.id === selPeriode;});
  const dapurMap = useMemo(function(){ const m = {}; dapur.forEach(function(d){ m[d.id] = d.nama; }); return m; }, [dapur]);
  const dapurNama = periode ? (dapurMap[periode.dapur] || periode.dapur) : (scope && scope !== 'ALL' ? dapurMap[scope] : (session.user.dapur ? dapurMap[session.user.dapur] : 'Semua Dapur'));

  const ledger = useMemo(function(){
    if (!periode) return [];
    return buildLedger(periode.saldoVA, periode.saldoPettyAwal, vaTopups, transaksi, 'anggaran');
  }, [periode, vaTopups, transaksi]);

  // Subtotal per jenis (untuk ringkasan)
  const subtotal = useMemo(function() {
    const m = {};
    transaksi.forEach(function(t){
      if (!m[t.jenis]) m[t.jenis] = 0;
      m[t.jenis] += (t.unriil > 0 ? t.unriil : t.riil);
    });
    return m;
  }, [transaksi]);
  const totalAll = Object.values(subtotal).reduce(function(s,v){return s+v;}, 0);

  // Lampiran bukti
  let lampiranNo = 0;
  const lampiranList = transaksi.map(function(t){
    if (t.bukti_url) { lampiranNo++; return { tx: t, no: lampiranNo }; }
    return null;
  }).filter(Boolean);
  const txToLampiranNo = {};
  lampiranList.forEach(function(l){ txToLampiranNo[l.tx.id] = l.no; });

  function doPrint() { window.print(); }
  if (loading) return <Card>{I.spinner}</Card>;

  const saldoAkhir = ledger.length > 0 ? ledger[ledger.length-1].saldo : 0;

  return (
    <div>
      <Card className="mb-3 no-print">
        <div className="flex flex-col sm:flex-row sm:items-end gap-3">
          <div className="flex-1">
            <div className="text-xs font-medium mb-1" style={{ color: COLORS.muted }}>Periode</div>

              {periodeList.length === 0 && <option value="">Belum ada periode</option>}
              {periodeList.map(function(p){
                return <option key={p.id} value={p.id}>{(session.user.role === 'admin' || session.user.role === 'yayasan') && dapurMap[p.dapur] ? (dapurMap[p.dapur] + ' · ') : ''}Periode {p.periode_no} · {fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)} · {p.status}</option>;
              })}
            </select>
          </div>
          <Btn onClick={doPrint} disabled={ledger.length === 0}>{I.print} Print / Simpan PDF</Btn>
        </div>
        <p className="text-xs mt-2" style={{ color: COLORS.muted }}>
          Tip: di dialog print pilih "Save as PDF" untuk simpan jadi file. Saldo & nominal pakai <b>Realisasi Anggaran</b>.
        </p>
      </Card>

      <div className="print-container" style={{ background: '#fff', padding: 28, border: '1px solid ' + COLORS.line, borderRadius: 12 }}>
        {/* HEADER — tanpa subtitle */}
        <div style={{ textAlign: 'center', borderBottom: '2px solid ' + COLORS.ink, paddingBottom: 12, marginBottom: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 'bold', color: COLORS.ink, letterSpacing: '0.05em' }}>LAPORAN KEUANGAN</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.ink, marginTop: 4 }}>{dapurNama}</div>
          {periode && <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 2 }}>
            Periode {periode.periode_no}: {fmtDateLong(periode.tanggal_mulai)} – {fmtDateLong(periode.tanggal_akhir)}
          </div>}
        </div>

        {ledger.length <= 1 ? (
          <p style={{ textAlign: 'center', color: COLORS.muted, padding: 32 }}>Belum ada transaksi atau top-up di periode ini.</p>
        ) : (
          <>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
              <thead>
                <tr style={{ background: COLORS.paper, color: COLORS.ink }}>
                  <th style={{ padding: '6px 6px', textAlign: 'left', fontWeight: 700, width: '9%', border: '1px solid ' + COLORS.line }}>Bulan</th>
                  <th style={{ padding: '6px 6px', textAlign: 'left', fontWeight: 700, width: '9%', border: '1px solid ' + COLORS.line }}>Tanggal</th>
                  <th style={{ padding: '6px 6px', textAlign: 'left', fontWeight: 700, width: '10%', border: '1px solid ' + COLORS.line }}>No Bukti</th>
                  <th style={{ padding: '6px 6px', textAlign: 'left', fontWeight: 700, border: '1px solid ' + COLORS.line }}>Uraian Transaksi</th>
                  <th style={{ padding: '6px 6px', textAlign: 'right', fontWeight: 700, width: '13%', border: '1px solid ' + COLORS.line }}>Debit</th>
                  <th style={{ padding: '6px 6px', textAlign: 'right', fontWeight: 700, width: '13%', border: '1px solid ' + COLORS.line }}>Kredit</th>
                  <th style={{ padding: '6px 6px', textAlign: 'right', fontWeight: 700, width: '13%', border: '1px solid ' + COLORS.line }}>Saldo</th>
                </tr>
              </thead>
              <tbody>
                {ledger.map(function(row, idx){
                  const isAwal = row.kind === 'awal';
                  const isTopup = row.kind === 'topup';
                  return <tr key={idx} style={{ background: isAwal ? '#F0F7F2' : (isTopup ? '#F0F4FA' : '#fff') }}>
                    <td style={{ padding: '5px 6px', color: COLORS.ink, border: '1px solid ' + COLORS.line }}>{row.bulan}</td>
                    <td style={{ padding: '5px 6px', color: COLORS.ink, border: '1px solid ' + COLORS.line }}>{row.kind === 'awal' ? '-' : getTglDayMonth(row.tanggal)}</td>
                    <td style={{ padding: '5px 6px', color: COLORS.ink, border: '1px solid ' + COLORS.line }}>{row.no_bukti}</td>
                    <td style={{ padding: '5px 6px', color: COLORS.ink, border: '1px solid ' + COLORS.line, fontStyle: isAwal||isTopup ? 'italic' : 'normal' }}>
                      {row.uraian}
                      {row.tx && txToLampiranNo[row.tx.id] && <span style={{ color: COLORS.muted, fontSize: 10 }}> [L-{txToLampiranNo[row.tx.id]}]</span>}
                    </td>
                    <td style={{ padding: '5px 6px', textAlign: 'right', color: row.debit ? COLORS.green : COLORS.muted, border: '1px solid ' + COLORS.line, fontVariantNumeric: 'tabular-nums', fontWeight: row.debit ? 500 : 'normal' }}>
                      {row.debit ? fmtNoRp(row.debit) : '-'}
                    </td>
                    <td style={{ padding: '5px 6px', textAlign: 'right', color: row.kredit ? COLORS.danger : COLORS.muted, border: '1px solid ' + COLORS.line, fontVariantNumeric: 'tabular-nums', fontWeight: row.kredit ? 500 : 'normal' }}>
                      {row.kredit ? fmtNoRp(row.kredit) : '-'}
                    </td>
                    <td style={{ padding: '5px 6px', textAlign: 'right', color: COLORS.ink, border: '1px solid ' + COLORS.line, fontVariantNumeric: 'tabular-nums', fontWeight: 600 }}>
                      {fmtNoRp(row.saldo)}
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>

            {/* RINGKASAN PER JENIS */}
            <div style={{ marginTop: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 12, color: COLORS.ink, marginBottom: 6 }}>Ringkasan Pengeluaran per Jenis</div>
              <table style={{ width: '60%', borderCollapse: 'collapse', fontSize: 11 }}>
                <tbody>
                  {Object.keys(subtotal).sort().map(function(jenis){
                    return <tr key={jenis}>
                      <td style={{ padding: '4px 8px', border: '1px solid ' + COLORS.line, color: COLORS.ink }}>{jenis}</td>
                      <td style={{ padding: '4px 8px', textAlign: 'right', border: '1px solid ' + COLORS.line, color: COLORS.ink, fontVariantNumeric: 'tabular-nums' }}>{fmt(subtotal[jenis])}</td>
                    </tr>;
                  })}
                  <tr style={{ background: COLORS.paper, fontWeight: 700 }}>
                    <td style={{ padding: '4px 8px', border: '1px solid ' + COLORS.line, color: COLORS.ink }}>Total Pengeluaran</td>
                    <td style={{ padding: '4px 8px', textAlign: 'right', border: '1px solid ' + COLORS.line, color: COLORS.ink, fontVariantNumeric: 'tabular-nums' }}>{fmt(totalAll)}</td>
                  </tr>
                  <tr style={{ background: '#E8F1EC', fontWeight: 700 }}>
                    <td style={{ padding: '4px 8px', border: '1px solid ' + COLORS.line, color: COLORS.ink }}>Saldo Akhir</td>
                    <td style={{ padding: '4px 8px', textAlign: 'right', border: '1px solid ' + COLORS.line, color: COLORS.green, fontVariantNumeric: 'tabular-nums' }}>{fmt(saldoAkhir)}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            {/* TANDA TANGAN — 3 kolom */}
            <div style={{ marginTop: 48, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, fontSize: 11 }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ color: COLORS.muted }}>Dibuat oleh,</div>
                <div style={{ marginTop: 60, paddingTop: 4, color: COLORS.ink }}>
                  <div style={{ fontWeight: 700, borderTop: '1px solid ' + COLORS.ink, paddingTop: 4 }}>({session.user.nama})</div>
                  <div style={{ color: COLORS.muted, fontSize: 10 }}>Akuntan</div>
                </div>
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ color: COLORS.muted }}>Mengetahui,</div>
                <div style={{ marginTop: 60, paddingTop: 4, color: COLORS.ink }}>
                  <div style={{ fontWeight: 700, borderTop: '1px solid ' + COLORS.ink, paddingTop: 4 }}>(.................................)</div>
                  <div style={{ color: COLORS.muted, fontSize: 10 }}>Perwakilan Yayasan</div>
                </div>
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ color: COLORS.muted }}>Mengetahui,</div>
                <div style={{ marginTop: 60, paddingTop: 4, color: COLORS.ink }}>
                  <div style={{ fontWeight: 700, borderTop: '1px solid ' + COLORS.ink, paddingTop: 4 }}>(.................................)</div>
                  <div style={{ color: COLORS.muted, fontSize: 10 }}>Kepala Dapur {dapurNama}</div>
                </div>
              </div>
            </div>
          </>
        )}

        {/* LAMPIRAN BUKTI */}
        {lampiranList.length > 0 && (
          <div style={{ marginTop: 40, pageBreakBefore: 'always' }} className="page-break">
            <div style={{ fontWeight: 700, fontSize: 14, color: COLORS.ink, marginBottom: 12, borderBottom: '2px solid ' + COLORS.ink, paddingBottom: 6, textAlign: 'center' }}>
              LAMPIRAN BUKTI TRANSAKSI
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 12 }}>
              {lampiranList.map(function(l){
                return <div key={l.no} style={{ border: '1px solid ' + COLORS.line, borderRadius: 6, padding: 10, pageBreakInside: 'avoid' }}>
                  <div style={{ fontSize: 10, marginBottom: 4, color: COLORS.muted }}>
                    <b style={{ color: COLORS.ink }}>L-{l.no}</b> · {fmtDate(l.tx.tanggal)} · {l.tx.no_bukti || '(tanpa no bukti)'} · {l.tx.uraian} · {fmt(l.tx.unriil > 0 ? l.tx.unriil : l.tx.riil)}
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <img src={driveThumb(l.tx.bukti_url)} alt={'Bukti ' + l.no} className="lampiran-img"
                      style={{ maxWidth: '100%', maxHeight: 360, objectFit: 'contain', border: '1px solid ' + COLORS.line, borderRadius: 4 }}
                      onError={function(e){ e.target.style.display = 'none'; e.target.nextSibling && (e.target.nextSibling.style.display = 'block'); }}/>
                    <div style={{ display: 'none', padding: 16, color: COLORS.muted, fontSize: 11 }}>
                      [Bukti tidak dapat ditampilkan — link: <a href={l.tx.bukti_url} target="_blank" rel="noopener">{l.tx.bukti_url}</a>]
                    </div>
                  </div>
                </div>;
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
//  RIWAYAT — Ledger format dengan edit/delete buttons + Excel export
//  Mode: aktual (pakai riil)
// ============================================================
function exportRiwayatExcel(rows, dapurMap, namaFile) {
  // Ledger sheet
  const ledgerData = rows.map(function(r){
    return {
      'Bulan': r.bulan, 'Tanggal': r.tanggal === '-' ? '-' : r.tanggal,
      'No Bukti': r.no_bukti, 'Uraian': r.uraian,
      'Debit': r.debit || 0, 'Kredit': r.kredit || 0, 'Saldo': r.saldo || 0,
      'Jenis': r.tx ? r.tx.jenis : (r.kind === 'topup' ? 'Top-up VA' : 'Saldo Awal'),
      'Kategori': r.tx ? r.tx.kategori : '',
      'Sumber': r.tx ? r.tx.sumber : '',
      'Dapur': r.tx ? (dapurMap[r.tx.dapur] || r.tx.dapur) : '',
      'Bukti URL': r.tx ? (r.tx.bukti_url || '') : '',
    };
  });
  const ws = XLSX.utils.json_to_sheet(ledgerData);
  ws['!cols'] = [
    { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 40 },
    { wch: 14 }, { wch: 14 }, { wch: 14 },
    { wch: 14 }, { wch: 24 }, { wch: 12 }, { wch: 24 }, { wch: 50 },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Buku Besar');
  XLSX.writeFile(wb, namaFile);
}

function Riwayat({ session, scope, toast, refreshKey }) {
  const [periodeList, setPeriodeList] = useState([]);
  const [selPeriode, setSelPeriode] = useState('');
  const [transaksi, setTransaksi] = useState([]);
  const [vaTopups, setVaTopups] = useState([]);
  const [dapur, setDapur] = useState([]);
  const [kategoriMap, setKategoriMap] = useState({});
  const [loading, setLoading] = useState(true);
  const [editTrx, setEditTrx] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [q, setQ] = useState('');
  const [filterJenis, setFilterJenis] = useState('ALL');

  const canEdit = session.user.role === 'akuntan';

  const loadPeriode = useCallback(async function() {
    const dapurId = scope && scope !== 'ALL' ? scope : (session.user.dapur || '');
    const [pl, dp, kat] = await Promise.all([
      api('getPeriodeList', { role: session.user.role, dapur: dapurId, scope: scope }),
      api('getDapur'),
      api('getKategori'),
    ]);
    if (pl.ok) {
      setPeriodeList(pl.data);
      const aktif = pl.data.find(function(p){return p.status === 'AKTIF';});
      if (aktif && !selPeriode) setSelPeriode(aktif.id);
      else if (pl.data[0] && !selPeriode) setSelPeriode(pl.data[0].id);
      else if (pl.data.length === 0) { setSelPeriode(''); setLoading(false); }
    } else { setLoading(false); }
    if (dp.ok) setDapur(dp.data);
    if (kat.ok) setKategoriMap(kat.data);
  }, [scope]);

  const loadData = useCallback(async function() {
    if (!selPeriode) return;
    setLoading(true);
    const selObj = periodeList.find(function(p){return p.id === selPeriode;});
    const dapurId = selObj ? selObj.dapur : (scope && scope !== 'ALL' ? scope : (session.user.dapur || ''));
    const [tx, va] = await Promise.all([
      api('getTransaksi', { role: session.user.role, dapur: session.user.dapur || '', scope: scope || 'ALL', periode_id: selPeriode }),
      api('getVATopups', { dapur: dapurId, periode_id: selPeriode }),
    ]);
    setLoading(false);
    if (tx.ok) setTransaksi(tx.data);
    if (va.ok) setVaTopups(va.data);
  }, [selPeriode, scope, refreshKey, periodeList]);

  useEffect(function() { loadPeriode(); }, [loadPeriode]);
  useEffect(function() { loadData(); }, [loadData]);

  const periode = periodeList.find(function(p){return p.id === selPeriode;});
  const dapurMap = useMemo(function(){ const m = {}; dapur.forEach(function(d){ m[d.id] = d.nama; }); return m; }, [dapur]);

  const filteredTx = useMemo(function() {
    let t = transaksi;
    if (filterJenis !== 'ALL') t = t.filter(function(x){return x.jenis === filterJenis;});
    if (q.trim()) {
      const qq = q.toLowerCase();
      t = t.filter(function(r){
        return (r.uraian||'').toLowerCase().indexOf(qq) >= 0 ||
               (r.kategori||'').toLowerCase().indexOf(qq) >= 0 ||
               (r.no_bukti||'').toLowerCase().indexOf(qq) >= 0;
      });
    }
    return t;
  }, [transaksi, q, filterJenis]);

  const ledger = useMemo(function() {
    if (!periode) return [];
    return buildLedger(periode.saldoVA, periode.saldoPettyAwal, vaTopups, filteredTx, 'anggaran');
  }, [periode, vaTopups, filteredTx]);

  async function doDelete() {
    const res = await api('deleteTransaksi', { role: session.user.role, user_id: session.user.id, dapur: session.user.dapur, id: confirmDel.id });
    if (res.ok) { toast('Transaksi dihapus'); setConfirmDel(null); loadData(); }
    else toast(res.error || 'Gagal hapus', 'error');
  }

  if (loading && !periode) return <Card>{I.spinner}</Card>;

  const periodeAktif = periode && periode.status === 'AKTIF';

  return (
    <div>
      <Card pad={false} className="mb-3">
        <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-3 p-4" style={{ borderBottom: '1px solid ' + COLORS.line }}>
          <div className="flex flex-col sm:flex-row gap-2 flex-1">
            <div className="flex-1 min-w-0">
              <div className="text-xs font-medium mb-1" style={{ color: COLORS.muted }}>Periode</div>
              <select value={selPeriode} onChange={function(e){setSelPeriode(e.target.value);}} style={Object.assign({}, inputStyle, { fontSize: 13 })}>
                {periodeList.length === 0 && <option value="">Belum ada periode</option>}
                {periodeList.map(function(p){
                  return <option key={p.id} value={p.id}>{(session.user.role === 'admin' || session.user.role === 'yayasan') && dapurMap[p.dapur] ? (dapurMap[p.dapur] + ' · ') : ''}Periode {p.periode_no} · {fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)} · {p.status}</option>;
                })}
              </select>
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-xs font-medium mb-1" style={{ color: COLORS.muted }}>Jenis</div>
              <select value={filterJenis} onChange={function(e){setFilterJenis(e.target.value);}} style={Object.assign({}, inputStyle, { fontSize: 13 })}>
                <option value="ALL">Semua</option>
                <option value="Bahan Baku">Bahan Baku</option>
                <option value="Operasional">Operasional</option>
                <option value="Fasilitas SPPG">Fasilitas SPPG</option>
              </select>
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-xs font-medium mb-1" style={{ color: COLORS.muted }}>Cari</div>
              <input value={q} onChange={function(e){setQ(e.target.value);}} placeholder="uraian, no bukti…"
                style={Object.assign({}, inputStyle, { fontSize: 13 })} />
            </div>
          </div>
          <Btn kind="ghost" onClick={function(){
            exportRiwayatExcel(ledger, dapurMap, 'riwayat-mbg-' + (selPeriode || 'all') + '.xlsx');
          }} disabled={ledger.length === 0}>{I.download} Excel</Btn>
        </div>

        {loading ? <div className="p-6">{I.spinner}</div> : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm" style={{ minWidth: 1000 }}>
              <thead>
                <tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
                  <th className="px-3 py-2.5 font-semibold">Bulan</th>
                  <th className="px-3 py-2.5 font-semibold">Tanggal</th>
                  <th className="px-3 py-2.5 font-semibold">No Bukti</th>
                  <th className="px-3 py-2.5 font-semibold">Uraian Transaksi</th>
                  <th className="px-3 py-2.5 font-semibold text-right">Debit</th>
                  <th className="px-3 py-2.5 font-semibold text-right">Kredit</th>
                  <th className="px-3 py-2.5 font-semibold text-right">Saldo</th>
                  <th className="px-3 py-2.5 font-semibold text-center" style={{ width: 60 }}>Bukti</th>
                  {canEdit && <th className="px-3 py-2.5 font-semibold" style={{ width: 100 }}></th>}
                </tr>
              </thead>
              <tbody>
                {ledger.length === 0 ? (
                  <tr><td colSpan={canEdit ? 9 : 8} className="px-4 py-8 text-center" style={{ color: COLORS.muted }}>Belum ada data di periode ini.</td></tr>
                ) : ledger.map(function(row, idx){
                  const isAwal = row.kind === 'awal';
                  const isTopup = row.kind === 'topup';
                  const isTx = row.kind === 'tx';
                  return <tr key={idx} style={{ borderTop: '1px solid ' + COLORS.line, background: isAwal ? '#F0F7F2' : (isTopup ? '#F0F4FA' : 'transparent') }}>
                    <td className="px-3 py-2" style={{ color: COLORS.muted }}>{row.bulan}</td>
                    <td className="px-3 py-2" style={{ color: COLORS.muted }}>{row.kind === 'awal' ? '-' : getTglDayMonth(row.tanggal)}</td>
                    <td className="px-3 py-2 text-xs" style={{ color: COLORS.muted }}>{row.no_bukti}</td>
                    <td className="px-3 py-2" style={{ color: COLORS.ink, fontStyle: isAwal||isTopup ? 'italic' : 'normal' }}>
                      <div>{row.uraian}</div>
                      {isTx && row.tx && <div className="text-[11px] mt-0.5" style={{ color: COLORS.muted }}>
                        <span className="rounded px-1.5 py-0.5 mr-1" style={{ background: COLORS.paper }}>{row.tx.jenis}</span>
                        <span>{row.tx.kategori}</span>
                        <span className="ml-1.5">·</span>
                        <span className="ml-1.5">{row.tx.sumber}</span>
                        {scope === 'ALL' && row.tx.dapur && <><span className="ml-1.5">·</span><span className="ml-1.5">{dapurMap[row.tx.dapur]}</span></>}
                      </div>}
                    </td>
                    <td className="px-3 py-2 text-right font-medium num" style={{ color: row.debit ? COLORS.green : COLORS.muted }}>{row.debit ? fmt(row.debit) : '-'}</td>
                    <td className="px-3 py-2 text-right font-medium num" style={{ color: row.kredit ? COLORS.danger : COLORS.muted }}>{row.kredit ? fmt(row.kredit) : '-'}</td>
                    <td className="px-3 py-2 text-right font-semibold num" style={{ color: COLORS.ink }}>{fmt(row.saldo)}</td>
                    <td className="px-3 py-2 text-center">
                      {isTx && row.tx && row.tx.bukti_url ? (

                      )}
                    </td>
                    {canEdit && <td className="px-3 py-2 text-right">
                      {isTx && periodeAktif && (
                        <div className="flex gap-1 justify-end">
                          <button onClick={function(){setEditTrx(row.tx);}} title="Edit"
                            style={{ color: COLORS.blue, border: '1px solid ' + COLORS.line, borderRadius: 6, padding: 5 }}>{I.edit}</button>
                          <button onClick={function(){setConfirmDel(row.tx);}} title="Hapus"
                            style={{ color: COLORS.danger, border: '1px solid ' + COLORS.line, borderRadius: 6, padding: 5 }}>{I.trash}</button>
                        </div>
                      )}
                      {isTx && !periodeAktif && <span className="text-[10px]" style={{ color: COLORS.muted }}>terkunci</span>}
                    </td>}
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>

      {editTrx && (
        <EditTransaksiModal trx={editTrx} kategoriMap={kategoriMap} periode={periode}
          session={session} toast={toast}
          onClose={function(){setEditTrx(null);}}
          onSaved={loadData}/>
      )}
      {confirmDel && (
        <ConfirmModal title="Hapus Transaksi"
          message={'Hapus transaksi "' + confirmDel.uraian + '" (' + fmt(confirmDel.riil) + ')? Tidak bisa dibatalkan.'}
          onConfirm={doDelete} onClose={function(){setConfirmDel(null);}} confirmLabel="Hapus" danger/>
      )}
    </div>
  );
}

//  BUKU BESAR — dual-mode ledger (Aktual + Anggaran side-by-side)
//  Buat audit & perbandingan: kredit & saldo punya 2 kolom

function bukuBesarExportExcel(rows, dapurMap, namaFile) {
  const data = rows.map(function(r){
    return {
      'Bulan': r.bulan, 'Tanggal': r.tanggal === '-' ? '-' : r.tanggal,
      'No Bukti': r.no_bukti, 'Uraian': r.uraian,
      'Debit': r.debit || 0,
      'Kredit Aktual': r.kreditAktual || 0, 'Kredit Anggaran': r.kreditAnggaran || 0,
      'Saldo Aktual': r.saldoAktual || 0, 'Saldo Anggaran': r.saldoAnggaran || 0,
      'Selisih Saldo': (r.saldoAnggaran || 0) - (r.saldoAktual || 0),
      'Jenis': r.tx ? r.tx.jenis : (r.kind === 'topup' ? 'Top-up VA' : 'Saldo Awal'),
      'Kategori': r.tx ? r.tx.kategori : '',
      'Sumber': r.tx ? r.tx.sumber : '',
      'Dapur': r.tx ? (dapurMap[r.tx.dapur] || r.tx.dapur) : '',
      'Bukti URL': r.tx ? (r.tx.bukti_url || '') : '',
    };
  });
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [
    { wch: 10 }, { wch: 12 }, { wch: 14 }, { wch: 36 }, { wch: 14 },
    { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 },
    { wch: 14 }, { wch: 26 }, { wch: 12 }, { wch: 24 }, { wch: 50 },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Buku Besar');
  XLSX.writeFile(wb, namaFile);
}

function BukuBesar({ session, scope, toast }) {
  const [periodeList, setPeriodeList] = useState([]);
  const [selPeriode, setSelPeriode] = useState('');
  const [transaksi, setTransaksi] = useState([]);
  const [vaTopups, setVaTopups] = useState([]);
  const [dapur, setDapur] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(function() {
    Promise.all([
      api('getPeriodeList', { role: session.user.role, dapur: scope, scope: scope }),
      api('getDapur'),
    ]).then(function(arr){
      if (arr[0].ok) {
        setPeriodeList(arr[0].data);
        const aktif = arr[0].data.find(function(p){return p.status === 'AKTIF';});
        if (aktif) setSelPeriode(aktif.id);
        else if (arr[0].data[0]) setSelPeriode(arr[0].data[0].id);
        else setLoading(false);
      } else setLoading(false);
      if (arr[1].ok) setDapur(arr[1].data);
    });
  }, [scope]);

  useEffect(function() {
    if (!selPeriode) return;
    setLoading(true);
    const selObj = periodeList.find(function(p){return p.id === selPeriode;});
    const dapurId = selObj ? selObj.dapur : (scope && scope !== 'ALL' ? scope : (session.user.dapur || ''));
    Promise.all([
      api('getTransaksi', { role: session.user.role, dapur: session.user.dapur || '', scope: scope || 'ALL', periode_id: selPeriode }),
      api('getVATopups', { dapur: dapurId, periode_id: selPeriode }),
    ]).then(function(arr){
      setLoading(false);
      if (arr[0].ok) setTransaksi(arr[0].data);
      if (arr[1].ok) setVaTopups(arr[1].data);
    });
  }, [selPeriode, scope, periodeList]);

  const periode = periodeList.find(function(p){return p.id === selPeriode;});
  const dapurMap = useMemo(function(){ const m = {}; dapur.forEach(function(d){ m[d.id] = d.nama; }); return m; }, [dapur]);

  const ledger = useMemo(function(){
    if (!periode) return [];
    return buildDualLedger(periode.saldoVA, periode.saldoPettyAwal, vaTopups, transaksi);
  }, [periode, vaTopups, transaksi]);

  const totalKreditAktual = ledger.reduce(function(s,r){ return s + (r.kreditAktual||0); }, 0);
  const totalKreditAnggaran = ledger.reduce(function(s,r){ return s + (r.kreditAnggaran||0); }, 0);
  const saldoAkhirAktual = ledger.length > 0 ? ledger[ledger.length-1].saldoAktual : 0;
  const saldoAkhirAnggaran = ledger.length > 0 ? ledger[ledger.length-1].saldoAnggaran : 0;
  const selisihKredit = totalKreditAnggaran - totalKreditAktual;
  const selisihSaldo = saldoAkhirAnggaran - saldoAkhirAktual;

  if (loading) return <Card>{I.spinner}</Card>;

  return (
    <div>
      <Card className="mb-3">
        <Eyebrow>Periode</Eyebrow>
        <div className="flex flex-col sm:flex-row sm:items-end gap-3 mt-1">
          <div className="flex-1 min-w-0">
            <select value={selPeriode} onChange={function(e){setSelPeriode(e.target.value);}} style={inputStyle}>
              {periodeList.length === 0 && <option value="">Belum ada periode</option>}
              {periodeList.map(function(p){
                return <option key={p.id} value={p.id}>{(session.user.role === 'admin' || session.user.role === 'yayasan') && dapurMap[p.dapur] ? (dapurMap[p.dapur] + ' · ') : ''}Periode {p.periode_no} · {fmtDateRange(p.tanggal_mulai, p.tanggal_akhir)} · {p.status}</option>;
              })}
            </select>
          </div>
          <Btn kind="ghost" onClick={function(){
            bukuBesarExportExcel(ledger, dapurMap, 'buku-besar-' + (selPeriode || 'all') + '.xlsx');
          }} disabled={ledger.length === 0}>{I.download} Excel</Btn>
        </div>
        <p className="text-xs mt-2" style={{ color: COLORS.muted }}>
          Menampilkan <b>Realisasi Aktual</b> dan <b>Realisasi Anggaran</b> berdampingan untuk audit.
        </p>
      </Card>

      {/* RINGKASAN PERBANDINGAN */}
      {ledger.length > 1 && (
        <Card className="mb-3">
          <Eyebrow>Ringkasan</Eyebrow>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-2 mt-2">
            <div className="rounded p-3" style={{ background: COLORS.paper }}>
              <div className="text-xs" style={{ color: COLORS.muted }}>Total Kredit Aktual</div>
              <div className="font-bold num text-base" style={{ color: COLORS.green }}>{fmt(totalKreditAktual)}</div>
            </div>
            <div className="rounded p-3" style={{ background: COLORS.paper }}>
              <div className="text-xs" style={{ color: COLORS.muted }}>Total Kredit Anggaran</div>
              <div className="font-bold num text-base" style={{ color: COLORS.amber }}>{fmt(totalKreditAnggaran)}</div>
            </div>
            <div className="rounded p-3" style={{ background: COLORS.paper }}>
              <div className="text-xs" style={{ color: COLORS.muted }}>Saldo Akhir Aktual</div>
              <div className="font-bold num text-base" style={{ color: COLORS.green }}>{fmt(saldoAkhirAktual)}</div>
            </div>
            <div className="rounded p-3" style={{ background: COLORS.paper }}>
              <div className="text-xs" style={{ color: COLORS.muted }}>Saldo Akhir Anggaran</div>
              <div className="font-bold num text-base" style={{ color: COLORS.amber }}>{fmt(saldoAkhirAnggaran)}</div>
            </div>
          </div>
          <div className="mt-3 p-3 rounded" style={{ background: '#FFF9E8', border: '1px solid #F3E2A8' }}>
            <div className="text-xs" style={{ color: COLORS.muted }}>Selisih Markup (Anggaran − Aktual)</div>
            <div className="flex gap-6 mt-1 text-sm">
              <div>Kredit: <b className="num" style={{ color: COLORS.ink }}>{fmt(selisihKredit)}</b></div>
              <div>Saldo: <b className="num" style={{ color: COLORS.ink }}>{fmt(selisihSaldo)}</b></div>
            </div>
          </div>
        </Card>
      )}

      <Card pad={false}>
        <div className="overflow-x-auto">
          <table className="w-full text-sm" style={{ minWidth: 1200 }}>
            <thead>
              <tr style={{ color: COLORS.muted, background: COLORS.paper }} className="text-left text-xs uppercase">
                <th className="px-3 py-2.5 font-semibold">Bulan</th>
                <th className="px-3 py-2.5 font-semibold">Tanggal</th>
                <th className="px-3 py-2.5 font-semibold">No Bukti</th>
                <th className="px-3 py-2.5 font-semibold">Uraian</th>
                <th className="px-3 py-2.5 font-semibold text-right">Debit</th>
                <th className="px-3 py-2.5 font-semibold text-right" style={{ background: '#E8F1EC' }}>Kredit Aktual</th>
                <th className="px-3 py-2.5 font-semibold text-right" style={{ background: '#FAF1DC' }}>Kredit Anggaran</th>
                <th className="px-3 py-2.5 font-semibold text-right" style={{ background: '#E8F1EC' }}>Saldo Aktual</th>
                <th className="px-3 py-2.5 font-semibold text-right" style={{ background: '#FAF1DC' }}>Saldo Anggaran</th>
                <th className="px-3 py-2.5 font-semibold text-center" style={{ width: 60 }}>Bukti</th>
              </tr>
            </thead>
            <tbody>
              {ledger.length === 0 ? (
                <tr><td colSpan="10" className="px-4 py-8 text-center" style={{ color: COLORS.muted }}>Belum ada data.</td></tr>
              ) : ledger.map(function(row, idx){
                const isAwal = row.kind === 'awal', isTopup = row.kind === 'topup', isTx = row.kind === 'tx';
                const selisihRow = (row.saldoAnggaran||0) - (row.saldoAktual||0);
                return <tr key={idx} style={{ borderTop: '1px solid ' + COLORS.line, background: isAwal ? '#F0F7F2' : (isTopup ? '#F0F4FA' : 'transparent') }}>
                  <td className="px-3 py-2" style={{ color: COLORS.muted }}>{row.bulan}</td>
                  <td className="px-3 py-2" style={{ color: COLORS.muted }}>{row.kind === 'awal' ? '-' : getTglDayMonth(row.tanggal)}</td>
                  <td className="px-3 py-2 text-xs" style={{ color: COLORS.muted }}>{row.no_bukti}</td>
                  <td className="px-3 py-2" style={{ color: COLORS.ink, fontStyle: isAwal||isTopup ? 'italic' : 'normal' }}>
                    <div>{row.uraian}</div>
                    {isTx && row.tx && <div className="text-[11px] mt-0.5" style={{ color: COLORS.muted }}>
                      <span className="rounded px-1.5 py-0.5 mr-1" style={{ background: COLORS.paper }}>{row.tx.jenis}</span>
                      <span>{row.tx.kategori}</span>
                      <span className="ml-1.5">·</span><span className="ml-1.5">{row.tx.sumber}</span>
                    </div>}
                  </td>
                  <td className="px-3 py-2 text-right font-medium num" style={{ color: row.debit ? COLORS.green : COLORS.muted }}>{row.debit ? fmt(row.debit) : '-'}</td>
                  <td className="px-3 py-2 text-right font-medium num" style={{ color: row.kreditAktual ? COLORS.danger : COLORS.muted, background: '#F3F8F5' }}>{row.kreditAktual ? fmt(row.kreditAktual) : '-'}</td>
                  <td className="px-3 py-2 text-right font-medium num" style={{ color: row.kreditAnggaran ? COLORS.amber : COLORS.muted, background: '#FDF7EA' }}>{row.kreditAnggaran ? fmt(row.kreditAnggaran) : '-'}</td>
                  <td className="px-3 py-2 text-right font-semibold num" style={{ color: COLORS.ink, background: '#F3F8F5' }}>{fmt(row.saldoAktual)}</td>
                  <td className="px-3 py-2 text-right font-semibold num" style={{ color: COLORS.ink, background: '#FDF7EA' }}>
                    {fmt(row.saldoAnggaran)}
                    {selisihRow > 0 && <div className="text-[9px]" style={{ color: COLORS.muted }}>+{fmt(selisihRow)}</div>}
                  </td>
                  <td className="px-3 py-2 text-center">
                    {isTx && row.tx && row.tx.bukti_url ? (
                      <a href={row.tx.bukti_url} target="_blank" rel="noopener" title="Lihat bukti"
                        className="inline-flex items-center justify-center rounded p-1.5"
                        style={{ color: COLORS.green, border: '1px solid ' + COLORS.line }}>{I.image}</a>
                    ) : (
                      <span className="text-[10px]" style={{ color: COLORS.muted }}>—</span>
                    )}
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function PeriodeAdmin({ session, toast }) {

  const [loading, setLoading] = useState(true);
  const [confirmDel, setConfirmDel] = useState(null);
  const [deleting, setDeleting] = useState(false);

  function loadDapur() {
    api('getDapur').then(function(r){ if (r.ok) setDapur(r.data); });
  }
  const loadPeriode = useCallback(function() {
    setLoading(true);
    api('getPeriodeList', { role: session.user.role, scope: selDapur }).then(function(r){
      setLoading(false);
      if (r.ok) setPeriodeList(r.data); else toast(r.error, 'error');
    });
  }, [selDapur]);

  useEffect(function(){ loadDapur(); }, []);
  useEffect(function(){ loadPeriode(); }, [loadPeriode]);

  const dapurMap = {}; dapur.forEach(function(d){ dapurMap[d.id] = d.nama; });

  async function doDelete() {
    setDeleting(true);

    setDeleting(false);
    if (res.ok) {
      const d = res.data || {};

      setConfirmDel(null);
      loadPeriode();
    } else toast(res.error || 'Gagal hapus', 'error');

  return (<>
    <Card pad={false}>
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-4" style={{ borderBottom: '1px solid ' + COLORS.line }}>
        <div>
          <div className="font-bold" style={{ color: COLORS.ink }}>Kelola Periode</div>

        </div>
