<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Koperasi ISS — Sistem Bahan Dapur</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#f0f2f5;--card:#fff;--border:#e2e5ea;--text:#1a1d23;--muted:#6b7280;
--green:#0d9f6e;--green-bg:#ecfdf5;--green-dk:#065f46;
--blue:#2563eb;--blue-bg:#eff6ff;--purple:#7c3aed;--purple-bg:#f5f3ff;
--red:#dc2626;--red-bg:#fef2f2;--yellow:#d97706;--yellow-bg:#fffbeb;
--radius:12px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow-x:hidden}
input,select,textarea{font-family:inherit;font-size:16px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);outline:none;width:auto}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
table{border-collapse:collapse;width:100%}
h2{font-size:20px;font-weight:700;letter-spacing:-0.3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease}
@media(max-width:600px){.hide-mobile{display:none!important}.grid-1-mobile{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#999">Memuat...</div></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback}=React;
const API='https://script.google.com/macros/s/AKfycbzDvERzufLQJNeYreqZMZfEdGjBUxDw3avmYKvLOG8NJTJ5yF3Z67LVriqfyZUl4gOJ6w/exec';
const DAPUR=[
  {id:'mekarsari',nama:'Mekarsari',pic:'Anggi Lestari',hp:'081312007169',alamat:'SPPG Mekarsari, Bandung'},
  {id:'cipeujeuh2',nama:'Cipeujeuh 2',pic:'Wanda Azira',hp:'083125895109',alamat:'SPPG Cipeujeuh 2, Bandung'},
  {id:'sukamukti',nama:'Sukamukti',pic:'Della Maldini',hp:'0882000476152',alamat:'SPPG Sukamukti, Majalaya'},
  {id:'cipaku2',nama:'Cipaku 2',pic:'Firly',hp:'085795333292',alamat:'SPPG Cipaku 2, Bandung'},
];

// ===== UTILS =====
function normDate(d){if(!d)return'';const s=String(d).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;if(s.includes('T')||s.includes('Z')){const dt=new Date(s);if(!isNaN(dt.getTime())){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}}return s.slice(0,10);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function nextDay(s){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fRp(n){if(!n||isNaN(n))return'Rp 0';return'Rp '+Math.round(n).toLocaleString('id-ID');}
function parseRAB(t){const r=[];for(const l of t.trim().split('\n')){if(!l.trim())continue;const p=l.split('\t');if(p.length>=4){const nm=p[0].trim(),qt=parseFloat(p[1].replace(',','.'))||0,st=p[2].trim(),hj=parseInt(p[3].replace(/[^0-9]/g,''))||0;if(nm&&qt>0)r.push({nama:nm,qty:qt,satuan:st,harga_jual:hj,harga_beli:0});}}return r;}
function navItems(role){
  if(role==='admin')return[{id:'dashboard',label:'Dashboard',icon:'📊'},{id:'input_order',label:'Input Order',icon:'📝'},{id:'rekap_beli',label:'Rekap Beli',icon:'📋'},{id:'approval',label:'Approval',icon:'✅'},{id:'pengiriman',label:'Pengiriman',icon:'🚚'},{id:'surat_jalan',label:'Surat Jalan',icon:'📄'},{id:'laporan',label:'Laporan',icon:'📈'},{id:'kelola_akun',label:'Akun',icon:'👥'}];
  if(role==='operator')return[{id:'dashboard',label:'Dashboard',icon:'📊'},{id:'input_order',label:'Input Order',icon:'📝'},{id:'rekap_beli',label:'Rekap Beli',icon:'📋'},{id:'pengiriman',label:'Pengiriman',icon:'🚚'},{id:'surat_jalan',label:'Surat Jalan',icon:'📄'},{id:'pengeluaran',label:'Pengeluaran',icon:'💸'},{id:'kelola_akun',label:'Akun',icon:'👥'}];
  if(role==='staf_beli')return[{id:'tugas_beli',label:'Tugas Beli',icon:'🛒'}];
  if(role==='staf_kirim')return[{id:'pengiriman',label:'Pengiriman',icon:'🚚'}];
  if(role==='ceo'||role==='sekretaris')return[{id:'laporan',label:'Laporan',icon:'📈'}];
  return[];
}
const api={
  get:async(a,p={})=>(await fetch(API+'?'+new URLSearchParams({action:a,...p}))).json(),
  post:async(b)=>(await fetch(API,{method:'POST',body:JSON.stringify(b)})).json()
};

// ===== STYLES =====
const S_card={background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'16px',boxShadow:'var(--shadow)'};
const S_met={background:'var(--bg)',borderRadius:'10px',padding:'14px'};
const S_th={padding:'10px 12px',fontWeight:600,color:'var(--muted)',fontSize:'11px',textAlign:'left',textTransform:'uppercase',letterSpacing:'0.5px'};
const S_td={padding:'10px 12px',fontSize:'13px',borderBottom:'1px solid var(--border)'};
function btn(v,full){
  const b={padding:'10px 18px',fontSize:'13px',fontWeight:600,borderRadius:'10px',cursor:'pointer',border:'none',display:'inline-flex',alignItems:'center',gap:'6px',justifyContent:'center'};
  if(full)b.width='100%';
  if(v==='suc')return{...b,background:'var(--green)',color:'#fff'};
  if(v==='pri')return{...b,background:'var(--blue)',color:'#fff'};
  if(v==='war')return{...b,background:'var(--yellow)',color:'#fff'};
  if(v==='dan')return{...b,background:'var(--red)',color:'#fff'};
  if(v==='purple')return{...b,background:'var(--purple)',color:'#fff'};
  return{...b,background:'transparent',color:'var(--muted)',border:'1.5px solid var(--border)'};
}
function bdg(v){
  const b={fontSize:'11px',padding:'4px 10px',borderRadius:'20px',fontWeight:600,display:'inline-block'};
  if(v==='suc')return{...b,background:'var(--green-bg)',color:'var(--green-dk)'};
  if(v==='war')return{...b,background:'var(--yellow-bg)',color:'var(--yellow)'};
  if(v==='dan')return{...b,background:'var(--red-bg)',color:'var(--red)'};
  if(v==='purple')return{...b,background:'var(--purple-bg)',color:'var(--purple)'};
  return{...b,background:'var(--blue-bg)',color:'var(--blue)'};
}
function StatusBadge({status}){
  const m={approved:['suc','Approved ✓'],delivered:['suc','Terkirim'],pending_approval:['purple','Pending'],rejected:['dan','Ditolak'],cancelled:['dan','Batal']};
  const[v,l]=m[status]||['','Draft'];
  return <span style={bdg(v)}>{l}</span>;
}
function Spinner(){return <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'3rem',gap:'10px',color:'var(--muted)'}}><div style={{width:'20px',height:'20px',border:'2.5px solid var(--border)',borderTopColor:'var(--blue)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>Memuat...</div>;}
function DateNav({value,onChange,label}){
  const go=(n)=>{const d=new Date(value+'T00:00:00');d.setDate(d.getDate()+n);onChange(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));};
  const isToday=value===todayStr();
  return(
    <div style={{...S_card,marginBottom:'12px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px',padding:'10px 14px'}}>
      <button onClick={()=>go(-1)} style={{...btn(),padding:'8px 14px',fontSize:'18px'}}>‹</button>
      <div style={{display:'flex',alignItems:'center',gap:'8px',flex:1,justifyContent:'center',flexWrap:'wrap'}}>
        {label && <span style={{fontSize:'12px',color:'var(--muted)'}}>{label}</span>}
        <input type="date" value={value} onChange={e=>onChange(e.target.value)} style={{fontSize:'14px',padding:'8px 10px'}}/>
        {isToday ? <span style={bdg('suc')}>Hari ini</span> : <button onClick={()=>onChange(todayStr())} style={{fontSize:'12px',color:'var(--blue)',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>Hari ini</button>}
      </div>
      <button onClick={()=>go(1)} style={{...btn(),padding:'8px 14px',fontSize:'18px'}}>›</button>
    </div>
  );
}
function TabBar({tabs,active,onChange}){
  return(
    <div style={{display:'flex',gap:'2px',marginBottom:'16px',overflowX:'auto',WebkitOverflowScrolling:'touch',borderBottom:'2px solid var(--border)'}}>
      {tabs.map(([id,lbl,cnt])=>(
        <button key={id} onClick={()=>onChange(id)} style={{padding:'10px 16px',fontSize:'13px',fontWeight:active===id?700:500,border:'none',background:'transparent',cursor:'pointer',borderBottom:active===id?'2.5px solid var(--blue)':'2.5px solid transparent',color:active===id?'var(--blue)':'var(--muted)',marginBottom:'-2px',whiteSpace:'nowrap'}}>
          {lbl}{cnt>0 && <span style={{...bdg('war'),fontSize:'10px',marginLeft:'6px',padding:'2px 6px'}}>{cnt}</span>}
        </button>
      ))}
    </div>
  );
}

// ===== LOGIN =====
function Login({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');const[ld,setLd]=useState(false);const[sp,setSp]=useState(false);
  const go=async()=>{if(!u||!p){setErr('Isi username dan password');return;}setLd(true);setErr('');try{const r=await api.get('login',{username:u,password:p});if(r.success)onLogin(r.user);else setErr(r.message||'Salah');}catch(e){setErr('Tidak bisa terhubung.');}setLd(false);};
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#ecfdf5 0%,#eff6ff 50%,#f5f3ff 100%)',padding:'16px'}}>
      <div style={{...S_card,width:'100%',maxWidth:'380px',padding:'32px'}} className="fade-in">
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <div style={{width:'60px',height:'60px',borderRadius:'16px',background:'linear-gradient(135deg,var(--green),#059669)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:'24px',fontWeight:700}}>K</div>
          <div style={{fontSize:'11px',color:'var(--muted)',letterSpacing:'1.5px',textTransform:'uppercase'}}>Koperasi Insan Sinergi Sejahtera</div>
          <div style={{fontSize:'20px',fontWeight:700,marginTop:'4px'}}>Sistem Bahan Dapur</div>
        </div>
        <div style={{marginBottom:'16px'}}><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Username</label><input value={u} onChange={e=>setU(e.target.value)} placeholder="Username" style={{width:'100%',boxSizing:'border-box'}}/></div>
        <div style={{marginBottom:'20px'}}><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Password</label><div style={{position:'relative'}}><input type={sp?'text':'password'} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="Password" style={{width:'100%',boxSizing:'border-box',paddingRight:'44px'}}/><button onClick={()=>setSp(x=>!x)} style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'16px'}}>{sp?'🙈':'👁️'}</button></div></div>
        {err && <div style={{fontSize:'13px',color:'var(--red)',padding:'10px 14px',background:'var(--red-bg)',borderRadius:'10px',marginBottom:'16px'}}>{err}</div>}
        <button onClick={go} disabled={ld} style={{...btn('suc',true),padding:'14px',fontSize:'15px',opacity:ld?0.7:1}}>{ld?'Masuk...':'Masuk'}</button>
      </div>
    </div>
  );
}

// ===== SIDEBAR =====
function Sidebar({user,view,setView,onLogout,mobileOpen,closeMobile}){
  const items=navItems(user.role);
  const roleLabel={admin:'Admin',operator:'Operator',staf_beli:'Staf Pembelian',staf_kirim:'Staf Pengiriman',ceo:'CEO',sekretaris:'Sekretaris'}[user.role]||user.role;
  const inner=(
    <div style={{width:'230px',flexShrink:0,background:'var(--card)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{padding:'16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'10px'}}>
        <div style={{width:'34px',height:'34px',borderRadius:'10px',background:'linear-gradient(135deg,var(--green),#059669)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',fontWeight:700}}>K</div>
        <div><div style={{fontSize:'10px',color:'var(--muted)',letterSpacing:'0.5px'}}>KOPERASI ISS</div><div style={{fontSize:'13px',fontWeight:700}}>Bahan Dapur</div></div>
      </div>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg)'}}><div style={{fontSize:'14px',fontWeight:700}}>{user.name}</div><div style={{fontSize:'12px',color:'var(--muted)'}}>{roleLabel}</div></div>
      <nav style={{flex:1,padding:'8px',overflowY:'auto'}}>
        {items.map(it=>(
          <button key={it.id} onClick={()=>{setView(it.id);closeMobile();}} style={{display:'flex',alignItems:'center',gap:'10px',width:'100%',textAlign:'left',padding:'10px 12px',fontSize:'13px',background:view===it.id?'var(--blue-bg)':'transparent',color:view===it.id?'var(--blue)':'var(--muted)',border:'none',borderRadius:'10px',cursor:'pointer',marginBottom:'2px',fontWeight:view===it.id?700:500}}>
            <span>{it.icon}</span>{it.label}
          </button>
        ))}
      </nav>
      <div style={{padding:'8px',borderTop:'1px solid var(--border)'}}>
        <button onClick={onLogout} style={{display:'flex',alignItems:'center',gap:'10px',width:'100%',textAlign:'left',padding:'10px 12px',fontSize:'13px',color:'var(--red)',background:'transparent',border:'none',cursor:'pointer',borderRadius:'10px',fontWeight:600}}>🚪 Keluar</button>
      </div>
    </div>
  );
  return(
    <React.Fragment>
      <div className="hide-mobile" style={{display:'flex',height:'100%'}}>{inner}</div>
      {mobileOpen && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',zIndex:999}} onClick={closeMobile}/>}
      <div style={{position:'fixed',top:0,left:0,bottom:0,zIndex:1000,transform:mobileOpen?'translateX(0)':'translateX(-100%)',transition:'transform 0.25s ease',display:'none'}} className="show-mobile">{inner}</div>
      <style>{`@media(min-width:601px){.show-mobile{display:none!important}}@media(max-width:600px){.show-mobile{display:block!important}}`}</style>
    </React.Fragment>
  );
}

// ===== MOBILE TOP BAR =====
function MobileBar({user,onMenu,title}){
  return(
    <div className="hide-mobile" style={{display:'none'}}>
      <style>{`@media(max-width:600px){.mob-bar{display:flex!important}}`}</style>
    </div>
  );
}
function MobileTopBar({user,onMenu,title}){
  return(
    <React.Fragment>
      <div className="mob-bar" style={{display:'none',alignItems:'center',gap:'12px',padding:'12px 16px',background:'var(--card)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:100}}>
        <button onClick={onMenu} style={{background:'none',border:'none',fontSize:'22px',padding:'4px',cursor:'pointer'}}>☰</button>
        <div style={{flex:1,fontWeight:700,fontSize:'15px'}}>{title||'Koperasi ISS'}</div>
        <div style={{width:'32px',height:'32px',borderRadius:'8px',background:'linear-gradient(135deg,var(--green),#059669)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700}}>{user.name?.charAt(0)}</div>
      </div>
      <style>{`@media(max-width:600px){.mob-bar{display:flex!important}}`}</style>
    </React.Fragment>
  );
}

// ===== DASHBOARD =====
function Dashboard({orders,loading,error,onRefresh,onCancelOrder,onDeleteOrder,onReorder,userRole}){
  const isAdmin=userRole==='admin';const canCancel=userRole==='admin'||userRole==='operator';
  const[cid,setCid]=useState(null);const[did,setDid]=useState(null);const[deleting,setDeleting]=useState(false);
  const tj=orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);
  const tb=orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);
  const pending=orders.filter(o=>o.status==='pending_approval').length;
  const co=orders.find(o=>o.id===cid);const cd=DAPUR.find(d=>d.id===co?.dapur_id);
  const dOrder=orders.find(o=>o.id===did);const dDapur=DAPUR.find(d=>d.id===dOrder?.dapur_id);
  const handleDelete=async()=>{setDeleting(true);try{const r=await api.post({action:'deleteOrder',orderId:did});if(r.success){onDeleteOrder(did);setDid(null);alert('Order dihapus.');}else alert('Gagal');}catch(e){alert('Koneksi');}setDeleting(false);};
  return(
    <div style={{padding:'16px',maxWidth:'960px',margin:'0 auto'}} className="fade-in">
      {cid && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'16px'}} onClick={()=>setCid(null)}><div style={{...S_card,maxWidth:'360px',width:'100%',padding:'24px'}} onClick={e=>e.stopPropagation()}><div style={{fontSize:'16px',fontWeight:700,textAlign:'center',marginBottom:'16px'}}>Batalkan Order?</div><div style={{fontSize:'14px',color:'var(--muted)',textAlign:'center',marginBottom:'20px'}}>Order {cd?.nama} tgl {co?.tanggal_kirim}</div><div style={{display:'flex',gap:'10px'}}><button onClick={()=>setCid(null)} style={{...btn(),flex:1}}>Tidak</button><button onClick={()=>{onCancelOrder(cid);setCid(null);}} style={{...btn('dan'),flex:1}}>Ya, Batalkan</button></div></div></div>}
      {did && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'16px'}} onClick={()=>setDid(null)}><div style={{...S_card,maxWidth:'360px',width:'100%',padding:'24px'}} onClick={e=>e.stopPropagation()}><div style={{fontSize:'30px',textAlign:'center',marginBottom:'8px'}}>🗑️</div><div style={{fontSize:'16px',fontWeight:700,textAlign:'center',marginBottom:'8px'}}>Hapus Order Permanen?</div><div style={{fontSize:'13px',color:'var(--muted)',textAlign:'center',marginBottom:'6px'}}>Order <strong>{dDapur?.nama}</strong> · {normDate(dOrder?.tanggal_kirim)}</div><div style={{fontSize:'12px',color:'var(--red)',textAlign:'center',marginBottom:'20px'}}>Data order, item, dan pengiriman akan dihapus. Tidak bisa dikembalikan.</div><div style={{display:'flex',gap:'10px'}}><button onClick={()=>setDid(null)} style={{...btn(),flex:1}}>Batal</button><button onClick={handleDelete} disabled={deleting} style={{...btn('dan'),flex:1}}>{deleting?'Menghapus...':'Ya, Hapus'}</button></div></div></div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',flexWrap:'wrap',gap:'8px'}}><h2>Dashboard</h2><button onClick={onRefresh} style={{...btn(),padding:'8px 14px',fontSize:'12px'}}>↻ Refresh</button></div>
      {pending>0&&isAdmin && <div style={{...S_card,marginBottom:'16px',border:'2px solid #c4b5fd',background:'var(--purple-bg)'}}><div style={{fontSize:'14px',fontWeight:700,color:'var(--purple)'}}>🔔 {pending} order menunggu approval</div></div>}
      {error && <div style={{padding:'14px',background:'var(--red-bg)',borderRadius:'var(--radius)',color:'var(--red)',marginBottom:'16px'}}>Gagal: {error}</div>}
      {loading ? <Spinner/> : (
        <React.Fragment>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'10px',marginBottom:'20px'}}>
            <div style={S_met}><div style={{fontSize:'11px',color:'var(--muted)',fontWeight:600}}>Total Order</div><div style={{fontSize:'20px',fontWeight:700}}>{orders.length}</div></div>
            <div style={S_met}><div style={{fontSize:'11px',color:'var(--muted)',fontWeight:600}}>Penjualan</div><div style={{fontSize:'18px',fontWeight:700,color:'var(--blue)'}}>{fRp(tj)}</div></div>
            {isAdmin && <React.Fragment><div style={S_met}><div style={{fontSize:'11px',color:'var(--muted)',fontWeight:600}}>Pembelian</div><div style={{fontSize:'18px',fontWeight:700}}>{fRp(tb)}</div></div>
            <div style={{...S_met,background:tj-tb>=0?'var(--green-bg)':'var(--red-bg)'}}><div style={{fontSize:'11px',color:'var(--muted)',fontWeight:600}}>Profit</div><div style={{fontSize:'18px',fontWeight:700,color:tj-tb>=0?'var(--green-dk)':'var(--red)'}}>{fRp(tj-tb)}</div></div></React.Fragment>}
          </div>
          <div style={S_card}><div style={{fontSize:'15px',fontWeight:700,marginBottom:'14px'}}>Semua Order</div>
            <div style={{overflowX:'auto',margin:'0 -16px',padding:'0 16px'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Dapur','Kirim','Item','Nilai','Status','Aksi'].map((h,i)=><th key={i} style={{...S_th,textAlign:i===3?'right':'left'}}>{h}</th>)}</tr></thead>
            <tbody>{orders.map(o=>{const d=DAPUR.find(x=>x.id===o.dapur_id);const n=o.items.reduce((s,i)=>s+i.qty*i.harga_jual,0);const cc=canCancel&&!['delivered','cancelled','approved'].includes(o.status);
              return(<tr key={o.id} style={{opacity:o.status==='cancelled'?0.4:1}}><td style={{...S_td,fontWeight:600}}>{d?.nama}</td><td style={{...S_td,color:'var(--muted)',fontSize:'12px'}}>{normDate(o.tanggal_kirim)}</td><td style={{...S_td,color:'var(--muted)'}}>{o.items.length}</td><td style={{...S_td,textAlign:'right',fontWeight:600}}>{fRp(n)}</td><td style={S_td}><StatusBadge status={o.status}/></td>
                <td style={S_td}><div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                  {cc&&<button onClick={()=>setCid(o.id)} style={{...btn('dan'),padding:'4px 10px',fontSize:'11px'}}>Batal</button>}
                  {canCancel&&o.status!=='cancelled'&&<button onClick={()=>{onReorder(o);}} style={{...btn('pri'),padding:'4px 10px',fontSize:'11px'}}>Edit</button>}
                  {canCancel&&<button onClick={()=>setDid(o.id)} style={{...btn(),padding:'4px 10px',fontSize:'11px',color:'var(--red)'}}>🗑️</button>}
                </div></td>

}

// ===== INPUT ORDER =====
function InputOrder({onOrderAdded,setView,editOrder,onClearEdit}){
  const isEdit=!!editOrder;

  const[items,setItems]=useState(isEdit?editOrder.items.map(it=>({nama:it.nama||it.nama_bahan,qty:it.qty,satuan:it.satuan,harga_jual:it.harga_jual,harga_beli:it.harga_beli||0})):[]);
  const[tO,setTO]=useState(isEdit?normDate(editOrder.tanggal_order):todayStr());const[tK,setTK]=useState(isEdit?normDate(editOrder.tanggal_kirim):nextDay(todayStr()));const[err,setErr]=useState('');const[sav,setSav]=useState(false);
  // Clean up edit state when unmounting
  useEffect(()=>()=>{if(onClearEdit)onClearEdit();},[]);
  const parse=()=>{const it=parseRAB(rab);if(!it.length){setErr('Format tidak dikenali.');return;}setErr('');setItems(it);setStep(3);};
  const upd=(idx,f,v)=>setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:f==='qty'?parseFloat(v)||0:parseInt(v)||0}:it));
  const submit=async()=>{setSav(true);
    // If editing, delete old order first
    if(isEdit){try{await api.post({action:'deleteOrder',orderId:editOrder.id});}catch(e){}}
    const order={id:'ord-'+Date.now(),dapur_id:selD,tanggal_order:tO,tanggal_kirim:tK,status:'draft',items};try{const r=await api.post({action:'addOrder',order});if(r.success){onOrderAdded(order);alert(isEdit?'Order berhasil diperbarui!':'Order berhasil!');setView('dashboard');}else alert('Gagal');}catch(e){alert('Koneksi');}setSav(false);};
  const tot=items.reduce((s,i)=>s+i.qty*i.harga_jual,0);

    <div style={{padding:'16px',maxWidth:'820px',margin:'0 auto'}} className="fade-in">

        {step===1&&(<div>
          <div className="grid-1-mobile" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'16px'}}><div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Tanggal Order</label><input type="date" value={tO} onChange={e=>{setTO(e.target.value);setTK(nextDay(e.target.value));}} style={{width:'100%',boxSizing:'border-box'}}/></div><div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Tanggal Kirim</label><input type="date" value={tK} onChange={e=>setTK(e.target.value)} style={{width:'100%',boxSizing:'border-box'}}/></div></div>
          <div style={{fontSize:'13px',color:'var(--muted)',marginBottom:'10px',fontWeight:600}}>Pilih Dapur</div>
          <div className="grid-1-mobile" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}}>{DAPUR.map(d=><button key={d.id} onClick={()=>setSelD(d.id)} style={{padding:'14px',textAlign:'left',background:selD===d.id?'var(--blue-bg)':'var(--bg)',border:selD===d.id?'2px solid var(--blue)':'1.5px solid var(--border)',borderRadius:'12px',cursor:'pointer'}}><div style={{fontWeight:700,color:selD===d.id?'var(--blue)':'var(--text)'}}>{d.nama}</div><div style={{fontSize:'12px',color:'var(--muted)',marginTop:'4px'}}>{d.pic}</div></button>)}</div>
          <button disabled={!selD} onClick={()=>setStep(2)} style={{...btn('pri'),opacity:selD?1:0.4}}>Lanjut →</button>
        </div>)}
        {step===2&&(<div>
          <div style={{fontSize:'14px',fontWeight:600,marginBottom:'12px'}}>Dapur: <span style={{color:'var(--blue)'}}>{DAPUR.find(d=>d.id===selD)?.nama}</span></div>
          <div style={{padding:'10px',background:'var(--bg)',borderRadius:'10px',marginBottom:'12px',fontSize:'12px',color:'var(--muted)',fontFamily:'monospace'}}>Format: Bahan [Tab] Qty [Tab] Satuan [Tab] Harga</div>
          <textarea value={rab} onChange={e=>setRab(e.target.value)} placeholder={"Beras Premium\t100.8\tKg\tRp15,000"} style={{width:'100%',minHeight:'180px',fontFamily:'monospace',fontSize:'13px',resize:'vertical',boxSizing:'border-box'}}/>
          {err&&<div style={{color:'var(--red)',fontSize:'13px',marginTop:'8px',padding:'10px',background:'var(--red-bg)',borderRadius:'10px'}}>{err}</div>}
          <div style={{display:'flex',gap:'10px',marginTop:'14px'}}><button onClick={()=>setStep(1)} style={btn()}>← Kembali</button><button disabled={!rab.trim()} onClick={parse} style={{...btn('pri'),opacity:rab.trim()?1:0.4}}>Parse →</button></div>
        </div>)}
        {step===3&&(<div>
          <div style={{fontSize:'14px',fontWeight:600,marginBottom:'14px'}}>Review: {DAPUR.find(d=>d.id===selD)?.nama} · Kirim: {tK}</div>
          <div style={{overflowX:'auto',margin:'0 -16px',padding:'0 16px'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Bahan','Qty','Sat','Harga Jual','Subtotal',''].map((h,i)=><th key={i} style={{...S_th,textAlign:i>=3&&i<5?'right':'left'}}>{h}</th>)}</tr></thead>
          <tbody>{items.map((it,idx)=><tr key={idx}><td style={{...S_td,fontWeight:600}}>{it.nama}</td><td style={S_td}><input type="number" value={it.qty} onChange={e=>upd(idx,'qty',e.target.value)} style={{width:'70px',textAlign:'right',padding:'6px',fontSize:'13px'}}/></td><td style={{...S_td,color:'var(--muted)',fontSize:'12px'}}>{it.satuan}</td><td style={{...S_td,textAlign:'right'}}><input type="number" value={it.harga_jual} onChange={e=>upd(idx,'harga_jual',e.target.value)} style={{width:'100px',textAlign:'right',padding:'6px',fontSize:'13px'}}/></td><td style={{...S_td,textAlign:'right',fontWeight:700}}>{fRp(it.qty*it.harga_jual)}</td><td style={S_td}><button onClick={()=>setItems(p=>p.filter((_,i)=>i!==idx))} style={{color:'var(--red)',background:'none',border:'none',cursor:'pointer',fontSize:'16px'}}>×</button></td></tr>)}</tbody>
          <tfoot><tr style={{borderTop:'2px solid var(--border)'}}><td colSpan={4} style={{...S_td,textAlign:'right',fontWeight:700,borderBottom:'none'}}>Total:</td><td style={{...S_td,textAlign:'right',fontWeight:700,fontSize:'16px',color:'var(--blue)',borderBottom:'none'}}>{fRp(tot)}</td><td></td></tr></tfoot></table></div>
          <div style={{display:'flex',gap:'10px',marginTop:'16px',flexWrap:'wrap'}}><button onClick={()=>setStep(2)} style={btn()}>← Kembali</button><button onClick={submit} disabled={sav} style={{...btn('suc'),opacity:sav?0.6:1}}>{sav?'Menyimpan...':isEdit?'✓ Update Order':'✓ Simpan Order'}</button></div>
        </div>)}
      </div>
    </div>
  );
}

// ===== REKAP & TUGAS BELI =====
function RekapBeli({orders,tugasBeli,stafBeli,allUsers,onTugasSaved,userRole,onRefresh}){
  const[sd,setSd]=useState(todayStr());const[asgn,setAsgn]=useState({});const[sav,setSav]=useState(false);const[tab,setTab]=useState('bagi');
  const[editHJ,setEditHJ]=useState({});const[hjSav,setHjSav]=useState({});const[subSav,setSubSav]=useState({});const[search,setSearch]=useState('');const[reviewOrder,setReviewOrder]=useState(null);const[reviewItems,setReviewItems]=useState([]);const[revSav,setRevSav]=useState(false);

  const ri=useMemo(()=>{
    const ro=orders.filter(o=>['draft','pending_kirim','delivered','rejected'].includes(o.status)&&normDate(o.tanggal_kirim)===sd);
    const m={};for(const o of ro)for(const it of o.items){const nm=it.nama||it.nama_bahan;const k=nm+'|'+it.satuan;if(!m[k])m[k]={nama:nm,satuan:it.satuan,total:0,ords:[],hjs:[]};m[k].total+=it.qty;m[k].ords.push({dapur:DAPUR.find(d=>d.id===o.dapur_id)?.nama,qty:it.qty,harga_jual:it.harga_jual,itemId:it.id});m[k].hjs.push(it.harga_jual);}
    return Object.values(m).sort((a,b)=>a.nama.localeCompare(b.nama));
  },[orders,sd]);
  const ordersForDate=useMemo(()=>orders.filter(o=>normDate(o.tanggal_kirim)===sd&&['draft','delivered','rejected'].includes(o.status)),[orders,sd]);
  const tugasH=tugasBeli.filter(t=>normDate(t.tanggal)===sd);const totalT=tugasH.length;const done=tugasH.filter(t=>t.status==='done').length;const belum=totalT-tugasH.filter(t=>t.status==='bought'||t.status==='done').length;
  const getNm=(sid)=>{const u=(allUsers||[]).find(x=>x.username===sid||x.id===sid);return u?u.name:sid;};

  // Load existing tugas into asgn state when date changes or tugasBeli updates
  useEffect(()=>{
    const existing=tugasBeli.filter(t=>normDate(t.tanggal)===sd);
    if(!existing.length){setAsgn({});return;}
    const built={};
    for(const t of existing){
      const nm=t.nama_bahan;
      if(!built[nm])built[nm]=[];
      built[nm].push({staf:t.staf_id,qty:t.qty,status:t.status,tugasId:t.id});
    }
    setAsgn(built);
  },[sd,tugasBeli]);

  const getA=(nm)=>asgn[nm]||[];
  const addA=(nm,tot2)=>setAsgn(p=>{const c=p[nm]||[];const used=c.reduce((s,a)=>s+(parseFloat(a.qty)||0),0);return{...p,[nm]:[...c,{staf:'',qty:Math.max(0,tot2-used)}]};});
  const rmA=(nm,i)=>setAsgn(p=>({...p,[nm]:(p[nm]||[]).filter((_,j)=>j!==i)}));
  const upA=(nm,i,f,v)=>setAsgn(p=>({...p,[nm]:(p[nm]||[]).map((a,j)=>j===i?{...a,[f]:v}:a)}));
  const saveTugas=async()=>{const tugas=[];for(const it of ri)for(const a of getA(it.nama)){if(!a.staf)continue;tugas.push({id:a.tugasId||('tgs-'+Date.now()+'-'+Math.random().toString(36).slice(2,7)),tanggal:sd,staf_id:a.staf,nama_bahan:it.nama,qty:parseFloat(a.qty)||0,satuan:it.satuan});}if(!tugas.length){alert('Pilih staf');return;}setSav(true);try{const r=await api.post({action:'saveTugasBeli',tugas,tanggal:sd});if(r.success){onTugasSaved(tugas,sd);alert('Tersimpan!');}else alert('Gagal');}catch(e){alert('Koneksi');}setSav(false);};
  const saveHJ=async(itemId,v)=>{setHjSav(p=>({...p,[itemId]:true}));try{await api.post({action:'updateHargaJual',itemId,hargaJual:parseFloat(v)||0});onRefresh();}catch(e){alert('Gagal');}setHjSav(p=>({...p,[itemId]:false}));};
  const submitAppr=async(oid)=>{setSubSav(p=>({...p,[oid]:true}));try{const r=await api.post({action:'submitForApproval',orderId:oid});if(r.success){alert('Diajukan!');onRefresh();}else alert('Gagal');}catch(e){alert('Koneksi');}setSubSav(p=>({...p,[oid]:false}));};
  const tsI=(s)=>s==='done'?<span style={bdg('suc')}>Harga ✓</span>:s==='bought'?<span style={bdg('war')}>Dibeli</span>:<span style={{...bdg(),background:'var(--bg)',color:'var(--muted)'}}>Belum</span>;
  const copyWA=()=>{
    const lines=['*Tugas Beli Bahan — '+sd+'*',''];const byStaf={};
    for(const it of ri){for(const a of getA(it.nama)){if(!a.staf)continue;const sn=stafBeli.find(s=>s.id===a.staf)?.nama||a.staf;if(!byStaf[sn])byStaf[sn]=[];byStaf[sn].push('• '+it.nama+': '+(parseFloat(a.qty)||it.total)+' '+it.satuan);}}
    for(const[sn,its]of Object.entries(byStaf)){lines.push('*'+sn+':*');its.forEach(x=>lines.push(x));lines.push('');}
    if(!Object.keys(byStaf).length){alert('Belum ada tugas yang ditugaskan');return;}
    if(navigator.clipboard)navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('Teks WA disalin ke clipboard! 📋'));else{const ta=document.createElement('textarea');ta.value=lines.join('\n');document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Teks WA disalin! 📋');}
  };
  const sq=search.toLowerCase();
  const riF=sq?ri.filter(it=>it.nama.toLowerCase().includes(sq)):ri;
  const tugasF=sq?tugasH.filter(t=>t.nama_bahan.toLowerCase().includes(sq)||getNm(t.staf_id).toLowerCase().includes(sq)):tugasH;
  return(
    <div style={{padding:'16px',maxWidth:'960px',margin:'0 auto'}} className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',flexWrap:'wrap',gap:'8px'}}><h2>Rekap &amp; Tugas Beli</h2><div style={{display:'flex',gap:'8px',alignItems:'center'}}><span style={{fontSize:'12px',color:'var(--muted)',fontWeight:600}}>Kirim:</span><input type="date" value={sd} onChange={e=>setSd(e.target.value)} style={{padding:'8px 10px',fontSize:'14px'}}/></div></div>
      {totalT>0 && <div style={{...S_card,marginBottom:'16px',border:belum>0?'2px solid #fcd34d':'2px solid var(--green)',background:belum>0?'var(--yellow-bg)':'var(--green-bg)'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{fontWeight:700,color:belum>0?'var(--yellow)':'var(--green-dk)'}}>{belum>0?'⚠️ '+belum+' belum dibeli':'✅ Semua dibeli!'}</span><span style={{fontSize:'12px',color:'var(--muted)',fontWeight:600}}>{done}/{totalT} harga terisi</span></div><div style={{height:'6px',background:'rgba(0,0,0,0.1)',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',background:'var(--green)',borderRadius:'3px',width:(totalT>0?(done/totalT)*100:0)+'%'}}/></div></div>}
      <TabBar tabs={[['bagi','Bagi Tugas',0],['monitor','Monitor',belum],['harga','Edit Harga',0],['submit','Approval',0]]} active={tab} onChange={setTab}/>
      <div style={{marginBottom:'14px'}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cari bahan..." style={{width:'100%',boxSizing:'border-box',padding:'10px 14px',fontSize:'14px'}}/></div>

      {tab==='bagi' && (!riF.length ? <div style={{...S_met,padding:'2rem',textAlign:'center',color:'var(--muted)'}}>{sq?'Tidak ditemukan':'Tidak ada order untuk '+sd}</div> : (
        <React.Fragment>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{riF.map(it=>{const as=getA(it.nama);const used=as.reduce((s,a)=>s+(parseFloat(a.qty)||0),0);const rem=it.total-used;const hjMax=Math.max(...it.hjs);
            return(<div key={it.nama} style={S_card}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px',gap:'8px'}}>
                <div><div style={{fontWeight:700,fontSize:'15px'}}>{it.nama}</div><div style={{fontSize:'12px',color:'var(--muted)',marginTop:'4px'}}>Total: <strong style={{color:'var(--blue)'}}>{it.total} {it.satuan}</strong> · {it.ords.map(o=>o.dapur+': '+o.qty).join(' · ')}</div><div style={{fontSize:'12px',color:'var(--green-dk)',marginTop:'4px',fontWeight:600}}>💰 Jual tertinggi: {fRp(hjMax)}/{it.satuan}</div></div>
                <button onClick={()=>addA(it.nama,it.total)} style={{...btn('pri'),padding:'8px 14px',fontSize:'12px',whiteSpace:'nowrap'}}>+ Staf</button>
              </div>
              {as.length>0 && <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>{as.map((a,idx)=><div key={idx} style={{display:'flex',gap:'8px',alignItems:'center',padding:'10px 12px',background:a.status==='done'?'var(--green-bg)':a.status==='bought'?'var(--yellow-bg)':'var(--bg)',borderRadius:'10px',flexWrap:'wrap',border:a.status?'1.5px solid '+(a.status==='done'?'var(--green)':a.status==='bought'?'var(--yellow)':'var(--border)'):'none'}}>
                <select value={a.staf} onChange={e=>upA(it.nama,idx,'staf',e.target.value)} style={{fontSize:'14px',padding:'8px 10px',flex:'1',minWidth:'120px'}}><option value="">— Pilih Staf —</option>{stafBeli.map(s=><option key={s.id} value={s.id}>{s.nama}</option>)}</select>
                <div style={{display:'flex',alignItems:'center',gap:'4px'}}><input type="number" value={a.qty} onChange={e=>upA(it.nama,idx,'qty',e.target.value)} style={{width:'80px',textAlign:'right',padding:'8px 10px'}}/><span style={{fontSize:'12px',color:'var(--muted)'}}>{it.satuan}</span></div>
                {a.status && <span style={{fontSize:'11px'}}>{tsI(a.status)}</span>}
                <button onClick={()=>rmA(it.nama,idx)} style={{fontSize:'18px',color:'var(--red)',background:'none',border:'none',cursor:'pointer'}}>×</button>
              </div>)}{Math.abs(rem)>0.01&&<div style={{fontSize:'12px',color:rem>0?'var(--yellow)':'var(--red)',padding:'4px 12px',fontWeight:600}}>{rem>0?'⚠️ Sisa '+rem.toFixed(1)+' belum ditugaskan':'⚠️ Kelebihan '+Math.abs(rem).toFixed(1)}</div>}</div>}
              {as.length===0&&<div style={{fontSize:'13px',color:'var(--muted)',fontStyle:'italic'}}>Klik "+ Staf" untuk menugaskan</div>}
            </div>);
          })}</div>
          <div style={{display:'flex',gap:'10px',marginTop:'16px',flexWrap:'wrap'}}>
            <button onClick={saveTugas} disabled={sav} style={{...btn('suc'),opacity:sav?0.6:1}}>{sav?'Menyimpan...':'✓ Simpan Tugas'}</button>
            <button onClick={copyWA} style={{...btn('war')}}>📋 Salin Teks WA</button>
          </div>
        </React.Fragment>
      ))}

      {tab==='monitor' && (!tugasF.length ? <div style={{...S_met,padding:'2rem',textAlign:'center',color:'var(--muted)'}}>{sq?'Tidak ditemukan':'Belum ada tugas untuk '+sd}</div> :
        <React.Fragment>
        <div style={S_card}><div style={{overflowX:'auto',margin:'0 -16px',padding:'0 16px'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Staf','Bahan','Qty','Status','H. Jual','H. Beli','Margin'].map((h,i)=><th key={i} style={{...S_th,textAlign:i>=4?'right':'left'}}>{h}</th>)}</tr></thead>
        <tbody>{tugasF.map(t=>{const hjItem=ri.find(x=>x.nama===t.nama_bahan);const hjMax=hjItem?Math.max(...hjItem.hjs):0;const margin=t.status==='done'&&hjMax>0?hjMax-t.harga_beli:null;return(
          <tr key={t.id}><td style={{...S_td,fontWeight:600}}>{getNm(t.staf_id)}</td><td style={S_td}>{t.nama_bahan}</td><td style={{...S_td,color:'var(--muted)'}}>{t.qty} {t.satuan}</td><td style={S_td}>{tsI(t.status)}</td>
          <td style={{...S_td,textAlign:'right',color:'var(--blue)',fontWeight:600}}>{hjMax>0?fRp(hjMax):'—'}</td>
          <td style={{...S_td,textAlign:'right',fontWeight:600,color:t.status==='done'?'var(--green-dk)':'var(--muted)'}}>{t.status==='done'?fRp(t.harga_beli):'—'}</td>
          <td style={{...S_td,textAlign:'right',fontWeight:700,color:margin!==null?(margin>=0?'var(--green-dk)':'var(--red)'):'var(--muted)'}}>{margin!==null?fRp(margin):'—'}</td>
          </tr>);})}</tbody></table></div></div>
        <div style={{marginTop:'12px'}}><button onClick={()=>{
          const belumBeli=tugasH.filter(t=>t.status==='pending');const belumHarga=tugasH.filter(t=>t.status==='bought');
          if(!belumBeli.length&&!belumHarga.length){alert('Semua tugas sudah selesai!');return;}
          const lines=['*⚠️ Reminder Tugas Beli — '+sd+'*',''];

        );})}</div>

// ===== TUGAS BELI (Staf) =====
function TugasBeli({user,tugasBeli,allUsers,orders,onStatusChanged,onHargaSaved}){
  const[hi,setHi]=useState({});const[sav,setSav]=useState({});const[kon,setKon]=useState({});const[selD,setSelD]=useState(todayStr());const[editMode,setEditMode]=useState({});const[search,setSearch]=useState('');
  const today=todayStr();const my=tugasBeli.filter(t=>normDate(t.tanggal)===selD&&String(t.staf_id)===String(user.u));const other=tugasBeli.filter(t=>normDate(t.tanggal)===selD&&String(t.staf_id)!==String(user.u));
  const total=my.length+other.length;const doneN=my.concat(other).filter(t=>t.status==='done').length;
  const avail=useMemo(()=>{const ds=new Set();tugasBeli.forEach(t=>{const d=normDate(t.tanggal);if(d)ds.add(d);});return[...ds].sort().reverse();},[tugasBeli]);
  const getNm=(sid)=>{const u2=(allUsers||[]).find(x=>x.username===sid||x.id===sid);return u2?u2.name:sid;};
  const hjMap=useMemo(()=>{const m={};for(const o of orders)for(const it of o.items){const nm=it.nama||it.nama_bahan;if(!m[nm])m[nm]=[];m[nm].push(it.harga_jual);}const r={};for(const[nm,ps]of Object.entries(m))r[nm]={max:Math.max(...ps)};return r;},[orders]);
  const beli=async(t)=>{setKon(p=>({...p,[t.id]:true}));try{const r=await api.post({action:'updateTugasStatus',tugasId:t.id,status:'bought'});if(r.success)onStatusChanged(t.id,'bought');}catch(e){alert('Gagal');}setKon(p=>({...p,[t.id]:false}));};
  const simpanH=async(id)=>{const h=parseFloat(hi[id])||0;if(h<=0){alert('Harga tidak valid');return;}setSav(p=>({...p,[id]:true}));try{const r=await api.post({action:'updateHargaBeli',tugasId:id,hargaBeli:h});if(r.success)onHargaSaved(id,h);}catch(e){alert('Gagal');}setSav(p=>({...p,[id]:false}));};
  const sI=(s)=>s==='done'?<span style={bdg('suc')}>Selesai ✓</span>:s==='bought'?<span style={bdg('war')}>Dibeli</span>:<span style={bdg()}>Belum</span>;
  return(

      {total>0 && <div style={{...S_card,marginBottom:'14px'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{fontWeight:700}}>Progress</span><span style={{fontSize:'13px',color:'var(--muted)',fontWeight:600}}>{doneN}/{total}</span></div><div style={{height:'8px',background:'var(--bg)',borderRadius:'4px',overflow:'hidden'}}><div style={{height:'100%',background:'var(--green)',borderRadius:'4px',width:(total>0?(doneN/total)*100:0)+'%'}}/></div></div>}
      <div style={{marginBottom:'14px'}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cari bahan..." style={{width:'100%',boxSizing:'border-box',padding:'10px 14px',fontSize:'14px'}}/></div>
      {(()=>{const sq2=search.toLowerCase();const myF=sq2?my.filter(t=>t.nama_bahan.toLowerCase().includes(sq2)):my;const otherF=sq2?other.filter(t=>t.nama_bahan.toLowerCase().includes(sq2)||getNm(t.staf_id).toLowerCase().includes(sq2)):other;return(<React.Fragment>
      {!myF.length ? <div style={{...S_card,padding:'3rem',textAlign:'center',color:'var(--muted)',marginBottom:'14px'}}>{sq2?'Tidak ditemukan':'Belum ada tugas untuk '+selD}</div> : (
        <React.Fragment>
          <div style={{fontSize:'14px',fontWeight:700,marginBottom:'10px'}}>Tugasmu ({myF.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'20px'}}>{myF.map(t=>{const hj=hjMap[t.nama_bahan];return(
            <div key={t.id} style={{...S_card,border:t.status==='done'?'2px solid var(--green)':t.status==='bought'?'2px solid #fbbf24':'1.5px solid var(--border)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:t.status!=='done'?'12px':'0',flexWrap:'wrap',gap:'6px'}}>
                <div><div style={{fontWeight:700,fontSize:'15px'}}>{t.nama_bahan}</div><div style={{fontSize:'13px',color:'var(--muted)',marginTop:'2px'}}>{t.qty} {t.satuan}</div>
                  {hj && <div style={{fontSize:'12px',color:'var(--green-dk)',marginTop:'4px',fontWeight:600}}>💰 Jual tertinggi: {fRp(hj.max)}/{t.satuan}</div>}
                </div>{sI(t.status)}
              </div>
              {t.status==='pending' && <button onClick={()=>beli(t)} disabled={kon[t.id]} style={{...btn('pri',true),padding:'14px',opacity:kon[t.id]?0.6:1}}>{kon[t.id]?'...':'✓ Konfirmasi Sudah Beli'}</button>}
              {t.status==='bought' && <div style={{display:'flex',gap:'10px',alignItems:'flex-end',flexWrap:'wrap'}}><div style={{flex:1,minWidth:'150px'}}><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Harga beli per {t.satuan} (Rp):</label><input type="number" placeholder="32000" value={hi[t.id]||''} onChange={e=>setHi(p=>({...p,[t.id]:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/></div><button onClick={()=>simpanH(t.id)} disabled={sav[t.id]} style={{...btn('suc'),padding:'12px 20px'}}>{sav[t.id]?'...':'Simpan'}</button></div>}
              {t.status==='done' && !editMode[t.id] && <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px'}}>
                <div style={{fontSize:'14px',color:'var(--green-dk)',fontWeight:600}}>Beli: {fRp(t.harga_beli)}/{t.satuan}{hj&&<span style={{marginLeft:'8px',color:t.harga_beli<hj.max?'var(--green)':'var(--red)',fontSize:'12px'}}>(Margin: {fRp(hj.max-t.harga_beli)})</span>}</div>
                <button onClick={()=>{setEditMode(p=>({...p,[t.id]:true}));setHi(p=>({...p,[t.id]:String(t.harga_beli)}));}} style={{...btn(),padding:'6px 14px',fontSize:'12px'}}>✏️ Edit Harga</button>
              </div>}
              {t.status==='done' && editMode[t.id] && <div style={{display:'flex',gap:'10px',alignItems:'flex-end',flexWrap:'wrap'}}><div style={{flex:1,minWidth:'150px'}}><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Edit harga beli per {t.satuan} (Rp):</label><input type="number" value={hi[t.id]||''} onChange={e=>setHi(p=>({...p,[t.id]:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/></div><button onClick={()=>{simpanH(t.id);setEditMode(p=>({...p,[t.id]:false}));}} disabled={sav[t.id]} style={{...btn('suc'),padding:'12px 20px'}}>{sav[t.id]?'...':'Simpan'}</button><button onClick={()=>setEditMode(p=>({...p,[t.id]:false}))} style={{...btn(),padding:'12px 14px'}}>Batal</button></div>}
            </div>
          );})}</div>
        </React.Fragment>
      )}
      {otherF.length>0 && <React.Fragment><div style={{fontSize:'14px',fontWeight:700,marginBottom:'10px'}}>Staf Lain</div><div style={S_card}><div style={{overflowX:'auto'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Staf','Bahan','Qty','Status'].map((h,i)=><th key={i} style={S_th}>{h}</th>)}</tr></thead><tbody>{otherF.map(t=><tr key={t.id}><td style={{...S_td,fontWeight:500}}>{getNm(t.staf_id)}</td><td style={S_td}>{t.nama_bahan}</td><td style={{...S_td,color:'var(--muted)'}}>{t.qty} {t.satuan}</td><td style={S_td}>{sI(t.status)}</td></tr>)}</tbody></table></div></div></React.Fragment>}
      </React.Fragment>);})()}
    </div>
  );
}

// ===== EMBEDDED LOGOS =====
const LOGO_STEMPEL_TTD='';
const LOGO_KOP_INDO='';
const LOGO_ISS='';

// ===== SHARED PDF GENERATOR =====
function generateSuratJalanPDF(o,d){
  if(!window.jspdf){alert('PDF library belum siap, refresh halaman dulu');return;}
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const PW=210,M=15;
  // ========== LEFT LOGO (Koperasi Indonesia) ==========
  try{doc.addImage(LOGO_KOP_INDO,'JPEG',M,8,22,22);}catch(e){console.error('logo kop indo',e);}
  doc.setFontSize(6);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text('KOPERASI INDONESIA',M+11,33,{align:'center'});
  // ========== RIGHT LOGO (ISS) ==========
  try{doc.addImage(LOGO_ISS,'JPEG',PW-M-22,8,22,22);}catch(e){console.error('logo iss',e);}
  // ========== HEADER TEXT ==========
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(0,0,0);
  doc.text('KOPERASI KONSUMEN INSAN SINERGI SEJAHTERA',PW/2,16,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Nomor AHU-0000368.AH.01.29 Tahun 2025',PW/2,22,{align:'center'});
  doc.text('Kp. Tenjonagara 02/02, Mekarjaya, Pacet, Kab. Bandung',PW/2,27,{align:'center'});
  // ========== TITLE ==========
  doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text('SURAT JALAN PENGIRIMAN BAHAN',PW/2,44,{align:'center'});
  // ========== INFO BLOCK ==========
  let y=54;
  doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('Kepada Yth',M,y);y+=6;
  doc.setFont('helvetica','normal');
  doc.text('Nama',M,y);doc.text(':',M+18,y);doc.setFont('helvetica','bold');doc.text(d?.pic||'-',M+22,y);doc.setFont('helvetica','normal');doc.text(d?.hp||'',PW-M-50,y);y+=5;
  doc.text('Alamat',M,y);doc.text(':',M+18,y);doc.text(d?.alamat||'-',M+22,y);y+=5;
  doc.text('Tanggal',M,y);doc.text(':',M+18,y);doc.text(normDate(o?.tanggal_kirim),M+22,y);y+=8;
  doc.text('Nama Pengirim : Kosim',M,y);y+=6;
  // ========== TABLE ==========
  const rows=o?.items?.map((it,i)=>[i+1,it.nama||it.nama_bahan,it.qty.toString(),it.satuan,'',''])||[];
  doc.autoTable({startY:y,head:[['No','Barang','Qty','Satuan','Ceklis jika\nsesuai','Keterangan']],body:rows,
    theme:'grid',
    headStyles:{fillColor:[230,230,230],textColor:[0,0,0],fontStyle:'bold',halign:'center',fontSize:9,cellPadding:3,valign:'middle',lineColor:[0,0,0],lineWidth:0.2},
    bodyStyles:{fontSize:9,cellPadding:2.5,lineColor:[180,180,180],lineWidth:0.1,valign:'middle'},
    columnStyles:{0:{halign:'center',cellWidth:12},1:{cellWidth:65},2:{halign:'right',cellWidth:20},3:{halign:'center',cellWidth:18},4:{cellWidth:30},5:{cellWidth:'auto'}},
    margin:{left:M,right:M}
  });
  let fy=doc.lastAutoTable.finalY+10;
  // ========== NOTES ==========
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(0,0,0);
  doc.text('NOTES :',M,fy);fy+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Mohon di cek bersama antara pengirim dan penerima bahan baku',M,fy);fy+=4.5;
  doc.text('Jika ada bahan yang tidak sesuai kuntitas dan kualita mohon segera hubungi admin',M,fy);fy+=4.5;
  doc.text('WA Admin 085351075661',M,fy);fy+=10;
  // ========== SIGNATURES (Hormat kami with stamp image) ==========
  doc.setFontSize(10);doc.setTextColor(0,0,0);
  doc.text('Hormat kami',M+5,fy);
  doc.text('Tanda terima,',PW-M-50,fy);
  // Insert stamp+signature image
  try{doc.addImage(LOGO_STEMPEL_TTD,'JPEG',M,fy+2,52,40);}catch(e){console.error('stempel',e);}
  fy+=42;
  doc.text('Koperasi Insan Sinergi Sejahtera',M,fy);
  doc.text('(............................................................)',PW-M-65,fy);
  doc.save('Surat-Jalan-'+(d?.nama||'order')+'-'+normDate(o?.tanggal_kirim)+'.pdf');
}

          <div className="grid-1-mobile" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:'16px'}}>

><tbody>{o?.items?.map((it,i)=><tr key={i}><td style={{border:'1px solid #ccc',padding:'8px',textAlign:'center'}}>{i+1}</td><td style={{border:'1px solid #ccc',padding:'8px'}}>{it.nama||it.nama_bahan}</td><td style={{border:'1px solid #ccc',padding:'8px',textAlign:'right'}}>{it.qty}</td><td style={{border:'1px solid #ccc',padding:'8px',textAlign:'center'}}>{it.satuan}</td><td style={{border:'1px solid #ccc',padding:'8px',width:'80px'}}></td><td style={{border:'1px solid #ccc',padding:'8px',width:'80px'}}></td></tr>)}</tbody></table><div style={{fontSize:'12px'}}>Hubungi admin: WA 085351075661</div></div></div>);}

// ===== LAPORAN (approved only) =====
function Laporan({orders,kerugian,onKerugianAdded,onKerugianDeleted,userRole}){
  const today=todayStr();const[df,setDf]=useState(()=>{const d=new Date();d.setDate(d.getDate()-30);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');});const[dt,setDt]=useState(today);const[tab,setTab]=useState('grafik');
  const[showKF,setShowKF]=useState(false);const[kForm,setKForm]=useState({tanggal:today,nama_bahan:'',biaya:'',keterangan:''});const[kSav,setKSav]=useState(false);
  const fo=orders.filter(o=>{const d=normDate(o.tanggal_kirim);return d>=df&&d<=dt&&o.status==='approved';});
  const fk=kerugian.filter(k=>{const d=normDate(k.tanggal);return d>=df&&d<=dt;});
  const tj=fo.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);const tb=fo.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);const totalK=fk.reduce((s,k)=>s+k.biaya,0);const pf=tj-tb-totalK;const mg=tj>0?((pf/tj)*100).toFixed(1):'0';
  const daily=useMemo(()=>{const m={};for(const o of fo){const d=normDate(o.tanggal_kirim);if(!m[d])m[d]={date:d,jual:0,beli:0,kerugian:0};m[d].jual+=o.items.reduce((s,i)=>s+i.qty*i.harga_jual,0);m[d].beli+=o.items.reduce((s,i)=>s+i.qty*i.harga_beli,0);}for(const k of fk){const d=normDate(k.tanggal);if(!m[d])m[d]={date:d,jual:0,beli:0,kerugian:0};m[d].kerugian+=k.biaya;}return Object.values(m).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({...d,profit:d.jual-d.beli-d.kerugian}));},[fo,fk]);
  const perDapur=DAPUR.map(d=>{const dos=fo.filter(o=>o.dapur_id===d.id);const j=dos.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_jual,0),0);const b=dos.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty*i.harga_beli,0),0);return{nama:d.nama,ords:dos.length,j,b,pf:j-b};});
  const im={};for(const o of fo)for(const it of o.items){const nm=it.nama||it.nama_bahan;if(!im[nm])im[nm]={nama:nm,qty:0,j:0,b:0};im[nm].qty+=it.qty;im[nm].j+=it.qty*it.harga_jual;im[nm].b+=it.qty*it.harga_beli;}const perItem=Object.values(im).map(x=>({...x,pf:x.j-x.b})).sort((a,b)=>b.pf-a.pf);
  const trendMsg=useMemo(()=>{if(daily.length<2)return'Data kurang untuk analisis.';const ps=daily.map(d=>d.profit);const h1=ps.slice(0,Math.ceil(ps.length/2));const h2=ps.slice(Math.ceil(ps.length/2));const a1=h1.reduce((a,b)=>a+b,0)/h1.length;const a2=h2.reduce((a,b)=>a+b,0)/h2.length;const best=daily.reduce((a,b)=>a.profit>b.profit?a:b);const worst=daily.reduce((a,b)=>a.profit<b.profit?a:b);let t=a2>a1*1.05?'📈 NAIK':a2<a1*0.95?'📉 TURUN':'➡️ STABIL';return t+' · Tertinggi: '+fRp(best.profit)+' ('+best.date.slice(5)+') · Terendah: '+fRp(worst.profit)+' ('+worst.date.slice(5)+')';},[daily]);
  const maxV=Math.max(...daily.map(d=>Math.max(d.jual,Math.abs(d.profit))),1);
  const addK=async()=>{if(!kForm.nama_bahan||!kForm.biaya){alert('Isi nama & biaya');return;}setKSav(true);const item={id:'krgn-'+Date.now(),tanggal:kForm.tanggal,nama_bahan:kForm.nama_bahan,qty:0,satuan:'',biaya:parseFloat(kForm.biaya)||0,keterangan:kForm.keterangan};try{const r=await api.post({action:'addKerugian',item});if(r.success){onKerugianAdded(item);setKForm({tanggal:today,nama_bahan:'',biaya:'',keterangan:''});setShowKF(false);}else alert('Gagal');}catch(e){alert('Koneksi');}setKSav(false);};
  return(
    <div style={{padding:'16px',maxWidth:'960px',margin:'0 auto'}} className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',flexWrap:'wrap',gap:'10px'}}><h2>Laporan</h2><div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}><input type="date" value={df} onChange={e=>setDf(e.target.value)} style={{padding:'8px 10px',fontSize:'13px'}}/><span style={{color:'var(--muted)'}}>→</span><input type="date" value={dt} onChange={e=>setDt(e.target.value)} style={{padding:'8px 10px',fontSize:'13px'}}/></div></div>
      {userRole==='admin'&&<div style={{fontSize:'12px',color:'var(--purple)',padding:'10px 14px',background:'var(--purple-bg)',borderRadius:'10px',marginBottom:'14px',fontWeight:600}}>📌 Hanya order yang sudah approved</div>}
      <div className="grid-1-mobile" style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'8px',marginBottom:'16px'}}>{[{l:'Jual',v:fRp(tj),c:'var(--blue)'},{l:'Beli',v:fRp(tb),c:'var(--text)'},{l:'Pengeluaran',v:fRp(totalK),c:'var(--red)'},{l:'Profit',v:fRp(pf),c:pf>=0?'var(--green-dk)':'var(--red)'},{l:'Margin',v:mg+'%',c:'var(--text)'}].map(c=><div key={c.l} style={{...S_card,padding:'12px',textAlign:'center'}}><div style={{fontSize:'10px',color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>{c.l}</div><div style={{fontSize:'16px',fontWeight:700,color:c.c,marginTop:'4px'}}>{c.v}</div></div>)}</div>
      {daily.length>=2&&<div style={{...S_card,marginBottom:'14px',background:'linear-gradient(135deg,#eff6ff,#f0fdf4)',border:'none'}}><div style={{fontSize:'14px',fontWeight:700,color:'var(--green)',marginBottom:'6px'}}>📊 Tren</div><div style={{fontSize:'13px'}}>{trendMsg}</div></div>}
      <TabBar tabs={[['grafik','Grafik',0],['harian','Harian',0],['dapur','Dapur',0],['item','Item',0],['kerugian','Pengeluaran',0]]} active={tab} onChange={setTab}/>
      {tab==='grafik'&&<div style={S_card}>{!daily.length?<div style={{padding:'3rem',textAlign:'center',color:'var(--muted)'}}>Tidak ada data</div>:<div style={{display:'flex',gap:'3px',alignItems:'flex-end',height:'200px',padding:'10px 0',borderBottom:'2px solid var(--border)'}}>{daily.map(d=><div key={d.date} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%',minWidth:'24px'}}><div style={{fontSize:'9px',color:'var(--green-dk)',marginBottom:'3px',fontWeight:600}}>{fRp(d.profit).replace('Rp ','')}</div><div style={{width:'80%',background:d.profit>=0?'var(--green)':'var(--red)',borderRadius:'4px 4px 0 0',minHeight:'3px',height:Math.max(3,Math.abs(d.profit)/maxV*140)+'px',opacity:0.8}}/><div style={{fontSize:'8px',color:'var(--muted)',marginTop:'6px',transform:'rotate(-50deg)',whiteSpace:'nowrap',fontWeight:500}}>{d.date.slice(5)}</div></div>)}</div>}</div>}
      {tab==='harian'&&<div style={S_card}><div style={{overflowX:'auto'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Tanggal','Jual','Beli','Pengeluaran','Profit'].map((h,i)=><th key={i} style={{...S_th,textAlign:i>=1?'right':'left'}}>{h}</th>)}</tr></thead><tbody>{daily.map(d=><tr key={d.date}><td style={S_td}>{d.date}</td><td style={{...S_td,textAlign:'right'}}>{fRp(d.jual)}</td><td style={{...S_td,textAlign:'right'}}>{fRp(d.beli)}</td><td style={{...S_td,textAlign:'right',color:'var(--red)'}}>{d.kerugian>0?fRp(d.kerugian):'—'}</td><td style={{...S_td,textAlign:'right',fontWeight:700,color:d.profit>=0?'var(--green-dk)':'var(--red)'}}>{fRp(d.profit)}</td></tr>)}</tbody><tfoot><tr style={{borderTop:'2px solid var(--border)'}}><td style={{...S_td,fontWeight:700}}>TOTAL</td><td style={{...S_td,textAlign:'right',fontWeight:700}}>{fRp(tj)}</td><td style={{...S_td,textAlign:'right',fontWeight:700}}>{fRp(tb)}</td><td style={{...S_td,textAlign:'right',fontWeight:700,color:'var(--red)'}}>{totalK>0?fRp(totalK):'—'}</td><td style={{...S_td,textAlign:'right',fontWeight:700,color:pf>=0?'var(--green-dk)':'var(--red)'}}>{fRp(pf)}</td></tr></tfoot></table></div></div>}
      {tab==='dapur'&&<div style={S_card}><div style={{overflowX:'auto'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Dapur','Order','Jual','Beli','Profit'].map((h,i)=><th key={i} style={{...S_th,textAlign:i>=2?'right':'left'}}>{h}</th>)}</tr></thead><tbody>{perDapur.map(d=><tr key={d.nama}><td style={{...S_td,fontWeight:600}}>{d.nama}</td><td style={S_td}>{d.ords}</td><td style={{...S_td,textAlign:'right'}}>{fRp(d.j)}</td><td style={{...S_td,textAlign:'right'}}>{fRp(d.b)}</td><td style={{...S_td,textAlign:'right',fontWeight:700,color:d.pf>=0?'var(--green-dk)':'var(--red)'}}>{fRp(d.pf)}</td></tr>)}</tbody></table></div></div>}
      {tab==='item'&&<div style={S_card}><div style={{overflowX:'auto'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Bahan','Qty','Jual','Beli','Profit'].map((h,i)=><th key={i} style={{...S_th,textAlign:i>=2?'right':'left'}}>{h}</th>)}</tr></thead><tbody>{perItem.map(it=><tr key={it.nama}><td style={{...S_td,fontWeight:500}}>{it.nama}</td><td style={S_td}>{it.qty}</td><td style={{...S_td,textAlign:'right'}}>{fRp(it.j)}</td><td style={{...S_td,textAlign:'right'}}>{fRp(it.b)}</td><td style={{...S_td,textAlign:'right',fontWeight:700,color:it.pf>=0?'var(--green-dk)':'var(--red)'}}>{fRp(it.pf)}</td></tr>)}</tbody></table></div></div>}
      {tab==='kerugian'&&<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}><div style={{fontWeight:700}}>Pengeluaran / Ganti Rugi</div>{userRole==='admin'&&<button onClick={()=>setShowKF(x=>!x)} style={btn('dan')}>{showKF?'✕':'+ Tambah'}</button>}</div>
        {showKF&&<div style={{...S_card,marginBottom:'14px',border:'2px solid #fca5a5'}} className="fade-in"><div className="grid-1-mobile" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',marginBottom:'12px'}}><div><label style={{fontSize:'11px',color:'var(--muted)',display:'block',marginBottom:'4px',fontWeight:600}}>Tanggal</label><input type="date" value={kForm.tanggal} onChange={e=>setKForm(p=>({...p,tanggal:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/></div><div><label style={{fontSize:'11px',color:'var(--muted)',display:'block',marginBottom:'4px',fontWeight:600}}>Bahan *</label><input value={kForm.nama_bahan} onChange={e=>setKForm(p=>({...p,nama_bahan:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/></div><div><label style={{fontSize:'11px',color:'var(--muted)',display:'block',marginBottom:'4px',fontWeight:600}}>Biaya (Rp) *</label><input type="number" value={kForm.biaya} onChange={e=>setKForm(p=>({...p,biaya:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/></div></div><div style={{marginBottom:'12px'}}><label style={{fontSize:'11px',color:'var(--muted)',display:'block',marginBottom:'4px',fontWeight:600}}>Keterangan</label><input value={kForm.keterangan} onChange={e=>setKForm(p=>({...p,keterangan:e.target.value}))} placeholder="Bawang busuk dll" style={{width:'100%',boxSizing:'border-box'}}/></div><button onClick={addK} disabled={kSav} style={{...btn('dan'),opacity:kSav?0.6:1}}>{kSav?'...':'Simpan'}</button></div>}
        <div style={S_card}>{!fk.length?<div style={{padding:'2rem',textAlign:'center',color:'var(--muted)'}}>Belum ada pengeluaran.</div>:<div style={{overflowX:'auto'}}><table><thead><tr style={{borderBottom:'2px solid var(--border)'}}>{['Tanggal','Bahan','Biaya','Ket',''].map((h,i)=><th key={i} style={{...S_th,textAlign:i===2?'right':'left'}}>{h}</th>)}</tr></thead><tbody>{fk.map(k=><tr key={k.id}><td style={S_td}>{normDate(k.tanggal)}</td><td style={{...S_td,fontWeight:500}}>{k.nama_bahan}</td><td style={{...S_td,textAlign:'right',fontWeight:700,color:'var(--red)'}}>{fRp(k.biaya)}</td><td style={{...S_td,color:'var(--muted)',fontSize:'12px'}}>{k.keterangan||'-'}</td><td style={S_td}>{userRole==='admin'&&<button onClick={()=>{if(confirm('Hapus?'))api.post({action:'deleteKerugian',kerugianId:k.id}).then(r=>{if(r.success)onKerugianDeleted(k.id)});}} style={{...btn('dan'),padding:'4px 10px',fontSize:'11px'}}>×</button>}</td></tr>)}</tbody></table></div>}</div>
      </div>}
      {tab==='approved'&&null}
    </div>
  );

// ===== PENGELUARAN (operator input) =====
function Pengeluaran({kerugian,onKerugianAdded,onKerugianDeleted}){
  const today=todayStr();const[selD,setSelD]=useState(today);const[showF,setShowF]=useState(false);const[sav,setSav]=useState(false);
  const[form,setForm]=useState({tanggal:today,nama_bahan:'',biaya:'',keterangan:''});
  const fk=kerugian.filter(k=>normDate(k.tanggal)===selD);
  const totalHari=fk.reduce((s,k)=>s+k.biaya,0);
  const add=async()=>{if(!form.nama_bahan||!form.biaya){alert('Isi nama & biaya');return;}setSav(true);const item={id:'krgn-'+Date.now(),tanggal:form.tanggal,nama_bahan:form.nama_bahan,qty:0,satuan:'',biaya:parseFloat(form.biaya)||0,keterangan:form.keterangan};try{const r=await api.post({action:'addKerugian',item});if(r.success){onKerugianAdded(item);setForm({tanggal:selD,nama_bahan:'',biaya:'',keterangan:''});setShowF(false);}else alert('Gagal');}catch(e){alert('Koneksi');}setSav(false);};
  const del=async(id)=>{if(!confirm('Hapus pengeluaran ini?'))return;try{const r=await api.post({action:'deleteKerugian',kerugianId:id});if(r.success)onKerugianDeleted(id);else alert('Gagal');}catch(e){alert('Koneksi');}};
  return(
    <div style={{padding:'16px',maxWidth:'720px',margin:'0 auto'}} className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',flexWrap:'wrap',gap:'8px'}}><h2>Pengeluaran Harian</h2><button onClick={()=>{setForm(p=>({...p,tanggal:selD}));setShowF(x=>!x);}} style={btn('dan')}>{showF?'✕ Tutup':'+ Tambah'}</button></div>
      <DateNav value={selD} onChange={setSelD}/>
      {totalHari>0&&<div style={{...S_card,marginBottom:'14px',border:'2px solid #fca5a5',background:'var(--red-bg)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:'12px',color:'var(--muted)',fontWeight:600}}>TOTAL PENGELUARAN</div><div style={{fontSize:'13px',color:'var(--muted)'}}>{fk.length} item · {selD}</div></div><div style={{fontSize:'22px',fontWeight:700,color:'var(--red)'}}>{fRp(totalHari)}</div></div></div>}
      {showF&&<div style={{...S_card,marginBottom:'14px',border:'2px solid #fca5a5'}} className="fade-in">
        <div style={{fontSize:'15px',fontWeight:700,marginBottom:'14px',color:'var(--red)'}}>Tambah Pengeluaran</div>
        <div className="grid-1-mobile" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'14px'}}>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Tanggal *</label><input type="date" value={form.tanggal} onChange={e=>setForm(p=>({...p,tanggal:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/></div>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Nama / Jenis *</label><input value={form.nama_bahan} onChange={e=>setForm(p=>({...p,nama_bahan:e.target.value}))} placeholder="Bensin, Tol, Parkir, dll" style={{width:'100%',boxSizing:'border-box'}}/></div>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Biaya (Rp) *</label><input type="number" value={form.biaya} onChange={e=>setForm(p=>({...p,biaya:e.target.value}))} placeholder="50000" style={{width:'100%',boxSizing:'border-box'}}/></div>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Keterangan</label><input value={form.keterangan} onChange={e=>setForm(p=>({...p,keterangan:e.target.value}))} placeholder="Detail (opsional)" style={{width:'100%',boxSizing:'border-box'}}/></div>
        </div>
        <div style={{display:'flex',gap:'10px'}}><button onClick={()=>setShowF(false)} style={{...btn(),flex:1}}>Batal</button><button onClick={add} disabled={sav} style={{...btn('dan'),flex:2,opacity:sav?0.6:1}}>{sav?'...':'✓ Simpan'}</button></div>
      </div>}
      <div style={S_card}>
        <div style={{fontSize:'14px',fontWeight:700,marginBottom:'12px'}}>Daftar Pengeluaran {selD}</div>
        {!fk.length?<div style={{padding:'2rem',textAlign:'center',color:'var(--muted)'}}>Belum ada pengeluaran hari ini.</div>:
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>{fk.map(k=><div key={k.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px',background:'var(--bg)',borderRadius:'10px',flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:'150px'}}><div style={{fontWeight:700}}>{k.nama_bahan}</div>{k.keterangan&&<div style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>{k.keterangan}</div>}</div>
          <div style={{fontWeight:700,color:'var(--red)',fontSize:'15px'}}>{fRp(k.biaya)}</div>
          <button onClick={()=>del(k.id)} style={{...btn('dan'),padding:'6px 10px',fontSize:'11px'}}>×</button>
        </div>)}</div>}
      </div>
    </div>
  );
}

// ===== KELOLA AKUN =====
function KelolaAkun({allUsers,onUsersChanged}){
  const roles=['operator','staf_beli','staf_kirim'];const users=(allUsers||[]).filter(u=>roles.includes(u.role));
  const[sf,setSf]=useState(false);const[sv,setSv]=useState(false);const[spm,setSpm]=useState({});const[dc,setDc]=useState(null);const[dl,setDl]=useState(false);
  const[form,setForm]=useState({name:'',username:'',password:'',role:'staf_beli'});const[fe,setFe]=useState('');const[sp,setSp2]=useState(false);
  const rl={operator:'Operator',staf_beli:'Staf Beli',staf_kirim:'Staf Kirim'};const rbg={operator:'var(--blue-bg)',staf_beli:'var(--green-bg)',staf_kirim:'var(--yellow-bg)'};const rc={operator:'var(--blue)',staf_beli:'var(--green-dk)',staf_kirim:'var(--yellow)'};
  const val=()=>{if(!form.name.trim())return'Nama wajib';if(!form.username.trim())return'Username wajib';if(form.password.length<4)return'Password min 4';if((allUsers||[]).find(u=>u.username===form.username))return'Username sudah ada';return'';};
  const save=async()=>{const e=val();if(e){setFe(e);return;}setSv(true);setFe('');try{const nu={id:'u-'+Date.now(),...form};const r=await api.post({action:'addUser',user:nu});if(r.success){onUsersChanged(p=>[...p,nu]);setForm({name:'',username:'',password:'',role:'staf_beli'});setSf(false);}else setFe(r.error||'Gagal');}catch(e2){setFe('Koneksi');}setSv(false);};
  const del=async(uid)=>{setDl(true);try{const r=await api.post({action:'deleteUser',userId:uid});if(r.success){onUsersChanged(p=>p.filter(u=>u.id!==uid));setDc(null);}}catch(e){alert('Gagal');}setDl(false);};
  const du=users.find(u=>u.id===dc);
  return(
    <div style={{padding:'16px',maxWidth:'700px',margin:'0 auto'}} className="fade-in">
      {dc&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'16px'}} onClick={()=>setDc(null)}><div style={{...S_card,maxWidth:'360px',width:'100%',padding:'24px'}} onClick={e=>e.stopPropagation()}><div style={{fontSize:'16px',fontWeight:700,textAlign:'center',marginBottom:'16px'}}>Hapus Akun?</div><div style={{fontSize:'14px',color:'var(--muted)',textAlign:'center',marginBottom:'20px'}}>Akun <strong>{du?.name}</strong> ({du?.username})</div><div style={{display:'flex',gap:'10px'}}><button onClick={()=>setDc(null)} style={{...btn(),flex:1}}>Batal</button><button onClick={()=>del(dc)} disabled={dl} style={{...btn('dan'),flex:1}}>{dl?'...':'Hapus'}</button></div></div></div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',flexWrap:'wrap',gap:'8px'}}><h2>Kelola Akun</h2><button onClick={()=>{setSf(x=>!x);setFe('');}} style={btn('pri')}>{sf?'✕ Tutup':'+ Buat Akun'}</button></div>
      {sf&&<div style={{...S_card,marginBottom:'16px',border:'2px solid var(--green)'}} className="fade-in">
        <div style={{fontSize:'15px',fontWeight:700,marginBottom:'14px',color:'var(--green-dk)'}}>Buat Akun Baru</div>
        <div className="grid-1-mobile" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'14px'}}>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Nama *</label><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/></div>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Username *</label><input value={form.username} onChange={e=>setForm(p=>({...p,username:e.target.value.toLowerCase().replace(/\s/g,'')}))} style={{width:'100%',boxSizing:'border-box'}}/></div>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Password *</label><div style={{position:'relative'}}><input type={sp?'text':'password'} value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} style={{width:'100%',boxSizing:'border-box',paddingRight:'40px'}}/><button onClick={()=>setSp2(x=>!x)} style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'16px'}}>{sp?'🙈':'👁️'}</button></div></div>
          <div><label style={{fontSize:'12px',color:'var(--muted)',display:'block',marginBottom:'6px',fontWeight:600}}>Role *</label><select value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}><option value="operator">Operator</option><option value="staf_beli">Staf Pembelian</option><option value="staf_kirim">Staf Pengiriman</option></select></div>
        </div>
        {fe&&<div style={{fontSize:'13px',color:'var(--red)',padding:'10px 14px',background:'var(--red-bg)',borderRadius:'10px',marginBottom:'12px'}}>{fe}</div>}
        <div style={{display:'flex',gap:'10px'}}><button onClick={()=>setSf(false)} style={{...btn(),flex:1}}>Batal</button><button onClick={save} disabled={sv} style={{...btn('suc'),flex:2,opacity:sv?0.6:1}}>{sv?'...':'✓ Simpan'}</button></div>
      </div>}
      <div style={S_card}><div style={{fontSize:'15px',fontWeight:700,marginBottom:'14px'}}>Daftar Akun ({users.length})</div>
        {!users.length?<div style={{padding:'3rem',textAlign:'center',color:'var(--muted)'}}>Belum ada akun staf.</div>:
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>{users.map(u=><div key={u.id} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px',background:'var(--bg)',borderRadius:'10px',flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:'120px'}}><div style={{fontWeight:700}}>{u.name}</div><div style={{fontSize:'12px',color:'var(--muted)',fontFamily:'monospace',marginTop:'2px'}}>{u.username} · <span style={{cursor:'pointer'}} onClick={()=>setSpm(p=>({...p,[u.id]:!p[u.id]}))}>{spm[u.id]?u.password:'••••'}</span></div></div>
          <span style={{...bdg(),background:rbg[u.role],color:rc[u.role]}}>{rl[u.role]||u.role}</span>
          <button onClick={()=>setDc(u.id)} style={{...btn('dan'),padding:'6px 12px',fontSize:'12px'}}>Hapus</button>
        </div>)}</div>}
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App(){
  const[user,setUser]=useState(()=>{try{const s=localStorage.getItem('koperasi_session');if(s){const{user:u,ts}=JSON.parse(s);if(Date.now()-ts<30*60*1000)return u;localStorage.removeItem('koperasi_session');}return null;}catch(e){return null;}});
  const[view,setView]=useState(()=>{try{const s=localStorage.getItem('koperasi_session');if(s){const{user:u,ts}=JSON.parse(s);if(Date.now()-ts<30*60*1000)return navItems(u.role)[0]?.id||'dashboard';}}catch(e){}return'dashboard';});const[orders,setOrders]=useState([]);const[tugas,setTugas]=useState([]);const[pngrm,setPngrm]=useState([]);const[allUsers,setAllUsers]=useState([]);const[kerugian,setKerugian]=useState([]);const[loading,setLoading]=useState(false);const[error,setError]=useState(null);const[sideOpen,setSideOpen]=useState(false);
  useEffect(()=>{if(!user)return;const r=()=>{try{localStorage.setItem('koperasi_session',JSON.stringify({user,ts:Date.now()}))}catch(e){}};r();const ev=['click','keydown','scroll','touchstart'];ev.forEach(e=>window.addEventListener(e,r,{passive:true}));return()=>ev.forEach(e=>window.removeEventListener(e,r));},[user]);
  const stafBeli=allUsers.filter(x=>x.role==='staf_beli').map(x=>({id:x.username,nama:x.name}));
  const loadAll=useCallback(async()=>{setLoading(true);setError(null);try{const[o,t,p,u,k]=await Promise.all([api.get('getOrders'),api.get('getTugasBeli'),api.get('getPengiriman'),api.get('getUsers'),api.get('getKerugian')]);if(!Array.isArray(o))throw new Error(o.error||'gagal');setOrders(o);setTugas(Array.isArray(t)?t:[]);setPngrm(Array.isArray(p)?p:[]);setAllUsers(Array.isArray(u)?u:[]);setKerugian(Array.isArray(k)?k:[]);}catch(e){setError(e.message);}setLoading(false);},[]);
  useEffect(()=>{if(user)loadAll();},[user,loadAll]);
  const login=u=>{try{localStorage.setItem('koperasi_session',JSON.stringify({user:u,ts:Date.now()}))}catch(e){}setUser(u);setView(navItems(u.role)[0]?.id||'dashboard');};
  const logout=()=>{localStorage.removeItem('koperasi_session');setUser(null);setOrders([]);setTugas([]);setPngrm([]);setAllUsers([]);setKerugian([]);setError(null);};
  const cancelOrder=(oid)=>{setOrders(p=>p.map(o=>o.id===oid?{...o,status:'cancelled'}:o));api.post({action:'updateOrderStatus',orderId:oid,status:'cancelled'});};
  const deleteOrder=(oid)=>{setOrders(p=>p.filter(o=>o.id!==oid));};
  const[editOrder,setEditOrder]=useState(null);
  const reorder=(o)=>{setEditOrder(o);setView('input_order');};
  if(!user)return <Login onLogin={login}/>;
  const curLabel=navItems(user.role).find(i=>i.id===view)?.label||'';
  const renderView=()=>{
    switch(view){
      case 'dashboard':return <Dashboard orders={orders} loading={loading} error={error} onRefresh={loadAll} onCancelOrder={cancelOrder} onDeleteOrder={deleteOrder} onReorder={reorder} userRole={user.role}/>;
      case 'input_order':return <InputOrder onOrderAdded={o=>{setOrders(p=>[...p,o]);setEditOrder(null);}} setView={setView} editOrder={editOrder} onClearEdit={()=>setEditOrder(null)}/>;
      case 'rekap_beli':return <RekapBeli orders={orders} tugasBeli={tugas} stafBeli={stafBeli} allUsers={allUsers} onTugasSaved={(t,d)=>setTugas(p=>[...p.filter(x=>normDate(x.tanggal)!==d),...t])} userRole={user.role} onRefresh={loadAll}/>;
      case 'approval':return <ApprovalPage orders={orders} onRefresh={loadAll}/>;
      case 'surat_jalan':return <SuratJalan orders={orders} pengiriman={pngrm}/>;
      case 'laporan':return <Laporan orders={orders} kerugian={kerugian} onKerugianAdded={k=>setKerugian(p=>[...p,k])} onKerugianDeleted={id=>setKerugian(p=>p.filter(k=>k.id!==id))} userRole={user.role}/>;
      case 'tugas_beli':return <TugasBeli user={user} tugasBeli={tugas} allUsers={allUsers} orders={orders} onStatusChanged={(id,s)=>setTugas(p=>p.map(t=>t.id===id?{...t,status:s}:t))} onHargaSaved={(id,h)=>setTugas(p=>p.map(t=>t.id===id?{...t,harga_beli:h,status:'done'}:t))}/>;
      case 'pengiriman':return <PengirimanView user={user} orders={orders} pengiriman={pngrm} onKonfirmasi={pid=>setPngrm(p=>p.map(x=>x.id===pid?{...x,status:'delivered'}:x))}/>;
      case 'pengeluaran':return <Pengeluaran kerugian={kerugian} onKerugianAdded={k=>setKerugian(p=>[...p,k])} onKerugianDeleted={id=>setKerugian(p=>p.filter(k=>k.id!==id))}/>;
      case 'kelola_akun':return <KelolaAkun allUsers={allUsers} onUsersChanged={setAllUsers}/>;
      default:return (user.role==='ceo'||user.role==='sekretaris') ? <Laporan orders={orders} kerugian={kerugian} onKerugianAdded={k=>setKerugian(p=>[...p,k])} onKerugianDeleted={id=>setKerugian(p=>p.filter(k=>k.id!==id))} userRole={user.role}/> : <Dashboard orders={orders} loading={loading} error={error} onRefresh={loadAll} onCancelOrder={cancelOrder} onDeleteOrder={deleteOrder} onReorder={reorder} userRole={user.role}/>;
    }
  };
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar user={user} view={view} setView={setView} onLogout={logout} mobileOpen={sideOpen} closeMobile={()=>setSideOpen(false)}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        <MobileTopBar user={user} onMenu={()=>setSideOpen(true)} title={curLabel}/>
        <main style={{flex:1,overflow:'auto',background:'var(--bg)',WebkitOverflowScrolling:'touch'}}>{renderView()}</main>
      </div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
